app = 'dlbtrust-app'
primary_region = 'iad'

[build]

[env]
  PORT = '3002'
  NODE_ENV = 'production'
  FINERACT_URL = 'http://dlbtrust-fineract.internal:8443/fineract-provider/api/v1'
  PAYMENT_HUB_MODE = 'local_ach'
  PAYMENT_HUB_LIVE = 'true'

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'dlbtrust_data'
  destination = '/data'
