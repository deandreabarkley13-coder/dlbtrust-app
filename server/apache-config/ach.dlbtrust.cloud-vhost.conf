# Apache VirtualHost — ach.dlbtrust.cloud
# ProxyPass configuration for OpenACH Docker container
# Place at: /var/www/vhosts/ach.dlbtrust.cloud/conf/vhost.conf
# Then run: /usr/local/psa/admin/sbin/httpdmng --reconfigure-domain ach.dlbtrust.cloud && service apache2 reload

ProxyRequests Off
ProxyPreserveHost On

ProxyPass /openach/ http://localhost:8080/openach/
ProxyPassReverse /openach/ http://localhost:8080/openach/

<Proxy *>
    Order deny,allow
    Allow from all
    Require all granted
</Proxy>
