# Apache VirtualHost — dlbtrust.cloud
# ProxyPass configuration for Node.js app
# Place at: /var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
# Then run: /usr/local/psa/admin/sbin/httpdmng --reconfigure-domain dlbtrust.cloud && service apache2 reload

ProxyRequests Off
ProxyPreserveHost On

# Proxy everything to Node.js on port 3001 (or 3000 as fallback)
ProxyPass / http://localhost:3001/
ProxyPassReverse / http://localhost:3001/

<Proxy *>
    Order deny,allow
    Allow from all
    Require all granted
</Proxy>

# WebSocket support
RewriteEngine On
RewriteCond %{HTTP:Upgrade} websocket [NC]
RewriteCond %{HTTP:Connection} upgrade [NC]
RewriteRule ^/?(.*) ws://localhost:3001/$1 [P,L]
