# dlbtrust-app — Docker Compose
# Adds Apache Fineract (core banking GL) + MySQL alongside the existing app.
# OpenACH containers are managed separately (existing setup).
#
# Usage:
#   docker compose up -d
#   Wait ~60s for Fineract to finish initialization, then:
#   curl -k https://localhost:8443/fineract-provider/api/v1/offices?tenantIdentifier=default

version: '3.8'

services:
  # ─── MySQL 8 — Fineract database ──────────────────────────────────────────
  fineract-mysql:
    image: mysql:8.0
    container_name: fineract-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${FINERACT_MYSQL_ROOT_PASSWORD:-fineract_root}
      MYSQL_DATABASE: fineract_tenants
      MYSQL_USER: ${FINERACT_DB_USER:-fineract}
      MYSQL_PASSWORD: ${FINERACT_DB_PASSWORD:-fineract_pass}
    ports:
      - "3306:3306"
    volumes:
      - fineract-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${FINERACT_MYSQL_ROOT_PASSWORD:-fineract_root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Apache Fineract — Core Banking Engine ────────────────────────────────
  fineract:
    image: apache/fineract:latest
    container_name: fineract
    restart: unless-stopped
    depends_on:
      fineract-mysql:
        condition: service_healthy
    environment:
      - FINERACT_HIKARI_JDBC_URL=jdbc:mysql://fineract-mysql:3306/fineract_tenants
      - FINERACT_HIKARI_USERNAME=${FINERACT_DB_USER:-fineract}
      - FINERACT_HIKARI_PASSWORD=${FINERACT_DB_PASSWORD:-fineract_pass}
      - FINERACT_DEFAULT_TENANTDB_HOSTNAME=fineract-mysql
      - FINERACT_DEFAULT_TENANTDB_PORT=3306
      - FINERACT_DEFAULT_TENANTDB_UID=${FINERACT_DB_USER:-fineract}
      - FINERACT_DEFAULT_TENANTDB_PWD=${FINERACT_DB_PASSWORD:-fineract_pass}
      - FINERACT_DEFAULT_TENANTDB_NAME=fineract_default
      - JAVA_TOOL_OPTIONS=-Xmx512m
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD", "curl", "-fks", "https://localhost:8443/fineract-provider/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

volumes:
  fineract-mysql-data:
