name: DEPLOY NOW — Plesk dP8RlShbOWNq
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-deploy-now.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"

    steps:
      - uses: actions/checkout@v4

      - name: Verify Plesk credentials
        run: |
          RESULT=$(curl -sk --max-time 10 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet><server><get><gen_info/></get></server></packet>')
          echo "Plesk auth: $RESULT" | head -c 200
          if echo "$RESULT" | grep -q "<status>ok</status>"; then
            echo "PLESK_OK=true" >> $GITHUB_ENV
            echo "✅ Plesk authenticated"
            # Extract server info
            echo "$RESULT" | grep -oP '<[a-z_]+>[^<]+<' | head -10
          else
            echo "❌ Plesk auth failed: $RESULT"
          fi

      - name: Run recover.sh via Plesk exec API
        if: env.PLESK_OK == 'true'
        run: |
          echo "🚀 Running recover.sh via Plesk..."
          
          # Plesk CLI exec via XML API
          SCRIPT='bash <(curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/recover.sh) 2>&1'
          
          RESULT=$(curl -sk --max-time 120 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
            <packet>
              <server>
                <exec>
                  <script>$SCRIPT</script>
                </exec>
              </server>
            </packet>")
          echo "Exec result: $RESULT" | head -c 2000

      - name: Try Plesk SSH via API
        if: env.PLESK_OK == 'true'
        run: |
          # Get SSH credentials via Plesk
          RESULT=$(curl -sk --max-time 10 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <site>
                <get>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <dataset><gen_info/><hosting/></dataset>
                </get>
              </site>
            </packet>')
          echo "Site info: $RESULT" | head -c 500

      - name: Get Plesk session cookie and use file manager
        if: env.PLESK_OK == 'true'
        run: |
          # Get a session login URL from Plesk API
          SESSION_URL=$(curl -sk --max-time 10 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <session><create><user-login>admin</user-login></create></session>
            </packet>')
          echo "Session result: $SESSION_URL"
          
          # Extract session ID
          SID=$(echo "$SESSION_URL" | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "Session ID: $SID"
          
          if [ -n "$SID" ]; then
            # Use session to access Plesk file manager and write to app.js
            echo "SESSION_ID=$SID" >> $GITHUB_ENV
          fi

      - name: Install sshpass and try SSH with Plesk-managed password
        run: |
          apt-get install -y sshpass 2>/dev/null | tail -1 || true
          
          # Get the system user password via Plesk API
          SYS_PASS=$(curl -sk --max-time 10 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <webspace>
                <get>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <dataset><gen_info/></dataset>
                </get>
              </webspace>
            </packet>')
          echo "Webspace: $SYS_PASS" | head -c 300

      - name: Final score check
        run: |
          S=$SERVER; P=0; F=0
          t() {
            r=$(eval "$2" 2>&1|head -c 200)
            echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }
          }
          t "HTTP 301"    "curl -s -o/dev/null -w '%{http_code}' http://dlbtrust.cloud/"                                        "301"
          t "Wallets"     "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                      "wallet_id"
          t "ACH health"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"                  "openach_connected"
          t "Analytics"   "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"           "total_corpus"
          t "OpenACH UI"  "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OpenACH API" "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo "━━━ SCORE: $P/6 ━━━"
          [ $F -eq 0 ] && echo "🎉 PRODUCTION READY" || echo "⚠️ $F failing"
