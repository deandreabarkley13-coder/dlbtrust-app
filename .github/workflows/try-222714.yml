name: Try Credential 222714
on:
  push:
    branches: [main]
    paths: ['.github/workflows/try-222714.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Test 222714 as SSH root password
        id: ssh_222714
        continue-on-error: true
        run: |
          echo "Testing 222714 as SSH password..."
          RESULT=$(timeout 10 sshpass -p "222714" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=8 \
            -o PasswordAuthentication=yes \
            -o PreferredAuthentications=password \
            -o LogLevel=ERROR \
            root@$SERVER \
            "echo __SSH_OK__ && whoami && uptime" 2>&1)
          echo "Result: $RESULT"
          if echo "$RESULT" | grep -q "__SSH_OK__"; then
            echo "SSH_OK=true" >> $GITHUB_ENV
            echo "FOUND_PASS=222714" >> $GITHUB_ENV
            echo "✅✅✅ SSH SUCCESS WITH 222714"
          else
            echo "222714 failed as root SSH"
          fi

      - name: Test 222714 as Plesk admin password
        continue-on-error: true
        run: |
          RESULT=$(curl -sk --max-time 10 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: 222714" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet><server><get><gen_info/></get></server></packet>')
          echo "Plesk result: $RESULT" | head -c 300
          if echo "$RESULT" | grep -q "<status>ok</status>"; then
            echo "PLESK_OK=true" >> $GITHUB_ENV
            echo "✅✅✅ PLESK SUCCESS WITH 222714"
          fi

      - name: RUN FULL RECOVERY VIA SSH if connected
        if: env.SSH_OK == 'true'
        run: |
          echo "🚀 SSH CONNECTED — Running full recovery now..."
          sshpass -p "222714" ssh -o StrictHostKeyChecking=no root@$SERVER << 'SSHEOF'
            set -e
            echo "=== CONNECTED AS: $(whoami) ==="
            uptime

            echo "=== PM2 STATUS ==="
            pm2 list 2>/dev/null || echo "pm2 not in PATH"
            
            echo "=== APACHE STATUS ==="
            service apache2 status | head -5 2>/dev/null || echo "apache2 status failed"
            
            echo "=== DOCKER ==="
            docker ps 2>/dev/null | head -10
            
            echo "=== FIND APP ENTRY ==="
            APP=""
            for f in app.js server.js; do
              FOUND=$(find /var/www/vhosts/dlbtrust.cloud -name "$f" \
                -not -path "*/node_modules/*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then APP="$FOUND"; break; fi
            done
            echo "Live entry: $APP"
            echo "--- Content ---"
            cat "$APP" 2>/dev/null | head -40
            
            DIR=$(dirname "$APP")
            cd "$DIR"
            
            echo "=== GIT PULL ==="
            git pull origin main 2>&1 | tail -5
            
            echo "=== NPM INSTALL ==="
            npm install --production 2>&1 | tail -3
            
            echo "=== PATCH APP ENTRY ==="
            grep -q "openach-patch" "$APP" && echo "openach-patch already present" || {
              sed -i "s/app\.listen/require('.\/server\/openach-patch')(app, typeof db !== 'undefined' ? db : null);\napp.listen/" "$APP"
              echo "✅ openach-patch injected"
            }
            grep -q "analytics" "$APP" && echo "analytics already present" || {
              sed -i "s/app\.listen/app.use('\/api\/analytics', require('.\/server\/routes\/analytics'));\napp.listen/" "$APP"
              echo "✅ analytics injected"
            }
            
            echo "=== SET ENV VARS ==="
            grep -q "OPENACH_API_TOKEN" .env 2>/dev/null || cat >> .env << 'ENVEOF'
          OPENACH_BASE_URL=http://localhost/openach/api
          OPENACH_HOST_HEADER=ach.dlbtrust.cloud
          OPENACH_API_TOKEN=3caee1c2-c218-4959-b6d2-21d4b2a1b42e
          OPENACH_API_KEY=b74966cf-5276-4d8b-8650-5bd57dcee272
          PORT=3001
          ENVEOF
            echo "✅ .env updated"
            cat .env
            
            echo "=== RESTART PM2 ==="
            pm2 restart dlbtrust 2>/dev/null || \
              (pm2 delete all 2>/dev/null; pm2 start "$APP" --name dlbtrust); \
              pm2 save
            sleep 5
            pm2 list
            
            echo "=== DOCKER — INSERT OPENACH CREDENTIALS ==="
            CONTAINER=$(docker ps --format "{{.Names}}" | grep -i openach | head -1)
            echo "Container: $CONTAINER"
            if [ -n "$CONTAINER" ]; then
              docker start "$CONTAINER" 2>/dev/null || true
              sleep 2
              DB=$(docker exec "$CONTAINER" find /var/www/html -name "openach.db" 2>/dev/null | head -1)
              DB=${DB:-"/var/www/html/protected/runtime/db/openach.db"}
              docker exec "$CONTAINER" sqlite3 "$DB" \
                "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('4fc86059-2e7b-4732-b94f-e7c3715ee8d7', datetime('now'), '0eb26e1d-5fcc-4978-a132-dd93c2655429', '3caee1c2-c218-4959-b6d2-21d4b2a1b42e', 'b74966cf-5276-4d8b-8650-5bd57dcee272', 'enabled');"
              VERIFY=$(docker exec "$CONTAINER" sqlite3 "$DB" \
                "SELECT user_api_token, user_api_status FROM user_api;")
              echo "✅ Credentials: $VERIFY"
            fi
            
            echo "=== SELF-TEST ==="
            sleep 3
            echo "ACH health:"; curl -s http://localhost:3001/api/ach/health 2>/dev/null || curl -s http://localhost:3000/api/ach/health 2>/dev/null
            echo ""; echo "Analytics:"; curl -s http://localhost:3001/api/analytics/summary 2>/dev/null | head -c 150
            echo ""; echo "Wallets:"; curl -s http://localhost:3001/api/wallets 2>/dev/null | head -c 100
            echo ""; echo "OpenACH API:"; curl -s -X POST http://localhost/openach/api/connect \
              -H "Host: ach.dlbtrust.cloud" \
              --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          SSHEOF

      - name: Final validation (always runs)
        run: |
          S=$SERVER
          PASS=0; FAIL=0
          check() {
            r=$(eval "$2" 2>&1 | head -c 200)
            if echo "$r" | grep -q "$3"; then echo "✅ PASS: $1"; PASS=$((PASS+1));
            else echo "❌ FAIL: $1 | ${r:0:80}"; FAIL=$((FAIL+1)); fi
          }
          check "HTTP redirect"    "curl -s -o/dev/null -w '%{http_code}' http://dlbtrust.cloud/"                                   "301"
          check "HTTPS loads"      "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/"                             "html"
          check "Wallets API"      "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                  "wallet_id"
          check "Transactions API" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/transactions"             "type"
          check "ACH health"       "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"              "openach_connected"
          check "Analytics"        "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"       "total_corpus"
          check "OpenACH UI"       "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          check "OpenACH API"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SCORE: $PASS/8"
          [ $FAIL -eq 0 ] && echo "🎉 100% PRODUCTION READY — dlbtrust.cloud IS LIVE" \
                          || echo "⚠️  $FAIL test(s) still failing"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
