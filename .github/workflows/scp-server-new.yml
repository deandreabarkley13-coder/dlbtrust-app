name: SCP server-new.js + Start
on:
  push:
    branches: [main]
    paths: ['.github/workflows/scp-server-new.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"

    steps:
      - uses: actions/checkout@v4
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: SCP server-new.js to server httpdocs
        run: |
          # Copy our server-new.js to the server
          sshpass -p "$SSH_PASS" scp \
            -o StrictHostKeyChecking=no \
            server/templates/server-new.js \
            "$SSH_USER@$SERVER:/var/www/vhosts/dlbtrust.cloud/httpdocs/server-new.js"
          echo "SCP complete"

      - name: Start server-new.js via pm2
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'cd /var/www/vhosts/dlbtrust.cloud/httpdocs && pm2 stop dlbtrust-v2 2>/dev/null; pm2 delete dlbtrust-v2 2>/dev/null; pm2 start server-new.js --name dlbtrust-full; pm2 save; sleep 4; pm2 list' 2>&1

      - name: Insert OpenACH credentials
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'CONT=$(docker ps --format "{{.Names}}" | grep openach | head -1); [ -n "$CONT" ] && docker exec "$CONT" sqlite3 /var/www/html/protected/runtime/db/openach.db "INSERT OR IGNORE INTO user_api VALUES('"'"'4fc86059-2e7b-4732-b94f-e7c3715ee8d7'"'"',datetime('"'"'now'"'"'),'"'"'0eb26e1d-5fcc-4978-a132-dd93c2655429'"'"','"'"'3caee1c2-c218-4959-b6d2-21d4b2a1b42e'"'"','"'"'b74966cf-5276-4d8b-8650-5bd57dcee272'"'"','"'"'enabled'"'"');" 2>/dev/null && echo "OA creds inserted" || echo "OA: no container"' 2>&1

      - name: Test locally on server
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'sleep 3; curl -s http://localhost:3001/api/ach/health 2>/dev/null | head -c 100; echo ""; curl -s http://localhost:3001/api/analytics/summary 2>/dev/null | head -c 100; echo ""; curl -s http://localhost:3001/api/wallets 2>/dev/null | head -c 80' 2>&1

      - name: Final 8/8 score
        run: |
          sleep 3
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }; }
          t "HTTP 301"    "curl -s -o/dev/null -w '%{http_code}' http://dlbtrust.cloud/"                                           "301"
          t "Wallets"     "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                         "wallet_id"
          t "Transactions" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/transactions"                   "type"
          t "ACH health"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"                     "openach_connected"
          t "Analytics"   "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"              "total_corpus"
          t "OA UI"       "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""; echo "━━━ SCORE: $P/7 ━━━"
          [ $F -eq 0 ] && echo "🎉 PRODUCTION READY" || echo "⚠️ $F failing"
