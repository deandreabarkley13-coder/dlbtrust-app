name: Plesk REST v2 Deploy
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-rest-v2-deploy.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Get Plesk REST API key
        run: |
          # Try all Plesk REST API auth endpoints
          for endpoint in \
            "/api/v2/auth/keys" \
            "/api/v2/session" \
            "/api/v2/login"; do
            RESULT=$(curl -sk --max-time 8 \
              -X POST "$PLESK$endpoint" \
              -H "Content-Type: application/json" \
              -H "Authorization: Basic $(echo -n admin:$PLESK_PASS | base64)" \
              -d "{\"login\":\"admin\",\"password\":\"$PLESK_PASS\"}" 2>/dev/null)
            echo "$endpoint: $RESULT" | head -c 150
            echo ""
            
            KEY=$(echo "$RESULT" | grep -oP '(?<="key":")[^"]+' | head -1)
            if [ -n "$KEY" ]; then
              echo "API_KEY=$KEY" >> $GITHUB_ENV
              echo "✅ Got API key: $KEY"
              break
            fi
          done

      - name: Use Plesk REST API to manage Node.js app
        run: |
          BASE="$PLESK/api/v2"
          AUTH="Basic $(echo -n admin:$PLESK_PASS | base64)"
          
          # List domains
          curl -sk --max-time 8 "$BASE/domains" -H "Authorization: $AUTH" | head -c 200
          echo ""
          
          # List Node.js apps  
          for path in \
            "/domains/dlbtrust.cloud/apps" \
            "/domains/dlbtrust.cloud/apps/nodejs" \
            "/domains/dlbtrust.cloud/nodejs" \
            "/nodejs/apps"; do
            STATUS=$(curl -sk --max-time 6 "$BASE$path" -H "Authorization: $AUTH" \
              -o /tmp/r.txt -w "%{http_code}")
            echo "$path -> $STATUS | $(cat /tmp/r.txt | head -c 80)"
          done

      - name: Try Plesk node.js extension API
        run: |
          AUTH="Basic $(echo -n admin:$PLESK_PASS | base64)"
          
          # Plesk Node.js extension has its own API
          for endpoint in \
            "$PLESK/modules/nodejs/actions.php" \
            "$PLESK/modules/nodejs/ajax.php" \
            "$PLESK/modules/nodejs/index.php"; do
            STATUS=$(curl -sk --max-time 8 "$endpoint" \
              -H "Authorization: $AUTH" \
              -o /tmp/r.txt -w "%{http_code}")
            echo "$endpoint -> $STATUS | $(cat /tmp/r.txt | head -c 100)"
          done
          
          # Try restarting Node.js app
          RESTART=$(curl -sk --max-time 15 \
            "$PLESK/modules/nodejs/ajax.php" \
            -H "Authorization: $AUTH" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "action=restart&domain=dlbtrust.cloud")
          echo "Restart result: $RESTART"

      - name: Use Plesk session to call Node.js restart API
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          IP_B64=$(echo -n "$RUNNER_IP" | base64 -w0)
          
          SID=$(curl -sk --max-time 10 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<packet version=\"1.6.9.1\"><server><create_session><login>admin</login><data><user_ip>$IP_B64</user_ip><source_server></source_server></data></create_session></server></packet>" \
            | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "Session: $SID"
          
          if [ -n "$SID" ]; then
            # Try file manager write via session
            curl -sk --max-time 15 \
              "$PLESK/api/v2/domains/dlbtrust.cloud/files" \
              -H "Cookie: PHPSESSID=$SID" \
              -H "Content-Type: application/json" \
              -X PUT \
              -d '{"path":"/dlbtrust-v2/server.cjs","base64_content":"'"$(cat /tmp/server_patched.cjs 2>/dev/null | base64 -w0)"'"}' | head -c 200
            
            # Try Node.js restart via session
            for endpoint in \
              "/modules/nodejs/ajax.php" \
              "/admin/domain/dlbtrust.cloud/nodejs/restart"; do
              curl -sk --max-time 10 "$PLESK$endpoint" \
                -H "Cookie: PHPSESSID=$SID" \
                -d "action=restart&domain=dlbtrust.cloud" | head -c 100
              echo ""
            done
          fi

      - name: FINAL APPROACH — Change ownership via Plesk then write as system user
        run: |
          AUTH="Basic $(echo -n admin:$PLESK_PASS | base64)"
          
          # Try Plesk API to change file ownership
          RUNNER_IP=$(curl -s https://api.ipify.org)
          IP_B64=$(echo -n "$RUNNER_IP" | base64 -w0)
          
          SID=$(curl -sk --max-time 10 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<packet version=\"1.6.9.1\"><server><create_session><login>admin</login><data><user_ip>$IP_B64</user_ip><source_server></source_server></data></create_session></server></packet>" \
            | grep -oP '(?<=<id>)[^<]+' | head -1)
          
          # Use session to access Plesk file manager and change ownership/permissions
          # First get the file manager CSRF token
          FM_PAGE=$(curl -sk --max-time 10 \
            "$PLESK/modules/fileman/index.php" \
            -H "Cookie: PHPSESSID=$SID" -o /tmp/fm.html -w "%{http_code}")
          echo "File manager: $FM_PAGE"
          CSRF=$(grep -oP '(?<=csrf_token")[^"]*"[^"]*"([^"]+)"' /tmp/fm.html | head -1)
          echo "CSRF: $CSRF"
          
          # Try to change server.cjs permissions via file manager  
          CHMOD=$(curl -sk --max-time 10 \
            "$PLESK/modules/fileman/index.php" \
            -H "Cookie: PHPSESSID=$SID" \
            -X POST \
            -d "action=chmod&path=/dlbtrust-v2/server.cjs&mode=0777&recursive=false")
          echo "chmod result: $CHMOD" | head -c 200

      - name: Trigger Plesk Node.js restart via webspace update
        run: |
          # The Plesk webspace 'set' operation can trigger Node.js restart
          RESULT=$(curl -sk --max-time 30 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?>
            <packet version="1.6.9.1">
              <webspace>
                <set>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <values>
                    <prefs>
                      <www>true</www>
                    </prefs>
                  </values>
                </set>
              </webspace>
            </packet>')
          echo "Webspace set: $RESULT" | head -c 200

      - name: Final score
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"              "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"          "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"   "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""; echo "━━━ SCORE: $P/5 ━━━"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
