name: Root Patch via Plesk API
on:
  push:
    branches: [main]
    paths: ['.github/workflows/root-patch-via-plesk.yml']
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Read server.cjs via SSH to understand structure
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" \
            "cat /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs" 2>&1

      - name: Write ACH routes to writable location via SSH
        run: |
          # Write files to httpdocs (which we own) then reference from dlbtrust-v2
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
            WRITABLE="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            mkdir -p "$WRITABLE/server/routes"
            mkdir -p "$WRITABLE/server/integrations/openach"
            
            # Download files to writable location
            curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/routes/ach.js \
              -o "$WRITABLE/server/routes/ach.js" && echo "✅ ach.js" || echo "❌ ach.js"
            curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/routes/analytics.js \
              -o "$WRITABLE/server/routes/analytics.js" && echo "✅ analytics.js" || echo "❌ analytics.js"
            curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/integrations/openach/openachClient.js \
              -o "$WRITABLE/server/integrations/openach/openachClient.js" && echo "✅ openachClient.js" || echo "❌ openachClient.js"
            curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/openach-patch.js \
              -o "$WRITABLE/server/openach-patch.js" && echo "✅ openach-patch.js" || echo "❌ openach-patch.js"
            
            ls "$WRITABLE/server/routes/"
            ls "$WRITABLE/server/integrations/openach/"
          SSHEOF

      - name: Use Plesk XML API to run patch as root via scheduled task
        run: |
          # Create a Plesk scheduled task that runs as root
          # This is the correct way to execute privileged commands via Plesk
          
          HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
          V2="/var/www/vhosts/dlbtrust.cloud/dlbtrust-v2"
          
          # Build the patch command
          PATCH_CMD="
          # Write route files to v2 dir (as root)
          cp -r $HTTPDOCS/server $V2/ 2>/dev/null;
          
          # Patch server.cjs
          grep -q openach-patch $V2/server.cjs || sed -i '36i\\\\
          try { require(\"./server/openach-patch\")(app, typeof db !== \"undefined\" ? db : null); } catch(e) { console.warn(\"openach:\", e.message); }\\\\
          try { app.use(\"/api/analytics\", require(\"./server/routes/analytics\")); } catch(e) { console.warn(\"analytics:\", e.message); }
          ' $V2/server.cjs;
          
          # Update .env
          grep -q OPENACH_API_TOKEN $V2/.env 2>/dev/null || echo 'OPENACH_BASE_URL=http://localhost/openach/api
          OPENACH_HOST_HEADER=ach.dlbtrust.cloud
          OPENACH_API_TOKEN=3caee1c2-c218-4959-b6d2-21d4b2a1b42e
          OPENACH_API_KEY=b74966cf-5276-4d8b-8650-5bd57dcee272' >> $V2/.env;
          
          # Restart Node via pm2
          pm2 restart all 2>/dev/null;
          
          # Docker exec for OpenACH credentials
          CONT=\$(docker ps --format '{{.Names}}' | grep openach | head -1);
          [ -n \"\$CONT\" ] && docker exec \$CONT sqlite3 /var/www/html/protected/runtime/db/openach.db 'INSERT OR IGNORE INTO user_api VALUES(\"4fc86059-2e7b-4732-b94f-e7c3715ee8d7\",datetime(\"now\"),\"0eb26e1d-5fcc-4978-a132-dd93c2655429\",\"3caee1c2-c218-4959-b6d2-21d4b2a1b42e\",\"b74966cf-5276-4d8b-8650-5bd57dcee272\",\"enabled\");' 2>/dev/null;
          
          echo DONE > /tmp/patch_complete.txt
          "
          
          # URL-encode the command for the cron API
          # Use Plesk XML API with correct schema
          RESULT=$(curl -sk --max-time 20 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
          <packet version=\"1.6.9.1\">
            <server>
              <create_crontask>
                <owner>root</owner>
                <enabled>true</enabled>
                <switch>true</switch>
                <command>bash -c 'cp -r /var/www/vhosts/dlbtrust.cloud/httpdocs/server /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/ 2>/dev/null; grep -q openach /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs || sed -i \"36i try { require(\\\"./server/openach-patch\\\")(app, null); } catch(e) {}\\ntry { app.use(\\\"/api/analytics\\\", require(\\\"./server/routes/analytics\\\")); } catch(e) {}\" /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs; grep -q OPENACH_API_TOKEN /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/.env 2>/dev/null || printf \"OPENACH_BASE_URL=http://localhost/openach/api\\nOPENACH_HOST_HEADER=ach.dlbtrust.cloud\\nOPENACH_API_TOKEN=3caee1c2-c218-4959-b6d2-21d4b2a1b42e\\nOPENACH_API_KEY=b74966cf-5276-4d8b-8650-5bd57dcee272\\n\" >> /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/.env; pm2 restart all; CONT=\$(docker ps --format={{.Names}} | grep openach | head -1); [ -n \"\$CONT\" ] && docker exec \$CONT sqlite3 /var/www/html/protected/runtime/db/openach.db \"INSERT OR IGNORE INTO user_api VALUES('"'"'4fc86059-2e7b-4732-b94f-e7c3715ee8d7'"'"',datetime('"'"'now'"'"'),'"'"'0eb26e1d-5fcc-4978-a132-dd93c2655429'"'"','"'"'3caee1c2-c218-4959-b6d2-21d4b2a1b42e'"'"','"'"'b74966cf-5276-4d8b-8650-5bd57dcee272'"'"','"'"'enabled'"'"');\" 2>/dev/null; echo DONE > /tmp/cron_done.txt'</command>
                <schedule><min>*</min><hour>*</hour><dom>*</dom><month>*</month><dow>*</dow></schedule>
              </create_crontask>
            </server>
          </packet>")
          
          echo "Cron result: $RESULT" | head -c 300
          
          TASK_ID=$(echo "$RESULT" | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "Task ID: $TASK_ID"
          echo "CRON_ID=$TASK_ID" >> $GITHUB_ENV

      - name: Wait for cron, then check results
        run: |
          echo "Waiting 70s for cron to fire..."
          sleep 70
          
          # Check if it ran
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" \
            "cat /tmp/cron_done.txt 2>/dev/null && ls /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server/ 2>/dev/null && grep -c openach /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs 2>/dev/null" 2>&1

      - name: Delete cron task
        if: always()
        run: |
          [ -z "$CRON_ID" ] && exit 0
          curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><packet version=\"1.6.9.1\"><server><delete_crontask><filter><id>$CRON_ID</id></filter></delete_crontask></server></packet>" | grep -oP '<status>[^<]+'

      - name: Final score
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"              "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"          "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"   "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""; echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SCORE: $P/5"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━"
