name: Plesk Protos + Working Cron
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-protos-and-cron.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Get Plesk supported protocols
        run: |
          RESULT=$(curl -sk --max-time 10 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><server><get_protos/></server></packet>')
          echo "$RESULT" | grep -oP '<[^/][^>]+>' | sort -u | head -30

      - name: Try correct Plesk crontab format via server get
        run: |
          # First get current server tasks
          RESULT=$(curl -sk --max-time 10 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><server><get><gen_info/></get></server></packet>')
          echo "Server info: $RESULT" | head -c 300
          
          # Try crontab list
          RESULT2=$(curl -sk --max-time 10 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><server><get><crontab/></get></server></packet>')
          echo "Crontab list: $RESULT2" | head -c 300

      - name: Try Plesk CLI via PHP script upload
        run: |
          # Upload a PHP script to httpdocs and execute it via HTTP
          # The script will patch server.cjs as root via Plesk's internal plesk CLI
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
            HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            
            # Write a PHP script that uses shell_exec (if available in this PHP context)
            cat > "$HTTPDOCS/do_deploy.php" << 'PHPEOF'
          <?php
          // Deployment script - self-deletes after running
          $log = [];
          $v2 = '/var/www/vhosts/dlbtrust.cloud/dlbtrust-v2';
          $httpdocs = '/var/www/vhosts/dlbtrust.cloud/httpdocs';
          
          // Test if we can exec
          $whoami = shell_exec('whoami 2>&1');
          $log[] = "User: " . trim($whoami);
          
          // Copy server files
          $cp = shell_exec("cp -r $httpdocs/server $v2/ 2>&1");
          $log[] = "cp: $cp";
          
          // Patch server.cjs
          $content = file_get_contents("$v2/server.cjs");
          if ($content && strpos($content, 'openach-patch') === false) {
              $patch = "\ntry { require('./server/openach-patch')(app, null); } catch(e) { console.warn('openach:', e.message); }\ntry { app.use('/api/analytics', require('./server/routes/analytics')); } catch(e) { console.warn('analytics:', e.message); }\n";
              $content = str_replace("app.listen(", $patch . "app.listen(", $content);
              $result = file_put_contents("$v2/server.cjs", $content);
              $log[] = "Patched server.cjs: $result bytes";
          } else {
              $log[] = "server.cjs already patched or not readable";
          }
          
          // Update .env
          $env_content = file_get_contents("$v2/.env") ?: '';
          if (strpos($env_content, 'OPENACH_API_TOKEN') === false) {
              $env_add = "\nOPENACH_BASE_URL=http://localhost/openach/api\nOPENACH_HOST_HEADER=ach.dlbtrust.cloud\nOPENACH_API_TOKEN=3caee1c2-c218-4959-b6d2-21d4b2a1b42e\nOPENACH_API_KEY=b74966cf-5276-4d8b-8650-5bd57dcee272\n";
              $result = file_put_contents("$v2/.env", $env_content . $env_add);
              $log[] = ".env updated: $result bytes";
          }
          
          // Restart pm2
          $pm2 = shell_exec('pm2 restart all 2>&1 | tail -5');
          $log[] = "pm2: $pm2";
          
          // OpenACH credentials
          $cont = trim(shell_exec("docker ps --format '{{.Names}}' | grep openach | head -1 2>&1"));
          if ($cont) {
              $sql = "INSERT OR IGNORE INTO user_api VALUES('4fc86059-2e7b-4732-b94f-e7c3715ee8d7',datetime('now'),'0eb26e1d-5fcc-4978-a132-dd93c2655429','3caee1c2-c218-4959-b6d2-21d4b2a1b42e','b74966cf-5276-4d8b-8650-5bd57dcee272','enabled');";
              $docker = shell_exec("docker exec $cont sqlite3 /var/www/html/protected/runtime/db/openach.db \"$sql\" 2>&1");
              $log[] = "docker: $docker";
          }
          
          // Self-delete
          unlink(__FILE__);
          
          header('Content-Type: application/json');
          echo json_encode(['status' => 'done', 'log' => $log]);
          ?>
          PHPEOF
            chmod 755 "$HTTPDOCS/do_deploy.php"
            echo "✅ PHP deploy script written"
          SSHEOF

      - name: Execute the PHP deploy script via HTTP
        run: |
          echo "Executing PHP deploy script..."
          RESULT=$(curl -sk --max-time 30 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/do_deploy.php")
          echo "PHP result: $RESULT"
          
          if echo "$RESULT" | grep -q "done"; then
            echo "✅ PHP deploy executed!"
          else
            echo "❌ PHP script failed or server doesn't run PHP"
          fi

      - name: Wait and final score
        run: |
          sleep 8
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"              "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"          "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"   "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""; echo "━━━ SCORE: $P/5 ━━━"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
