name: Deploy with Server Password Secret

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SERVER: "74.208.191.205"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install sshpass
        run: apt-get install -y sshpass 2>/dev/null | tail -1 || true
      
      - name: SSH deploy using SERVER_PASSWORD secret
        run: |
          echo "Testing SERVER_PASSWORD secret..."
          RESULT=$(timeout 15 sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            -o PreferredAuthentications=password \
            -o LogLevel=ERROR \
            root@$SERVER \
            "echo __SSH_OK__ && whoami && uptime" 2>&1)
          
          echo "SSH result: $RESULT"
          
          if echo "$RESULT" | grep -q "__SSH_OK__"; then
            echo "✅ SSH SUCCESS with SERVER_PASSWORD secret"
            
            # Run full deployment
            sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh \
              -o StrictHostKeyChecking=no root@$SERVER << 'SSHEOF'
            echo "=== CONNECTED ==="
            whoami
            uptime
            
            echo "=== Finding app directory ==="
            APP=""
            for f in app.js server.js; do
              FOUND=$(find /var/www/vhosts/dlbtrust.cloud -name "$f" \
                -not -path "*/node_modules/*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then APP="$FOUND"; break; fi
            done
            echo "App: $APP"
            
            if [ -n "$APP" ]; then
              DIR=$(dirname "$APP")
              cd "$DIR"
              
              echo "=== git pull ==="
              git pull origin main 2>&1 | tail -5
              
              echo "=== npm install ==="
              npm install --production 2>&1 | tail -3
              
              echo "=== Verify analytics in app.js ==="
              grep -n "analytics" "$APP" && echo "ANALYTICS FOUND" || echo "ANALYTICS MISSING"
              
              echo "=== PM2 restart ==="
              pm2 restart dlbtrust 2>/dev/null || \
                (pm2 delete all 2>/dev/null; pm2 start "$APP" --name dlbtrust)
              pm2 save 2>/dev/null
              sleep 5
              pm2 list
              
              echo "=== Test endpoints ==="
              sleep 3
              echo "Analytics:"
              curl -s http://localhost:3001/api/analytics/summary | head -c 200
              echo ""
              echo "Wallets:"
              curl -s http://localhost:3001/api/wallets | head -c 100
            else
              echo "ERROR: app.js not found!"
              find /var/www /home /root -name "app.js" -not -path "*/node_modules/*" 2>/dev/null | head -10
            fi
SSHEOF
          else
            echo "❌ SSH FAILED with SERVER_PASSWORD secret"
            echo "Result: $RESULT"
          fi
      
      - name: Also test Plesk with SERVER_PASSWORD
        run: |
          PASS="${{ secrets.SERVER_PASSWORD }}"
          R=$(curl -sk --max-time 8 "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet><server><get><gen_info/></get></server></packet>' 2>/dev/null)
          
          if echo "$R" | grep -q "<status>ok</status>"; then
            echo "✅ PLESK SUCCESS with SERVER_PASSWORD"
            echo "$R" | head -c 200
          else
            echo "❌ Plesk failed with SERVER_PASSWORD"
            echo "Response: $R" | head -c 200
          fi
      
      - name: Final test
        run: |
          echo "=== Final Analytics Test ==="
          curl -sk --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/analytics/summary"
          echo ""
