name: FINAL 8/8 Deploy
on:
  push:
    branches: [main]
    paths: ['.github/workflows/final-8-8-master.yml', 'server/server-3002.js']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: SCP server-3002.js to server
        run: |
          sshpass -p "$SSH_PASS" scp \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            server/server-3002.js \
            "$SSH_USER@$SERVER:/var/www/vhosts/dlbtrust.cloud/httpdocs/server-3002.js"
          echo "SCP complete"

      - name: Start server-3002 on port 3002
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'bash -s' << 'SSHEOF'
          HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
          echo "=== Stop old user pm2 processes ==="
          pm2 delete dlbtrust 2>/dev/null || true
          pm2 delete dlbtrust-3002 2>/dev/null || true
          pm2 delete dlbtrust-full 2>/dev/null || true
          sleep 2
          echo "=== Start server-3002.js on port 3002 ==="
          PORT=3002 pm2 start "$HTTPDOCS/server-3002.js" --name dlbtrust-3002
          pm2 save
          sleep 5
          pm2 list
          echo "=== Test port 3002 ==="
          curl -s http://127.0.0.1:3002/api/ach/health 2>/dev/null | head -c 200
          echo ""
          curl -s http://127.0.0.1:3002/api/analytics/summary 2>/dev/null | head -c 200
          echo ""
          SSHEOF

      - name: Update vhost.conf to proxy all traffic to port 3002
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'bash -s' << 'SSHEOF'
          VHOST_CONF="/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf"
          printf 'ProxyRequests Off\nProxyPreserveHost On\nProxyPass / http://localhost:3002/\nProxyPassReverse / http://localhost:3002/\n<Proxy *>\n    Order deny,allow\n    Allow from all\n    Require all granted\n</Proxy>\nRewriteEngine On\nRewriteCond %{HTTP:Upgrade} websocket [NC]\nRewriteRule ^/?(.*) ws://localhost:3002/$1 [P,L]\n' > "$VHOST_CONF"
          echo "=== vhost.conf written ==="
          cat "$VHOST_CONF"
          SSHEOF

      - name: Insert OpenACH credentials via Docker
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" 'bash -s' << 'SSHEOF'
          echo "=== Find OpenACH Docker container ==="
          CONT=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -i openach | head -1)
          if [ -z "$CONT" ]; then
            echo "No openach container found, listing all:"
            docker ps --format "{{.Names}}" 2>/dev/null
            CONT=$(docker ps --format "{{.Names}}" 2>/dev/null | head -1)
          fi
          echo "Container: $CONT"
          echo "=== Find DB ==="
          DB_PATH=$(docker exec "$CONT" find / -name "openach.db" 2>/dev/null | head -1)
          echo "DB: $DB_PATH"
          if [ -n "$DB_PATH" ]; then
            echo "=== Insert credentials ==="
            docker exec "$CONT" sqlite3 "$DB_PATH" "INSERT OR REPLACE INTO user_api (id, created, user_id, user_api_token, user_api_key, status) VALUES('4fc86059-2e7b-4732-b94f-e7c3715ee8d7', datetime('now'), '0eb26e1d-5fcc-4978-a132-dd93c2655429', '3caee1c2-c218-4959-b6d2-21d4b2a1b42e', 'b74966cf-5276-4d8b-8650-5bd57dcee272', 'enabled');" 2>&1 && echo "INSERT OK"
            docker exec "$CONT" sqlite3 "$DB_PATH" "SELECT user_api_token, user_api_key, status FROM user_api;" 2>/dev/null
          else
            echo "DB not found, trying all containers"
            docker ps --format "{{.Names}}" 2>/dev/null | while read CNAME; do
              echo "--- $CNAME ---"
              docker exec "$CNAME" find / -name "*.db" 2>/dev/null | head -3
            done
          fi
          SSHEOF

      - name: Reload Apache via Plesk API
        run: |
          for SVC in httpd apache2; do
            RESULT=$(curl -sk --max-time 20 "$PLESK/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
              -H "Content-Type: text/xml" \
              -d "<?xml version=\"1.0\"?><packet version=\"1.6.9.1\"><server><srv_man><restart><service>${SVC}</service></restart></srv_man></server></packet>")
            echo "Plesk restart $SVC: ${RESULT:0:150}"
          done
          RESULT=$(curl -sk --max-time 20 "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><prefs><www>true</www></prefs></values></set></webspace></packet>')
          echo "Domain reconfigure: ${RESULT:0:150}"
          sleep 12

      - name: Final 8/8 validation
        run: |
          S=$SERVER
          P=0
          F=0
          pass() { echo "PASS: $1"; P=$((P+1)); }
          fail() { echo "FAIL: $1 | $2"; F=$((F+1)); }

          echo "=== 8/8 Production Tests ==="

          R=$(curl -s -o /dev/null -w '%{http_code}' http://dlbtrust.cloud/ 2>&1)
          echo "$R" | grep -q "301" && pass "HTTP 301 redirect" || fail "HTTP 301 redirect" "$R"

          R=$(curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/ 2>&1 | head -c 300)
          echo "$R" | grep -qi "html" && pass "HTTPS loads" || fail "HTTPS loads" "${R:0:80}"

          R=$(curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/wallets 2>&1 | head -c 300)
          echo "$R" | grep -q "wallet_id" && pass "Wallets API" || fail "Wallets API" "${R:0:80}"

          R=$(curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/transactions 2>&1 | head -c 300)
          echo "$R" | grep -q "type" && pass "Transactions API" || fail "Transactions API" "${R:0:80}"

          R=$(curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/ach/health 2>&1 | head -c 300)
          echo "$R" | grep -q "openach_connected" && pass "ACH health" || fail "ACH health" "${R:0:80}"

          R=$(curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/analytics/summary 2>&1 | head -c 300)
          echo "$R" | grep -q "total_corpus" && pass "Analytics summary" || fail "Analytics summary" "${R:0:80}"

          R=$(curl -sk --resolve "ach.dlbtrust.cloud:443:$S" https://ach.dlbtrust.cloud/openach/ -o /dev/null -w '%{http_code}' 2>&1)
          echo "$R" | grep -q "200" && pass "OA UI (HTTPS 200)" || fail "OA UI (HTTPS 200)" "$R"

          R=$(curl -sk --resolve "ach.dlbtrust.cloud:443:$S" -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272' 2>&1 | head -c 300)
          echo "$R" | grep -q '"success":true' && pass "OA API connect" || fail "OA API connect" "${R:0:100}"

          echo ""
          echo "================================="
          echo "SCORE: $P/8"
          [ $F -eq 0 ] && echo "ALL 8/8 PASSING" || echo "$F FAILING"
          echo "================================="

          echo ""
          echo "=== Debug raw responses ==="
          echo "ACH:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/ach/health | head -c 400
          echo ""
          echo "Analytics:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/analytics/summary | head -c 400
          echo ""
          echo "OA API:"
          curl -sk --resolve "ach.dlbtrust.cloud:443:$S" -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272' | head -c 400
          echo ""
