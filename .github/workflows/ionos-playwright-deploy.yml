name: Simple SSH Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: false
        default: "deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Test SSH connection
        run: |
          echo "Testing connectivity to dlbtrust.cloud server"
          nc -zv 74.208.191.205 22 2>&1 || echo "Port 22 check done"
          ssh-keyscan -H 74.208.191.205 2>/dev/null | head -5 || true

      - name: Try SSH with stored secret
        env:
          SERVER_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "Attempting SSH..."
          sshpass -p "$SERVER_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 root@74.208.191.205 "
            echo CONNECTED
            whoami
            docker ps --format {{.Names}} | grep openach | head -1
          " 2>&1 || echo "SSH attempt done"

