name: Minimal Dispatch Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Test with proper SNI
        run: |
          SERVER="74.208.191.205"
          
          echo "=== HTTP with proper Host ==="
          curl -v --max-time 10 -L "http://$SERVER/" \
            -H "Host: dlbtrust.cloud" 2>&1 | grep -E "< HTTP|Location:|Content-Length|Connected|Empty|timed"
          
          echo ""
          echo "=== HTTPS with proper SNI via --resolve ==="
          curl -v --max-time 10 -k \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/wallets" 2>&1 | grep -E "< HTTP|< Content|Connected|Empty|bytes|timed|TLS"
          
          echo ""
          echo "=== HTTPS wallets full response ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/wallets" | head -c 500
          
          echo ""
          echo "=== HTTPS main page ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/" | head -c 300
          
          echo ""
          echo "=== ACH health with SNI ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/ach/health"
          
          echo ""
          echo "=== OpenACH with SNI ==="
          curl -s --max-time 10 \
            --resolve "ach.dlbtrust.cloud:443:$SERVER" \
            "https://ach.dlbtrust.cloud/openach/api/connect" \
            -X POST \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          
          echo ""
          echo "=== Check if Node is responding on port 3000 via 127.0.0.1 internal ==="
          # Can't reach internal ports directly, but let's check apache proxy status
          curl -v --max-time 8 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/wallets" 2>&1 | tail -20

      - name: Try to get Apache/Node logs via HTTP
        run: |
          SERVER="74.208.191.205"
          
          echo "=== Check .htaccess or app status endpoints ==="
          curl -s --max-time 8 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/status" | head -c 200
          
          echo ""
          curl -s --max-time 8 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/health" | head -c 200
          
          echo ""
          echo "=== Try Plesk with SNI ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:8443:$SERVER" \
            "https://dlbtrust.cloud:8443/" | head -c 300
          
          echo ""
          echo "=== Try OpenACH admin login ==="
          curl -s --max-time 10 \
            --resolve "ach.dlbtrust.cloud:443:$SERVER" \
            "https://ach.dlbtrust.cloud/openach/" | head -c 400
