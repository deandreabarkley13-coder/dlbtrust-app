name: Minimal Dispatch Test

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Test all endpoints
        run: |
          SERVER="74.208.191.205"
          
          echo "=== PORT CONNECTIVITY ==="
          for port in 22 80 443 8443 3000 3001 8080 8888; do
            nc -zv $SERVER $port 2>&1 | grep -E "succeeded|refused|timeout" | head -1 || echo "Port $port: timeout"
          done
          
          echo ""
          echo "=== PLESK XML API - multiple passwords ==="
          PLESK="https://$SERVER:8443/enterprise/control/agent.php"
          XML='<?xml version="1.0"?><packet><server><get_protos/></server></packet>'
          
          for PASS in "Skunklemon78tut\$jupiter" "admin" "password" "Admin123" "Plesk1234" "1234567890" "Skunklemon78" "jupiter" "dlbtrust" "DlbTrust1!" "DlbTrust123"; do
            RESULT=$(curl -s --max-time 8 -k "$PLESK" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PASS" \
              -H "Content-Type: text/xml" \
              -d "$XML" 2>&1)
            CODE=$(echo "$RESULT" | grep -o "errcode>[0-9]*" | head -1)
            echo "Pass '$PASS': $CODE | ${RESULT:0:100}"
          done
          
          echo ""
          echo "=== PLESK REST API ==="
          for PASS in "Skunklemon78tut\$jupiter" "admin" "Admin123"; do
            RESULT=$(curl -s --max-time 8 -k \
              "https://$SERVER:8443/api/v2/servers/localhost" \
              -u "admin:$PASS" \
              -H "Accept: application/json" 2>&1)
            echo "REST Pass '$PASS': ${RESULT:0:150}"
          done
          
          echo ""
          echo "=== DLBTRUST APP DIRECT (no SSL) ==="
          curl -s --max-time 10 "http://$SERVER/" -H "Host: dlbtrust.cloud" | head -c 200 || echo "HTTP failed"
          
          echo ""
          echo "=== DLBTRUST APP HTTPS ==="
          curl -s --max-time 10 -k "https://$SERVER/" -H "Host: dlbtrust.cloud" | head -c 200 || echo "HTTPS failed"
          
          echo ""
          echo "=== DLBTRUST API WALLETS ==="
          curl -s --max-time 10 -k "https://$SERVER/api/wallets" -H "Host: dlbtrust.cloud" | head -c 300
          
          echo ""
          echo "=== DLBTRUST ACH HEALTH ==="
          curl -s --max-time 10 -k "https://$SERVER/api/ach/health" -H "Host: dlbtrust.cloud"
          
          echo ""
          echo "=== OPENACH DIRECT API ==="
          curl -s --max-time 10 "http://$SERVER/openach/api/connect" \
            -H "Host: ach.dlbtrust.cloud" \
            -X POST \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          
          echo ""
          echo "=== OPENACH HTTPS API ==="
          curl -s --max-time 10 -k "https://$SERVER/openach/api/connect" \
            -H "Host: ach.dlbtrust.cloud" \
            -X POST \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          
          echo ""
          echo "=== PLESK FILE MANAGER API ==="
          curl -s --max-time 10 -k \
            "https://$SERVER:8443/modules/fileman/index.php" \
            -u "admin:Skunklemon78tut\$jupiter" | head -c 200 || echo "failed"

      - name: Try Plesk SSH key reset
        env:
          SERVER_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "=== SSH ATTEMPTS ==="
          SERVER="74.208.191.205"
          
          # Try various users
          for USER in root admin dlbtrust ubuntu debian; do
            echo "Trying $USER with secret..."
            sshpass -p "$SERVER_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=8 $USER@$SERVER "echo CONNECTED as $USER" 2>&1 | head -3
          done
          
          echo ""
          echo "=== VERBOSE SSH ROOT ==="
          sshpass -p "$SERVER_PASS" ssh -vvv -o StrictHostKeyChecking=no -o ConnectTimeout=8 root@$SERVER "echo CONNECTED" 2>&1 | grep -E "debug1:|Authenticated|denied|Permission|auth" | head -20
