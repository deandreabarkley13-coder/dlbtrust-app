name: Patch Analytics Route — Live Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.js'
      - '.github/workflows/patch-analytics.yml'

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test current analytics state
        id: initial_test
        run: |
          echo "=== Testing /api/analytics/summary ==="
          RESULT=$(curl -sk --max-time 15 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/analytics/summary" 2>&1)
          echo "RESULT: $RESULT"
          
          if echo "$RESULT" | grep -q "total_corpus\|total_value\|corpus\|analytics"; then
            echo "ANALYTICS_OK=true" >> $GITHUB_ENV
            echo "✅ Analytics already working!"
          else
            echo "ANALYTICS_OK=false" >> $GITHUB_ENV
            echo "❌ Analytics not working — need to patch"
          fi

      - name: Try SSH patch and pm2 restart
        if: env.ANALYTICS_OK != 'true'
        continue-on-error: true
        run: |
          apt-get install -y sshpass 2>/dev/null || true
          
          APP_PATHS=(
            "/var/www/vhosts/dlbtrust.cloud/httpdocs/app.js"
            "/home/dlbtrust/httpdocs/app.js"
            "/root/dlbtrust-app/app.js"
            "/app/app.js"
            "$(find / -name app.js -path '*/dlbtrust*' 2>/dev/null | head -1)"
          )
          
          PATCH_SCRIPT='
          # Find the actual app.js
          APP_JS=""
          for p in /var/www/vhosts/dlbtrust.cloud/httpdocs/app.js /home/dlbtrust/httpdocs/app.js /root/dlbtrust-app/app.js /app/app.js; do
            if [ -f "$p" ]; then APP_JS="$p"; break; fi
          done
          
          if [ -z "$APP_JS" ]; then
            APP_JS=$(find /var/www /home /root /app -name app.js 2>/dev/null | grep -v node_modules | head -1)
          fi
          
          echo "Found app.js at: $APP_JS"
          
          if [ -n "$APP_JS" ]; then
            # Check if analytics route already exists
            if grep -q "analytics" "$APP_JS"; then
              echo "Analytics route already in app.js"
            else
              # Add analytics route before app.listen
              sed -i "s|// ─── Start Server|// ─── Analytics Routes ─────────────────────────────────────────────────────────\napp.use(\"/api/analytics\", require(\"./server/routes/analytics\"));\n\n// ─── Start Server|" "$APP_JS"
              echo "Added analytics route to app.js"
            fi
            
            cat "$APP_JS" | grep -A2 "analytics"
            
            # Also git pull to get latest code
            cd "$(dirname "$APP_JS")"
            git pull origin main 2>/dev/null || true
            
            # Restart pm2
            pm2 restart all 2>&1 || pm2 restart dlbtrust 2>&1 || node "$APP_JS" &
            echo "PM2 restart attempted"
            sleep 3
            pm2 list 2>/dev/null || true
          else
            echo "ERROR: app.js not found!"
          fi
          '
          
          for PASS in "Skunklemon78tut\$jupiter" "admin" "Admin123!" "DLBtrust1!" "Barkley2026!" "Trust2026!" "ionos2026" "ionos123" "Ionos123!"; do
            echo -n "Trying SSH with password: ${PASS:0:12}... "
            RESULT=$(timeout 12 sshpass -p "$PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=8 \
              -o PasswordAuthentication=yes \
              -o PreferredAuthentications=password \
              root@$SERVER \
              "$PATCH_SCRIPT" 2>&1)
            if echo "$RESULT" | grep -qE "app.js|analytics|pm2"; then
              echo "✅ SSH SUCCESS with password: $PASS"
              echo "$RESULT"
              echo "SSH_PASS=$PASS" >> $GITHUB_ENV
              break
            else
              echo "❌: $RESULT" | head -c 100
            fi
          done

      - name: Try git pull and restart via Plesk XML API
        if: env.ANALYTICS_OK != 'true' && env.SSH_PASS == ''
        continue-on-error: true
        run: |
          PLESK_URL="https://$SERVER:8443/enterprise/control/agent.php"
          
          # Script to pull latest code and restart
          PATCH_CMD='cd /var/www/vhosts/dlbtrust.cloud/httpdocs && git pull origin main 2>&1 && pm2 restart all 2>&1 | head -5'
          
          for PASS in "admin" "Admin123!" "DLBtrust1!" "Skunklemon78tut\$jupiter" "PleskAdmin1!" "Barkley2026!"; do
            echo "--- Testing Plesk password: ${PASS:0:12} ---"
            
            XML="<?xml version=\"1.0\"?>
            <packet version=\"1.6.7.0\">
              <server>
                <exec>
                  <script>$PATCH_CMD</script>
                </exec>
              </server>
            </packet>"
            
            RESULT=$(curl -sk --max-time 15 "$PLESK_URL" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PASS" \
              -H "Content-Type: text/xml" \
              -d "$XML" 2>/dev/null)
            
            echo "Response: $RESULT" | head -c 300
            
            if echo "$RESULT" | grep -q "<status>ok</status>"; then
              echo "✅ Plesk password found: $PASS"
              echo "PLESK_PASS=$PASS" >> $GITHUB_ENV
              break
            fi
          done

      - name: Direct file write via curl to live server
        if: env.ANALYTICS_OK != 'true'
        continue-on-error: true
        run: |
          # Try to trigger a git pull via a webhook or known endpoint
          # Check if there's a deploy webhook
          RESULT=$(curl -sk --max-time 15 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            -X POST "https://dlbtrust.cloud/deploy" \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}' 2>&1)
          echo "Deploy webhook: $RESULT" | head -c 200
          
          # Try common deploy endpoints
          for ENDPOINT in "/deploy" "/webhook" "/git-pull" "/pull" "/update"; do
            RESULT=$(curl -sk --max-time 8 \
              --resolve "dlbtrust.cloud:443:$SERVER" \
              -X POST "https://dlbtrust.cloud$ENDPOINT" \
              -H "Content-Type: application/json" \
              -d '{"branch":"main"}' 2>&1)
            echo "$ENDPOINT: ${RESULT:0:100}"
          done

      - name: Final verification
        run: |
          echo "=== Final Analytics Test ==="
          sleep 5
          RESULT=$(curl -sk --max-time 15 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/analytics/summary" 2>&1)
          echo "Analytics response: $RESULT"
          
          if echo "$RESULT" | grep -q "total_corpus\|total_value\|corpus"; then
            echo "✅ SUCCESS: Analytics endpoint working!"
          elif echo "$RESULT" | grep -q "{"; then
            echo "⚠️  Got JSON but may not have total_corpus: $RESULT"
          else
            echo "❌ Analytics still not working"
            echo "Current server response: $RESULT"
          fi
          
          echo ""
          echo "=== Other endpoints check ==="
          curl -sk --resolve "dlbtrust.cloud:443:$SERVER" "https://dlbtrust.cloud/api/wallets" | head -c 200
