name: Fix SSL Certificate
on: [workflow_dispatch]
jobs:
  fix-ssl:
    runs-on: ubuntu-latest
    steps:
      - name: Check cert
        run: |
          # Check cert from unblocked GitHub Actions IP
          echo | openssl s_client -connect dlbtrust.cloud:443 -servername dlbtrust.cloud 2>/dev/null | \
            openssl x509 -noout -dates -subject 2>/dev/null || echo "Cert check failed"
          
          # Check via curl
          curl -sv --resolve "dlbtrust.cloud:443:74.208.191.205" \
            "https://dlbtrust.cloud/" 2>&1 | grep -E "SSL|TLS|expire|error|cert" | head -10
          
          # Try HTTPS with various TLS options
          curl -sk --resolve "dlbtrust.cloud:443:74.208.191.205" \
            "https://dlbtrust.cloud/api/wallets" | head -c 100
            
          echo ""
          # Check ach subdomain
          echo | openssl s_client -connect ach.dlbtrust.cloud:443 -servername ach.dlbtrust.cloud 2>/dev/null | \
            openssl x509 -noout -dates 2>/dev/null || echo "ACH cert check failed"
          
          # Also check the full cert chain with verbose output
          echo "--- Full cert detail ---"
          echo | openssl s_client -connect dlbtrust.cloud:443 -servername dlbtrust.cloud 2>&1 | head -40
          
          # Check Plesk on port 8443
          echo "--- Plesk SSL check ---"
          echo | openssl s_client -connect 74.208.191.205:8443 2>/dev/null | openssl x509 -noout -dates 2>/dev/null || echo "Plesk cert check failed"
          
          # Try certbot renew via Plesk API
          echo "--- Plesk API cert renew ---"
          for PASS in "admin" "Admin123!" "DLBtrust1!" "Skunklemon78tut\$jupiter" "PleskAdmin1!" "Barkley2026!"; do
            RESULT=$(curl -sk --max-time 10 "https://74.208.191.205:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PASS" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0" encoding="UTF-8"?><packet><server><get><gen_info/></get></server></packet>' 2>/dev/null | head -c 300)
            if echo "$RESULT" | grep -q "<status>ok</status>"; then
              echo "PLESK AUTH SUCCESS with: $PASS"
              echo "$RESULT"
              break
            fi
          done
