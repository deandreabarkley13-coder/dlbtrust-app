name: Plesk File Patch — Direct app.js Edit
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-file-patch.yml']
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4

      - name: Get Plesk session ID
        run: |
          SID=$(curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <session><create><user-login>admin</user-login></create></session>
            </packet>' | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "Session ID: $SID"
          echo "PLESK_SID=$SID" >> $GITHUB_ENV

      - name: Find app.js path via Plesk
        run: |
          # Get webspace info to find document root
          RESULT=$(curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <webspace>
                <get>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <dataset><gen_info/><hosting/><prefs/></dataset>
                </get>
              </webspace>
            </packet>')
          echo "Webspace: $RESULT" | head -c 600
          
          # Extract document root
          DOCROOT=$(echo "$RESULT" | grep -oP '(?<=<www_root>)[^<]+' | head -1)
          echo "Doc root: $DOCROOT"
          echo "APP_DIR=$DOCROOT" >> $GITHUB_ENV

      - name: List app directory via Plesk file manager
        run: |
          # Use Plesk REST API to list files
          TOKEN=$(curl -sk --max-time 10 \
            "$PLESK/api/v2/auth/keys" \
            -H "Content-Type: application/json" \
            -d "{\"login\":\"admin\",\"password\":\"$PLESK_PASS\"}" \
            2>/dev/null | grep -oP ''"'"'(?<=key":")([^"]+)'"'" | head -1)
          echo "API Key: $TOKEN"
          
          if [ -z "$TOKEN" ]; then
            # Try alternative auth
            TOKEN=$(curl -sk --max-time 10 \
              -X POST "$PLESK/api/v2/auth/keys" \
              -H "Content-Type: application/json" \
              -u "admin:$PLESK_PASS" \
              2>/dev/null)
            echo "Alt token: $TOKEN" | head -c 200
          fi
          
          # List files
          curl -sk --max-time 10 \
            "$PLESK/api/v2/domains/dlbtrust.cloud/files" \
            -H "Authorization: Basic $(echo -n admin:$PLESK_PASS | base64)" \
            2>/dev/null | head -c 300

      - name: Read current app.js via Plesk REST API
        run: |
          # Plesk REST API for file operations
          curl -sk --max-time 10 \
            "$PLESK/api/v2/domains/dlbtrust.cloud/files/app.js" \
            -H "Authorization: Basic $(echo -n admin:$PLESK_PASS | base64)" \
            2>/dev/null | head -c 500
            
          # Also try the fileman endpoint
          curl -sk --max-time 10 \
            "$PLESK/modules/fileman/index.php?path=/var/www/vhosts/dlbtrust.cloud/httpdocs/app.js" \
            -H "Cookie: PLESKSESSID=$PLESK_SID" \
            2>/dev/null | head -c 300

      - name: Write patched app.js via Plesk
        run: |
          # Read current app.js from our repo as template
          CURRENT_APP=$(cat app.js)
          
          # Check if already patched
          if echo "$CURRENT_APP" | grep -q "openach-patch"; then
            echo "app.js already has openach-patch — just need git pull + restart on server"
          fi
          
          # Try Plesk CLI via XML API (different from server exec)
          RESULT=$(curl -sk --max-time 30 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet>
              <ui-extension>
                <call>
                  <id>node-app-manager</id>
                  <action>restart</action>
                  <domain>dlbtrust.cloud</domain>
                </call>
              </ui-extension>
            </packet>')
          echo "Node restart: $RESULT" | head -c 200

      - name: Use Plesk CLI to run shell command
        run: |
          # Plesk has a CLI tool called "plesk" on the server
          # We can access it via the Plesk XML API extension interface
          # Try using the Plesk Extension API
          
          # Method: Plesk php-handler extension
          CMD="cd /var/www/vhosts/dlbtrust.cloud/httpdocs && git pull origin main && npm install --production && grep -q openach-patch app.js || sed -i \"s/app\\.listen/require('.\/server\/openach-patch')(app,null);\\napp.listen/\" app.js && grep -q analytics app.js || sed -i \"s/app\\.listen/app.use('\/api\/analytics',require('.\/server\/routes\/analytics'));\\napp.listen/\" app.js && pm2 restart dlbtrust 2>/dev/null || pm2 start app.js --name dlbtrust && echo DONE"
          
          # Try via Plesk scheduled task (creates cron)
          RESULT=$(curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><packet>
              <server>
                <create_crontask>
                  <owner>root</owner>
                  <enabled>true</enabled>
                  <command>$CMD</command>
                  <schedule><minute>*</minute><hour>*</hour><dom>*</dom><month>*</month><dow>*</dow></schedule>
                </create_crontask>
              </server>
            </packet>")
          echo "Cron result: $RESULT" | head -c 300

      - name: Try Plesk SSH key management
        run: |
          # Plesk can manage SSH keys for the admin user
          # Add our public key to allow SSH access
          
          ssh-keygen -t ed25519 -f /tmp/deploy_key -N "" -C "github-actions-deploy"
          PUB_KEY=$(cat /tmp/deploy_key.pub)
          echo "Public key: $PUB_KEY"
          
          # Add via Plesk XML API
          RESULT=$(curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><packet>
              <server>
                <key>
                  <add>
                    <type>ssh</type>
                    <key>$PUB_KEY</key>
                    <comment>github-actions-deploy</comment>
                  </add>
                </key>
              </server>
            </packet>")
          echo "SSH key add: $RESULT" | head -c 300
          
          # Try SSH with the new key
          apt-get install -y sshpass 2>/dev/null | tail -1 || true
          sleep 3
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=8 \
            root@$SERVER \
            "echo SSH_WITH_KEY_OK && bash <(curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/recover.sh)" 2>&1 | head -50

      - name: Final score
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:70}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                      "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"                  "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"           "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo "━━━ SCORE: $P/5 ━━━"
          [ $F -eq 0 ] && echo "🎉 PRODUCTION READY" || echo "⚠️ $F failing"
