name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Plesk REST API spec and test webserver endpoints
        run: |
          echo "=== Plesk REST API paths ==="
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/swagger.json" \
            -u "admin:dP8RlShbOWNq" | python3 -c "
          import json,sys
          try:
            data=json.load(sys.stdin)
            paths=list(data.get('paths',{}).keys())
            for p in sorted(paths): print(p)
          except: print('failed to parse')
          " 2>&1 | head -60
          echo ""

          echo "=== Try server webserver endpoints ==="
          for ep in "server/webserver" "webserver" "server/services" "services" "server/restart" "domains/1/web-server" "domains/1/reconfigure"; do
            echo -n "$ep: "
            curl -sk --max-time 10 "https://dlbtrust.cloud:8443/api/v2/$ep" \
              -u "admin:dP8RlShbOWNq" | head -c 80
            echo ""
          done
