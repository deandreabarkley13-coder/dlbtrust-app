name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: websrvmng to regenerate Apache config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf

            echo "=== 1. Write vhost.conf ==="
            printf '%s\n' \
              '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>' \
              '  Options -Indexes' \
              '</Directory>' \
              'ProxyPreserveHost On' \
              'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPass / http://localhost:3002/' \
              'ProxyPassReverse / http://localhost:3002/' > $VHOST
            cat $VHOST

            echo "=== 2. Try websrvmng ==="
            ls -la /usr/local/psa/admin/bin/websrvmng 2>/dev/null || echo "websrvmng not found"
            /usr/local/psa/admin/bin/websrvmng --reconfigure-vhost=dlbtrust.cloud 2>&1 || true
            /usr/local/psa/admin/bin/websrvmng --reconfigure-all 2>&1 | head -5 || true

            echo "=== 3. Try apache-config ==="
            /usr/local/psa/admin/bin/apache-config 2>&1 | head -5 || true

            echo "=== 4. Try reconfig ==="
            /usr/local/psa/admin/bin/reconfig 2>&1 | head -5 || true

            echo "=== 5. Read generated Plesk Apache vhost config ==="
            cat /etc/apache2/plesk.conf.d/vhosts/dlbtrust.cloud.conf | grep -E "ProxyPass|proxy|3001|3002|3003|vhost\.conf|Include" | head -30

            sleep 3

            echo "=== 6. Final public test ==="
            ACH=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/ach/health)
            ANA=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/analytics/summary)
            echo "ACH: $ACH" | head -c 100; echo ""
            echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
            echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
            echo "=== DONE ==="
