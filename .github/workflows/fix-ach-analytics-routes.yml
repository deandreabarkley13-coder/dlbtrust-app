name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix vhost + plesk repair web to reload Apache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf

            echo "=== 1. Proxy3003 OK ==="
            curl -s --max-time 5 http://127.0.0.1:3003/api/ach/health | grep -q openach_connected && echo "ACH proxy OK"

            echo "=== 2. Write vhost.conf ==="
            printf '%s\n' \
              '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>' \
              '  Options -Indexes' \
              '</Directory>' \
              'ProxyPreserveHost On' \
              'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPass / http://localhost:3002/' \
              'ProxyPassReverse / http://localhost:3002/' > $VHOST
            echo "vhost.conf written"; cat $VHOST

            echo "=== 3. Run plesk repair web ==="
            /usr/sbin/plesk repair web dlbtrust.cloud -y 2>&1 || true
            sleep 5

            echo "=== 4. Test public endpoints ==="
            ACH=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/ach/health)
            ANA=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/analytics/summary)
            echo "ACH: $ACH" | head -c 200; echo ""
            echo "ANA: $ANA" | head -c 200; echo ""
            echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL (plesk repair failed)"
            echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL (plesk repair failed)"

            if ! echo "$ACH" | grep -q openach_connected; then
              echo "=== 5. plesk repair failed — try Plesk bin tools ==="
              ls /usr/local/psa/bin/ | grep -E "apache|web|reconf|domain" | head -10 || true
              /usr/local/psa/bin/httpdmng --reconfigure-vhost dlbtrust.cloud 2>&1 || true
              sleep 5
              curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS (httpdmng)" || echo "PUBLIC ACH: STILL FAIL"
            fi
            echo "=== DONE ==="
