name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Write generated conf + srv_man Apache restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
            PLESKCONF=/etc/apache2/plesk.conf.d/vhosts/dlbtrust.cloud.conf

            echo "=== 1. Write user vhost.conf ==="
            printf '%s\n' \
              '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>' '  Options -Indexes' '</Directory>' \
              'ProxyPreserveHost On' \
              'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPass / http://localhost:3002/' 'ProxyPassReverse / http://localhost:3002/' > $VHOST

            echo "=== 2. Check if generated conf is writable ==="
            ls -la $PLESKCONF 2>/dev/null || echo "Generated conf not readable"
            if [ -w "$PLESKCONF" ]; then
              echo "WRITABLE — inserting ProxyPass rules"
            else
              echo "NOT writable — will try alternative"
            fi

            echo "=== 3. Plesk API - srv_man Apache restart ==="
            curl -sk --max-time 30 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.9.1"><server><srv_man><action>restart</action><name>apache2</name></srv_man></server></packet>'
            echo ""

            sleep 5

            echo "=== 4. Check if our vhost.conf is included ==="
            cat $PLESKCONF | grep -E "Include|vhost\.conf|dlbtrust" | head -10 || true

            echo "=== 5. Read the generated conf ProxyPass lines ==="
            cat $PLESKCONF | grep -E "ProxyPass|proxy|3001|3002|3003" | head -20 || true

            echo "=== 6. Public test ==="
            curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
            curl -sk --max-time 10 https://dlbtrust.cloud/api/analytics/summary | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
            curl -sk --max-time 10 https://dlbtrust.cloud/api/wallets | grep -q wallet_id && echo "PUBLIC WALLETS: PASS" || echo "PUBLIC WALLETS: FAIL"
            echo "=== DONE ==="
