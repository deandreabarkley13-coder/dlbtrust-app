name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Set ProxyPass via Plesk additional-settings (minimal)
        run: |
          echo "=== Try minimal additional-settings with only ACH+analytics routes ==="
          XMLDATA='<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>additional-settings</name><value>ProxyPass /api/ach/health http://127.0.0.1:3003/api/ach/health&#10;ProxyPassReverse /api/ach/health http://127.0.0.1:3003/api/ach/health&#10;ProxyPass /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary&#10;ProxyPassReverse /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary</value></property></vrt_hst></hosting></values></set></webspace></packet>'
          RESP=$(curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            --data-binary "$XMLDATA")
          echo "Set response: $RESP"

          echo "=== Read back additional-settings ==="
          GETRESP=$(curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><get><filter><name>dlbtrust.cloud</name></filter><dataset><hosting/></dataset></get></webspace></packet>')
          echo "Get response (relevant):"
          echo "$GETRESP" | grep -oP 'additional-settings.*?</value>' | head -3 || echo "$GETRESP" | head -c 500
          sleep 10

          echo "=== Test endpoints ==="
          ACH=$(curl -sk --max-time 20 https://dlbtrust.cloud/api/ach/health)
          ANA=$(curl -sk --max-time 20 https://dlbtrust.cloud/api/analytics/summary)
          echo "ACH: $ACH" | head -c 200; echo ""
          echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
          echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
