name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Find Apache reload method and apply vhost fix
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            set -e
            VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf

            echo "=== 1. Confirm proxy3003 running ==="
            curl -s --max-time 5 http://127.0.0.1:3003/api/ach/health | grep -q openach_connected && echo "proxy3003 OK" || echo "proxy3003 not running"

            echo "=== 2. Write vhost.conf ==="
            printf '%s\n' \
              '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>' \
              '  Options -Indexes' \
              '</Directory>' \
              'ProxyPreserveHost On' \
              'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' \
              'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' \
              'ProxyPass / http://localhost:3002/' \
              'ProxyPassReverse / http://localhost:3002/' > $VHOST
            cat $VHOST

            echo "=== 3. Find Apache process and PID ==="
            pgrep -a apache2 | head -5 || true
            ls -la /var/run/apache2/ 2>/dev/null || ls -la /run/apache2/ 2>/dev/null || true
            cat /var/run/apache2/apache2.pid 2>/dev/null || cat /run/apache2/apache2.pid 2>/dev/null || echo "no pid file"

            echo "=== 4. Try every reload method ==="
            # Method A: send SIGUSR1 to apache2 parent PID (graceful restart)
            APID=$(cat /var/run/apache2/apache2.pid 2>/dev/null || cat /run/apache2/apache2.pid 2>/dev/null || echo "")
            if [ -n "$APID" ]; then
              kill -USR1 $APID 2>/dev/null && echo "SIGUSR1 sent to PID $APID" || echo "SIGUSR1 failed"
            fi

            # Method B: plesk CLI
            plesk repair web dlbtrust.cloud -y 2>/dev/null && echo "plesk repair OK" || true
            /usr/local/psa/bin/domain -u dlbtrust.cloud 2>/dev/null && echo "domain update OK" || true

            # Method C: Plesk API - correct webspace restart
            curl -sk --max-time 30 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><prefs><www>true</www></prefs></values></set></webspace></packet>'
            echo ""

            sleep 10

            echo "=== 5. Verify vhost.conf still correct ==="
            cat $VHOST

            echo "=== 6. Check if Apache read our vhost.conf ==="
            curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | head -c 300
            echo ""
            curl -sk --max-time 10 https://dlbtrust.cloud/api/analytics/summary | head -c 300
            echo ""

            curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
            curl -sk --max-time 10 https://dlbtrust.cloud/api/analytics/summary | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
            curl -sk --max-time 10 https://dlbtrust.cloud/api/wallets | grep -q wallet_id && echo "PUBLIC WALLETS: PASS" || echo "PUBLIC WALLETS: FAIL"
            echo "=== DONE ==="
