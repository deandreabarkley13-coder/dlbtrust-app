name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check if nginx is running and reload it
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 60s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            echo "=== 1. Is nginx running? ==="
            ps aux | grep nginx | grep -v grep | head -5 || echo "nginx NOT found in ps"
            ss -tlnp | grep -E "80|443|nginx" | head -10 || true
            echo "=== 2. Who is listening on 443? ==="
            ss -tlnp | grep 443 || true
            echo "=== 3. nginx or apache handling port 80? ==="
            ss -tlnp | grep ':80 ' || true
            echo "=== 4. Check nginx status ==="
            systemctl status nginx 2>/dev/null | head -5 || service nginx status 2>/dev/null | head -5 || echo "nginx service not found"
            echo "=== 5. Nginx reload via Plesk API ==="
            echo "will try from runner"
            echo "=== 6. Verify proxy3003 still running ==="
            pm2 list
            curl -s http://127.0.0.1:3003/api/ach/health | grep -q openach_connected && echo "3003 ACH: still OK" || echo "3003 ACH: LOST"
