name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Find + modify Plesk Apache config directly
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            set -e

            echo "=== 1. Find the real Plesk-generated vhost conf ==="
            PLESK_VHOST=$(find /etc/apache2/plesk.conf.d/vhosts/ -name "dlbtrust.cloud*" 2>/dev/null | head -1)
            echo "Plesk vhost conf: $PLESK_VHOST"
            if [ -z "$PLESK_VHOST" ]; then
              echo "Not found in vhosts — checking all plesk confs..."
              find /etc/apache2/plesk.conf.d/ -name "*.conf" 2>/dev/null | xargs grep -l "dlbtrust.cloud" 2>/dev/null | head -5
              # Check system vhosts conf
              find /var/www/vhosts/system/dlbtrust.cloud/ -name "*.conf" 2>/dev/null | head -5
              ls /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || true
            fi

            echo "=== 2. Read current vhost.conf inclusion in Apache ==="
            # Find which file includes our vhost.conf
            grep -r "vhost.conf\|dlbtrust.cloud/conf" /etc/apache2/ 2>/dev/null | grep -v ".bak" | head -10 || true
            grep -r "vhost.conf\|dlbtrust.cloud/conf" /var/www/vhosts/system/ 2>/dev/null | head -10 || true

            echo "=== 3. Check system vhost conf for ProxyPass ==="
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/vhost.conf 2>/dev/null || echo "(no system vhost.conf)"
            ls -la /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || true

            echo "=== 4. Can we write to system vhost conf? ==="
            SYS_VHOST=/var/www/vhosts/system/dlbtrust.cloud/conf/vhost.conf
            if [ -w "$SYS_VHOST" ]; then
              echo "YES — writing ProxyPass rules to system vhost.conf"
              printf '%s\n' \
                'ProxyPreserveHost On' \
                'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' \
                'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' \
                'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' \
                'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' \
                'ProxyPass / http://localhost:3002/' \
                'ProxyPassReverse / http://localhost:3002/' > $SYS_VHOST
              echo "Written OK"
            else
              echo "NOT writable (expected)"
            fi

            echo "=== 5. Check our vhost.conf is readable ==="
            MY_VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
            ls -la $MY_VHOST
            cat $MY_VHOST

            echo "=== 6. Try Plesk 'apache' binary ==="
            /usr/local/psa/bin/apache 2>&1 | head -5 || true
            ls /usr/local/psa/admin/bin/ 2>/dev/null | grep -E "apache|web|reconf" | head -10 || true

            echo "=== 7. Try Plesk API change properties to force regen ==="
            # Change something real (like www_root or ssl) to force Plesk to regenerate Apache config
            curl -sk --max-time 30 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>vhost_pref_php_handler_type</name><value>none</value></property></vrt_hst></hosting></values></set></webspace></packet>'
            echo ""
            sleep 3

            echo "=== 8. Public test ==="
            curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | head -c 100
            echo ""
            curl -sk --max-time 10 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
            curl -sk --max-time 10 https://dlbtrust.cloud/api/analytics/summary | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
            echo "=== DONE ==="
