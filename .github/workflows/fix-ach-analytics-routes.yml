name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Try correct Plesk Apache additional settings + get file API
        run: |
          echo "=== Read current webspace hosting config ==="
          curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><get><filter><name>dlbtrust.cloud</name></filter><dataset><hosting/></dataset></get></webspace></packet>' | python3 -c "
          import sys
          data = sys.stdin.read()
          # Print all property names and values
          import re
          props = re.findall(r'<name>([^<]+)</name>\s*<value>([^<]*)</value>', data)
          for name, val in props:
            print(f'{name}: {val[:80]}')
          "
          echo ""

          echo "=== Try get-file on httpd.conf via Plesk API ==="
          RESP=$(curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><get><filter><name>dlbtrust.cloud</name></filter><dataset><diskspace/></dataset></get></webspace></packet>')
          echo "$RESP" | head -c 500
          echo ""

          echo "=== Try Plesk API to set apache-proxy settings ==="
          # Try the 'apache_settings' or 'additional_apache_directives' property
          for PROPNAME in "apache_settings" "additional_apache_directives" "apache-additional-directives" "apache-reverse-proxy" "proxy-settings"; do
            echo -n "Testing $PROPNAME: "
            curl -sk --max-time 10 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d "<?xml version=\"1.0\"?><packet version=\"1.6.9.1\"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>${PROPNAME}</name><value>test</value></property></vrt_hst></hosting></values></set></webspace></packet>" | grep -oP 'status>\K[^<]+|errtext>\K[^<]+'
          done
