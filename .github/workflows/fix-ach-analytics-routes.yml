name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy proxy3003 and fix vhost.conf
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            set -e
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs
            VHOST=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
            echo "=== 1. Start proxy3003 if not running ==="
            if ! curl -s --max-time 3 http://127.0.0.1:3003/api/ach/health 2>/dev/null | grep -q openach_connected; then
              pm2 delete proxy3003 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > $DEST/proxy3003.js
              node --check $DEST/proxy3003.js && echo "JS syntax OK"
              pm2 start $DEST/proxy3003.js --name proxy3003
              sleep 4
            fi
            curl -s --max-time 5 http://127.0.0.1:3003/api/ach/health | grep -q openach_connected && echo "proxy3003 ACH OK" || exit 1
            curl -s --max-time 5 http://127.0.0.1:3003/api/analytics/summary | grep -q total_corpus && echo "proxy3003 ANA OK"
            echo "=== 2. Write vhost.conf ==="
            printf '%s\n' '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>' '  Options -Indexes' '</Directory>' 'ProxyPreserveHost On' 'ProxyPass /api/ach/health http://localhost:3003/api/ach/health' 'ProxyPassReverse /api/ach/health http://localhost:3003/api/ach/health' 'ProxyPass /api/analytics/summary http://localhost:3003/api/analytics/summary' 'ProxyPassReverse /api/analytics/summary http://localhost:3003/api/analytics/summary' 'ProxyPass / http://localhost:3002/' 'ProxyPassReverse / http://localhost:3002/' > $VHOST
            echo "vhost.conf:"; cat $VHOST
            echo "=== 3. Reload Apache — site cycle ==="
            curl -sk --max-time 20 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" -H "Content-Type: text/xml" -d '<?xml version="1.0"?><packet version="1.6.9.1"><site><set><filter><name>dlbtrust.cloud</name></filter><values><status>0</status></values></set></site></packet>'
            sleep 3
            curl -sk --max-time 20 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" -H "Content-Type: text/xml" -d '<?xml version="1.0"?><packet version="1.6.9.1"><site><set><filter><name>dlbtrust.cloud</name></filter><values><status>2</status></values></set></site></packet>'
            echo ""
            killall -HUP apache2 2>/dev/null || true
            sleep 8
            echo "=== 4. Public tests ==="
            ACH=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/ach/health)
            ANA=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/analytics/summary)
            WAL=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/wallets)
            echo "ACH: $ACH" | head -c 200; echo ""
            echo "ANA: $ANA" | head -c 200; echo ""
            echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
            echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
            echo "$WAL" | grep -q wallet_id && echo "PUBLIC WALLETS: PASS" || echo "PUBLIC WALLETS: FAIL"
            echo "=== DONE ==="
