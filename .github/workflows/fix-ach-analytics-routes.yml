name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      PATCHED_B64: ""
    steps:
      - name: Upload patched api-routes.cjs via Plesk filemng
        run: |
          echo "=== Upload patched api-routes.cjs ==="
          RESPONSE=$(curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\"?><packet version=\"1.6.9.1\"><filemng><put-file><domainname>dlbtrust.cloud</domainname><path>/dlbtrust-v2/api-routes.cjs</path><content>${PATCHED_B64}</content></put-file></filemng></packet>")
          echo "Upload response: $RESPONSE"
          echo "$RESPONSE" | grep -q "ok" && echo "UPLOAD OK" || echo "UPLOAD FAILED"

      - name: Restart Node.js server via SSH + test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 60s
          script: |
            export HOME=/var/www/vhosts/dlbtrust.cloud
            echo "=== Restart pm2 processes ==="
            pm2 restart all 2>/dev/null || true
            sleep 5
            echo "=== Test local endpoints ==="
            curl -s http://localhost:3002/api/ach/health | head -c 100
            echo ""
            curl -s http://localhost:3002/api/analytics/summary | head -c 100
            echo ""
            curl -s http://localhost:3001/api/ach/health | head -c 100
            echo ""

      - name: Test public endpoints
        run: |
          sleep 5
          ACH=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/ach/health)
          ANA=$(curl -sk --max-time 15 https://dlbtrust.cloud/api/analytics/summary)
          echo "ACH: $ACH" | head -c 200
          echo ""
          echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
          echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
