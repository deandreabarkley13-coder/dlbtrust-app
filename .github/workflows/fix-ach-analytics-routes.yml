name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Try FTP upload to dlbtrust-v2/api-routes.cjs + srv_man restart
        run: |
          echo "=== 1. FTP upload patched api-routes.cjs ==="
          # FTP as dlbtrust.cloud_h6zkwzag1ya should land in /var/www/vhosts/dlbtrust.cloud/
          # The dlbtrust-v2/ directory should be accessible
          curl -v --max-time 60 \
            --ftp-create-dirs \
            -u "dlbtrust.cloud_h6zkwzag1ya:Deploy2026!" \
            "ftp://74.208.191.205/dlbtrust-v2/api-routes.cjs" \
            --upload-file server/api-routes-patched.cjs 2>&1 | tail -20
          echo ""

          echo "=== 2. Try srv_man with operation as text ==="
          curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><server><srv_man><operation>restart</operation><id>web-server</id></srv_man></server></packet>'
          echo ""

          echo "=== 3. Test endpoints after FTP upload ==="
          sleep 15
          curl -sk --max-time 20 https://dlbtrust.cloud/api/ach/health | head -c 100; echo ""
          curl -sk --max-time 20 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
          curl -sk --max-time 20 https://dlbtrust.cloud/api/analytics/summary | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
