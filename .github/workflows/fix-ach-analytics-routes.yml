name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  upload-and-restart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload patched api-routes.cjs via Plesk filemng API
        run: |
          CONTENT=$(base64 -w0 server/api-routes-patched.cjs)
          echo "Content length: ${#CONTENT}"
          RESPONSE=$(curl -sk --max-time 60 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            --data-binary "<?xml version=\"1.0\"?><packet version=\"1.6.9.1\"><filemng><put-file><domainname>dlbtrust.cloud</domainname><path>/dlbtrust-v2/api-routes.cjs</path><content>${CONTENT}</content></put-file></filemng></packet>")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "ok" && echo "UPLOAD: SUCCESS" || echo "UPLOAD: FAILED"

      - name: Restart server via Plesk process restart API
        run: |
          # Try to restart the web server via Plesk
          RESP=$(curl -sk --max-time 60 \
            "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1"><server><srv_man><operation><restart/></operation><id>web-server</id></srv_man></server></packet>')
          echo "Restart response: $RESP"
          sleep 15

      - name: Test public endpoints
        run: |
          ACH=$(curl -sk --max-time 20 https://dlbtrust.cloud/api/ach/health)
          ANA=$(curl -sk --max-time 20 https://dlbtrust.cloud/api/analytics/summary)
          WAL=$(curl -sk --max-time 20 https://dlbtrust.cloud/api/wallets)
          echo "ACH: $ACH" | head -c 200; echo ""
          echo "ANA: $ANA" | head -c 200; echo ""
          echo "$ACH" | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
          echo "$ANA" | grep -q total_corpus && echo "PUBLIC ANALYTICS: PASS" || echo "PUBLIC ANALYTICS: FAIL"
          echo "$WAL" | grep -q wallet_id && echo "PUBLIC WALLETS: PASS" || echo "PUBLIC WALLETS: FAIL"
