name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Read httpd.conf + try Plesk get-file API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 60s
          script: |
            echo "=== 1. Read actual httpd.conf ==="
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/httpd.conf 2>/dev/null || echo "(cannot read)"
            echo "=== 2. Read vhost_nginx.conf ==="
            cat /var/www/vhosts/dlbtrust.cloud/conf/vhost_nginx.conf 2>/dev/null || echo "(no nginx vhost)"
            echo "=== 3. List system conf dir ==="
            ls -la /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || echo "(no system conf)"
            echo "=== 4. Check what process owns port 3002 ==="
            ss -tlnp | grep 3002 || true
            echo "=== 5. List pm2 processes for all users ==="
            ps aux | grep -E "pm2|node" | grep -v grep | head -10
