name: Fix ACH Analytics Routes
on:
  push:
    branches: [main]

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Try Plesk CLI execute API for Apache restart
        run: |
          echo "=== Try Plesk server/execute API ==="
          curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/api/v2/cli/run" \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params": ["service", "apache2", "graceful"]}' | head -c 300
          echo ""

          echo "=== Try POST to server restart ==="
          curl -sk --max-time 30 \
            -X POST "https://dlbtrust.cloud:8443/api/v2/server/webserver/restart" \
            -u "admin:dP8RlShbOWNq" | head -c 200
          echo ""

          echo "=== Try GET Plesk server status ==="
          curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/api/v2/server" \
            -u "admin:dP8RlShbOWNq" | head -c 300
          echo ""

          echo "=== Try Plesk API extensions ==="
          curl -sk --max-time 30 \
            "https://dlbtrust.cloud:8443/api/v2/" \
            -u "admin:dP8RlShbOWNq" | head -c 500
          echo ""

          sleep 5
          curl -sk --max-time 15 https://dlbtrust.cloud/api/ach/health | grep -q openach_connected && echo "PUBLIC ACH: PASS" || echo "PUBLIC ACH: FAIL"
