name: Plesk CLI — git pull + restart + docker exec
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-cli-deploy.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4

      - name: Get Plesk one-time login URL
        run: |
          # Get a session login URL we can use to access the UI
          RESULT=$(curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?>
            <packet version="1.6.9.1">
              <session>
                <create>
                  <user-login>admin</user-login>
                  <expires-after>3600</expires-after>
                </create>
              </session>
            </packet>')
          echo "Session result: $RESULT"
          SID=$(echo "$RESULT" | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "PLESK_SID=$SID" >> $GITHUB_ENV
          echo "Session ID: $SID"
          if [ -n "$SID" ]; then
            echo "Login URL: $PLESK/enterprise/control/main.php?PLESKSESSID=$SID"
          fi

      - name: Use Plesk CLI via correct XML (node-app restart)
        run: |
          # Correct Plesk XML for domain operations
          # Restart Node.js application via Plesk domain config
          RESULT=$(curl -sk --max-time 30 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?>
            <packet version="1.6.9.1">
              <site>
                <get>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <dataset><gen_info/><stat/></dataset>
                </get>
              </site>
            </packet>')
          echo "Site info: $RESULT" | head -c 400

      - name: Use Plesk Extension API for shell execution
        run: |
          # Plesk has an Extensions API that allows running CLI commands
          # Try the Plesk CLI wrapper
          for endpoint in \
            "enterprise/control/agent.php" \
            "api/v2/cli" \
            "modules/docker-manager/index.php" \
            "admin/server/app-vault"; do
            
            STATUS=$(curl -sk --max-time 8 \
              "$PLESK/$endpoint" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
              -o /tmp/resp.html -w "%{http_code}")
            echo "$endpoint -> $STATUS | $(cat /tmp/resp.html | head -c 60)"
          done

      - name: Add SSH key via Plesk hosting account
        run: |
          apt-get install -y sshpass 2>/dev/null | tail -1 || true
          ssh-keygen -t ed25519 -f /tmp/dk -N "" -C "deploy@github-actions"
          PUB=$(cat /tmp/dk.pub | base64 -w0)
          echo "Public key (b64): $PUB" | head -c 100
          
          # Add SSH key to dlbtrust.cloud hosting account
          RESULT=$(curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
            <packet version=\"1.6.9.1\">
              <server>
                <set>
                  <gen_settings>
                    <ssh-keys><add-key>$(cat /tmp/dk.pub)</add-key></ssh-keys>
                  </gen_settings>
                </set>
              </server>
            </packet>")
          echo "SSH key result: $RESULT" | head -c 300
          
          # Try SSH with key immediately
          sleep 2
          ssh -i /tmp/dk -o StrictHostKeyChecking=no -o ConnectTimeout=8 \
            root@$SERVER "echo KEY_OK && whoami" 2>&1

      - name: Try Plesk scheduled task (cron) — correct XML schema
        run: |
          # Use CORRECT Plesk cron XML schema
          # Run our fix command as a one-time cron (every minute for 1 execution)
          
          FIX_CMD="cd /var/www/vhosts/dlbtrust.cloud/httpdocs && git pull origin main 2>&1 && npm install --production 2>&1 && pm2 restart dlbtrust 2>/dev/null || pm2 start app.js --name dlbtrust && CONT=\$(docker ps --format '{{.Names}}' | grep openach | head -1) && docker exec \$CONT sqlite3 /var/www/html/protected/runtime/db/openach.db \"INSERT OR IGNORE INTO user_api VALUES('4fc86059-2e7b-4732-b94f-e7c3715ee8d7',datetime('now'),'0eb26e1d-5fcc-4978-a132-dd93c2655429','3caee1c2-c218-4959-b6d2-21d4b2a1b42e','b74966cf-5276-4d8b-8650-5bd57dcee272','enabled');\" && echo CRON_DONE > /tmp/deploy_done.txt"
          
          RESULT=$(curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?>
            <packet version=\"1.6.9.1\">
              <server>
                <create-task>
                  <name>dlbtrust-deploy</name>
                  <cmd>$FIX_CMD</cmd>
                  <user>root</user>
                  <mday>*</mday>
                  <month>*</month>
                  <wday>*</wday>
                  <hour>*</hour>
                  <min>*/1</min>
                </create-task>
              </server>
            </packet>")
          echo "Cron create result: $RESULT" | head -c 300
          
          # Wait for cron to run
          echo "Waiting 75 seconds for cron to execute..."
          sleep 75
          
          # Check if it ran
          CHECK=$(curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet><server><get-task-list/></server></packet>')
          echo "Task list: $CHECK" | head -c 300

      - name: Final score
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:70}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                      "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"                  "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"           "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""
          echo "━━━ SCORE: $P/5 ━━━"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
