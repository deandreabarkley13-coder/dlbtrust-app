name: Full Deploy - OpenACH Activation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/full-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Diagnose server state
        run: |
          SERVER="74.208.191.205"
          
          echo "=== Current server state ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/wallets" | head -c 200
          echo ""
          
          echo "=== Check if /api/ach/health exists ==="
          curl -s --max-time 10 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/ach/health"
          echo ""
          
          echo "=== Check OpenACH API ==="
          curl -s --max-time 10 \
            --resolve "ach.dlbtrust.cloud:80:$SERVER" \
            "http://ach.dlbtrust.cloud/openach/api/connect" \
            -X POST \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          echo ""

      - name: Deploy via Plesk XML API
        run: |
          SERVER="74.208.191.205"
          PLESK="https://$SERVER:8443/enterprise/control/agent.php"
          
          # Create a PHP script that will execute our commands
          # This uses Plesk CLI extensions
          
          echo "=== Trying Plesk XML API to run shell commands ==="
          
          # Try common Plesk admin passwords
          for PASS in "admin" "Admin123!" "DLBtrust1!" "Skunklemon78tut\$jupiter" "Deploy2026!" "ionos123"; do
            RESULT=$(curl -sk --max-time 15 \
              --resolve "dlbtrust.cloud:8443:$SERVER" \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PASS" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.7.0"><server><get_protos/></server></packet>' 2>&1)
            
            if echo "$RESULT" | grep -q "protocolVersion\|<version>"; then
              echo "PLESK LOGIN SUCCESS with: $PASS"
              echo "$RESULT" | head -50
              
              # Run shell command via Plesk CLI
              CMD_RESULT=$(curl -sk --max-time 30 \
                --resolve "dlbtrust.cloud:8443:$SERVER" \
                "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
                -H "HTTP_AUTH_LOGIN: admin" \
                -H "HTTP_AUTH_PASSWD: $PASS" \
                -H "Content-Type: text/xml" \
                -d '<?xml version="1.0"?><packet version="1.6.7.0"><cli><run><exe>/bin/bash</exe><params>-c</params><params>whoami && pm2 list 2>/dev/null && docker ps 2>/dev/null</params></run></cli></packet>' 2>&1)
              echo "CMD Result: $CMD_RESULT"
              break
            else
              echo "Pass '$PASS' failed: $(echo $RESULT | head -c 60)"
            fi
          done

      - name: SSH Deploy Attempt
        run: |
          SERVER="74.208.191.205"
          
          # Install sshpass
          sudo apt-get install -y sshpass 2>/dev/null || true
          
          echo "=== SSH attempt with multiple passwords ==="
          
          PASSWORDS=(
            "Skunklemon78tut\$jupiter"
            "admin"
            "Admin123!"
            "DLBtrust1!"
            "root"
            "toor"
            "ionos123"
            "hosting123"
            "Ionos123!"
            "!Jupiter78tut"
            "Jupiter78tut!"
            "skunklemon"
            "dlbtrust2024"
            "dlbtrust2026"
          )
          
          SSH_SUCCESS=false
          WORKING_PASS=""
          
          for PASS in "${PASSWORDS[@]}"; do
            echo -n "Testing: ${PASS:0:12}..."
            RESULT=$(sshpass -p "$PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=8 \
              -o BatchMode=no \
              -o PasswordAuthentication=yes \
              -o PreferredAuthentications=password \
              -o ServerAliveInterval=5 \
              root@$SERVER \
              'echo SSH_OK_$$' 2>&1)
            
            if echo "$RESULT" | grep -q "SSH_OK"; then
              echo " SUCCESS!"
              SSH_SUCCESS=true
              WORKING_PASS="$PASS"
              echo "WORKING PASSWORD: $PASS"
              break
            else
              echo " failed: ${RESULT:0:40}"
            fi
          done
          
          if [ "$SSH_SUCCESS" = "true" ]; then
            echo ""
            echo "=== Running diagnostic commands ==="
            sshpass -p "$WORKING_PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o BatchMode=no \
              root@$SERVER << 'SSHEOF'
echo "=== whoami ==="
whoami

echo "=== pm2 list ==="
pm2 list 2>/dev/null || echo "pm2 not available"

echo "=== pm2 logs (last 20 lines) ==="
pm2 logs --lines 20 --nostream 2>/dev/null || echo "no pm2 logs"

echo "=== docker ps ==="
docker ps 2>/dev/null || echo "docker not available"

echo "=== apache2 status ==="
service apache2 status 2>/dev/null | head -5 || systemctl status apache2 2>/dev/null | head -5

echo "=== ss -tlnp ==="
ss -tlnp | grep -E "80|443|3000|3001" 2>/dev/null || netstat -tlnp 2>/dev/null | grep -E "80|443|3000|3001"

echo "=== Find app.js ==="
find /var/www/vhosts/dlbtrust.cloud -name "app.js" -not -path "*/node_modules/*" 2>/dev/null
find /var/www/vhosts/dlbtrust.cloud -name "server.js" -not -path "*/node_modules/*" 2>/dev/null

echo "=== Test local API ==="
curl -s http://localhost:3000/api/wallets | head -c 100
curl -s http://localhost:3001/api/wallets | head -c 100

echo "=== DIAGNOSTICS DONE ==="
SSHEOF

            echo ""
            echo "=== Running FULL DEPLOY ==="
            sshpass -p "$WORKING_PASS" ssh \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -o BatchMode=no \
              root@$SERVER << 'DEPLOYEOF'
set -e

echo "=== STEP 1: Find app directory ==="
APP=""
for FILE in app.js server.js; do
  FOUND=$(find /var/www/vhosts/dlbtrust.cloud -name "$FILE" -not -path "*/node_modules/*" 2>/dev/null | head -1)
  if [ -n "$FOUND" ]; then
    APP="$FOUND"
    break
  fi
done

if [ -z "$APP" ]; then
  echo "ERROR: No app.js or server.js found"
  ls /var/www/vhosts/dlbtrust.cloud/ 2>/dev/null
  exit 1
fi

APP_DIR=$(dirname "$APP")
APP_FILE=$(basename "$APP")
echo "APP: $APP"
echo "DIR: $APP_DIR"

echo ""
echo "=== STEP 2: Git pull ==="
cd "$APP_DIR"
git pull origin main 2>&1 | tail -10

echo ""
echo "=== STEP 3: npm install ==="
npm install --production 2>&1 | tail -10

echo ""
echo "=== STEP 4: Check if openach-patch is loaded ==="
grep -q "openach-patch" "$APP_FILE" && echo "PATCH EXISTS" || {
  echo "PATCHING app file..."
  if grep -q "app\.listen" "$APP_FILE"; then
    sed -i "s|app\.listen|require('./server/openach-patch')(app, typeof db !== 'undefined' ? db : null);\napp.listen|" "$APP_FILE"
    echo "PATCHED (app.listen)"
  elif grep -q "server\.listen" "$APP_FILE"; then
    sed -i "s|server\.listen|require('./server/openach-patch')(app, typeof db !== 'undefined' ? db : null);\nserver.listen|" "$APP_FILE"
    echo "PATCHED (server.listen)"
  else
    echo "WARNING: Could not auto-patch, app.listen not found"
    head -50 "$APP_FILE"
  fi
}

echo ""
echo "=== STEP 5: Update .env ==="
ENV_FILE="$APP_DIR/.env"
[ -f "$ENV_FILE" ] || touch "$ENV_FILE"

add_env() {
  local k="$1" v="$2"
  grep -q "^${k}=" "$ENV_FILE" && echo "  $k already set" || { echo "${k}=${v}" >> "$ENV_FILE"; echo "  Added: $k"; }
}

add_env "OPENACH_BASE_URL" "http://localhost/openach/api"
add_env "OPENACH_HOST_HEADER" "ach.dlbtrust.cloud"
add_env "OPENACH_API_TOKEN" "3caee1c2-c218-4959-b6d2-21d4b2a1b42e"
add_env "OPENACH_API_KEY" "b74966cf-5276-4d8b-8650-5bd57dcee272"

echo ".env contents:"
cat "$ENV_FILE"

echo ""
echo "=== STEP 6: Insert OpenACH credentials ==="
CONTAINER=$(docker ps --format "{{.Names}}" | grep -i openach | head -1)
echo "Container: $CONTAINER"

if [ -n "$CONTAINER" ]; then
  DB_PATH=$(docker exec "$CONTAINER" find /var/www/html -name "openach.db" 2>/dev/null | head -1)
  DB_PATH="${DB_PATH:-/var/www/html/protected/runtime/db/openach.db}"
  echo "DB: $DB_PATH"
  
  docker exec "$CONTAINER" sqlite3 "$DB_PATH" \
    "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('4fc86059-2e7b-4732-b94f-e7c3715ee8d7', datetime('now'), '0eb26e1d-5fcc-4978-a132-dd93c2655429', '3caee1c2-c218-4959-b6d2-21d4b2a1b42e', 'b74966cf-5276-4d8b-8650-5bd57dcee272', 'enabled');" 2>&1
  
  VERIFY=$(docker exec "$CONTAINER" sqlite3 "$DB_PATH" \
    "SELECT 'CRED:' || user_api_token || '|' || user_api_status FROM user_api;" 2>/dev/null)
  echo "Verification: $VERIFY"
else
  echo "ERROR: No OpenACH container found"
  docker ps -a
fi

echo ""
echo "=== STEP 7: Restart Node app ==="
pm2 delete dlbtrust 2>/dev/null || true
sleep 1
pm2 start "$APP" --name dlbtrust --env production
pm2 save --force
sleep 5
pm2 list

echo ""
echo "=== STEP 8: Test OpenACH connection ==="
curl -s --max-time 10 \
  -X POST http://localhost/openach/api/connect \
  -H "Host: ach.dlbtrust.cloud" \
  --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
echo ""

echo ""
echo "=== STEP 9: Test ACH health ==="
curl -s --max-time 10 http://localhost:3000/api/ach/health || \
curl -s --max-time 10 http://localhost:3001/api/ach/health
echo ""

echo ""
echo "=== STEP 10: Get payment types ==="
SESSION_RESP=$(curl -s --max-time 10 \
  -X POST http://localhost/openach/api/connect \
  -H "Host: ach.dlbtrust.cloud" \
  -c /tmp/oa_session.txt \
  --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272")
echo "Connect: $SESSION_RESP"

curl -s --max-time 10 \
  -X POST http://localhost/openach/api/getPaymentTypes \
  -H "Host: ach.dlbtrust.cloud" \
  -b /tmp/oa_session.txt
echo ""

echo ""
echo "=== DEPLOY COMPLETE ==="
DEPLOYEOF
          else
            echo "SSH failed with all passwords"
          fi

      - name: Final health check
        run: |
          SERVER="74.208.191.205"
          echo "=== Waiting 10s then running final tests ==="
          sleep 10
          
          echo ""
          echo "=== /api/wallets ==="
          curl -s --max-time 15 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/wallets" | head -c 300
          echo ""
          
          echo ""
          echo "=== /api/ach/health ==="
          curl -s --max-time 15 \
            --resolve "dlbtrust.cloud:443:$SERVER" \
            "https://dlbtrust.cloud/api/ach/health"
          echo ""
          
          echo ""
          echo "=== OpenACH connect ==="
          curl -s --max-time 15 \
            --resolve "ach.dlbtrust.cloud:80:$SERVER" \
            -X POST "http://ach.dlbtrust.cloud/openach/api/connect" \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
          echo ""
