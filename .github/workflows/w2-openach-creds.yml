name: W2 OpenACH Credentials Insert
on:
  push:
    branches: [main]
    paths: ['.github/workflows/w2-openach-creds.yml']
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
    steps:
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true
      - name: Find container and insert credentials
        run: |
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
          echo "=== All docker containers ==="
          docker ps -a 2>/dev/null || sudo docker ps -a 2>/dev/null
          echo ""
          echo "=== Docker socket access ==="
          ls -la /var/run/docker.sock 2>/dev/null || echo "no docker.sock"
          echo ""
          echo "=== Try with sudo ==="
          sudo docker ps --format "{{.Names}}" 2>/dev/null | head -20
          echo ""
          echo "=== SQLite files on system ==="
          find /var/lib/docker /opt /srv /home -name "openach.db" 2>/dev/null | head -10
          find /var/lib/docker -name "openach.db" 2>/dev/null | head -5
          echo ""
          echo "=== Check all containers (any name) ==="
          sudo docker ps --format "{{.Names}} {{.Image}}" 2>/dev/null | head -20
          echo ""
          echo "=== User info ==="
          id
          groups
          SSHEOF
      - name: Test OA API via HTTPS
        run: |
          S=$SERVER
          curl -sk --resolve "ach.dlbtrust.cloud:443:$S" \
            -X POST "https://ach.dlbtrust.cloud/openach/api/connect" \
            --data "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272"
