name: Plesk FileManager Edit server.cjs
on:
  push:
    branches: [main]
    paths: ['.github/workflows/plesk-filemanager-edit.yml']
  workflow_dispatch:

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"
      PLESK: "https://74.208.191.205:8443"

    steps:
      - uses: actions/checkout@v4

      - name: Get Plesk session token
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          IP_B64=$(echo -n "$RUNNER_IP" | base64 -w0)
          
          SESSION=$(curl -sk --max-time 10 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d "<packet version=\"1.6.9.1\"><server><create_session><login>admin</login><data><user_ip>$IP_B64</user_ip><source_server></source_server></data></create_session></server></packet>")
          
          SID=$(echo "$SESSION" | grep -oP '(?<=<id>)[^<]+' | head -1)
          echo "Session: $SID"
          echo "SID=$SID" >> $GITHUB_ENV
          echo "Login URL: $PLESK/enterprise/rsession_init.php?PHPSESSID=$SID"

      - name: Read server.cjs via Plesk file manager API
        run: |
          [ -z "$SID" ] && { echo "No session"; exit 1; }
          
          # Try Plesk file manager endpoints
          for ENDPOINT in \
            "/api/v2/domains/dlbtrust.cloud/files/get?path=/dlbtrust-v2/server.cjs" \
            "/api/v2/files/get?domain=dlbtrust.cloud&path=/dlbtrust-v2/server.cjs" \
            "/modules/fileman/index.php?action=view&path=/dlbtrust-v2/server.cjs"; do
            
            echo "--- $ENDPOINT ---"
            curl -sk --max-time 8 "$PLESK$ENDPOINT" \
              -H "Cookie: PHPSESSID=$SID" \
              -H "Authorization: Basic $(echo -n admin:$PLESK_PASS | base64)" | head -c 200
            echo ""
          done

      - name: Get Plesk REST API access token
        run: |
          # Get API key for Plesk REST API
          TOKEN=$(curl -sk --max-time 10 \
            -X POST "$PLESK/api/v2/auth/keys" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $(echo -n admin:$PLESK_PASS | base64)" \
            -d '{"login":"admin","password":"'"$PLESK_PASS"'","description":"github-actions"}' 2>/dev/null)
          echo "Token response: $TOKEN" | head -c 300
          
          API_KEY=$(echo "$TOKEN" | grep -oP '(?<="key":")[^"]+' | head -1)
          echo "API Key: $API_KEY"
          echo "API_KEY=$API_KEY" >> $GITHUB_ENV

      - name: Use Plesk REST API to list and get file
        run: |
          # Try Plesk REST API file operations
          for AUTH in "Basic $(echo -n admin:$PLESK_PASS | base64)" "ApiKey $API_KEY"; do
            echo "--- Auth: $AUTH ---"
            curl -sk --max-time 8 "$PLESK/api/v2/domains" \
              -H "Authorization: $AUTH" | head -c 200
            echo ""
          done

      - name: Edit server.cjs via Plesk CLI tool
        run: |
          # Plesk CLI is available on the server via the XML API's plesk extension
          # Try: plesk exec to run a command
          
          # First read server.cjs
          READ=$(curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1">
              <server>
                <get>
                  <gen_info/>
                </get>
              </server>
            </packet>')
          echo "Server gen_info: $READ" | head -c 300
          
          # Try Plesk exec via different schema
          for schema in \
            '<packet version="1.6.9.1"><server><exec><script>cat /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs</script></exec></server></packet>' \
            '<packet version="1.6.9.1"><server><set><gen_settings><shell-exec>cat /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server.cjs</shell-exec></gen_settings></set></server></packet>'; do
            
            RESULT=$(curl -sk --max-time 10 \
              "$PLESK/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
              -H "Content-Type: text/xml" \
              -d "$schema")
            echo "Result: $RESULT" | head -c 200
            echo ""
          done

      - name: Write new server.cjs via Plesk XML webspace file operation
        run: |
          # Read current server.cjs from GitHub (our patched version)
          CURRENT=$(curl -s "https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/app.js" | head -50)
          
          # Try to write via Plesk XML API webspace file operations
          # This uses the Plesk 'ui-extension' API which may allow file writes
          curl -sk --max-time 15 \
            "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1">
              <webspace>
                <set>
                  <filter><name>dlbtrust.cloud</name></filter>
                  <values>
                    <hosting>
                      <vrt_hst>
                        <property>
                          <name>nodejs-app-url</name>
                          <value>dlbtrust-v2</value>
                        </property>
                      </vrt_hst>
                    </hosting>
                  </values>
                </set>
              </webspace>
            </packet>' | head -c 200

      - name: Final score
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:60}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"              "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"          "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"   "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""; echo "━━━ SCORE: $P/5 ━━━"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
