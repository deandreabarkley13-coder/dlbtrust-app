name: Deploy Treasury Management System
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via git clone/pull + PM2 restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 300s
          script: |
            HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            REPO_URL="https://github.com/deandreabarkley13-coder/dlbtrust-app.git"

            echo "=== Stop ALL old processes first ==="
            pm2 delete all 2>/dev/null || true
            pm2 kill 2>/dev/null || true
            PM2_HOME="/var/www/vhosts/dlbtrust.cloud/.pm2"
            rm -f "$PM2_HOME/dump.pm2" 2>/dev/null || true
            rm -f "$PM2_HOME/dump.pm2.bak" 2>/dev/null || true
            fuser -k 3005/tcp 2>/dev/null || true
            fuser -k 3002/tcp 2>/dev/null || true
            fuser -k 3001/tcp 2>/dev/null || true
            kill $(pgrep -f '/opt/dlbtrust-app/app.js') 2>/dev/null || true
            sleep 2

            echo "=== Setup git repo ==="
            if [ -d "$HTTPDOCS/.git" ]; then
              echo "Git repo exists, pulling latest..."
              cd "$HTTPDOCS"
              git fetch origin main 2>&1 | tail -3
              git reset --hard origin/main 2>&1 | tail -3
            else
              echo "Not a git repo — cloning fresh..."
              BACKUP="/var/www/vhosts/dlbtrust.cloud/httpdocs-backup-$(date +%s)"
              mv "$HTTPDOCS" "$BACKUP" 2>/dev/null || true
              git clone "$REPO_URL" "$HTTPDOCS" 2>&1 | tail -5
              if [ $? -ne 0 ]; then
                echo "ERROR: git clone failed — restoring backup"
                rm -rf "$HTTPDOCS" 2>/dev/null || true
                mv "$BACKUP" "$HTTPDOCS"
                exit 1
              fi
              if [ -d "$BACKUP/node_modules" ]; then
                echo "Copying existing node_modules..."
                cp -a "$BACKUP/node_modules" "$HTTPDOCS/" 2>/dev/null || true
              fi
            fi
            cd "$HTTPDOCS"
            echo "Current commit: $(git log --oneline -1)"

            echo "=== npm install ==="
            export HOME="/var/www/vhosts/dlbtrust.cloud"
            npm install --production --no-optional 2>&1 | tail -5 || echo "npm install completed with warnings"

            echo "=== Create database if needed ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'fineract_tenants'" | grep -q 1 || \
              PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE fineract_tenants" 2>&1 || echo "DB creation skipped"

            echo "=== Fix bond tables (add missing columns if needed) ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -c "
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS total_interest_paid NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS total_principal_paid NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS last_payment_date DATE;
              ALTER TABLE bond_transactions ADD COLUMN IF NOT EXISTS accrued_interest NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_transactions ADD COLUMN IF NOT EXISTS fineract_txn_id VARCHAR(100);
            " 2>&1 || echo "ALTER TABLE skipped (tables may not exist yet)"

            echo "=== Run migrations ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-postgres-full.sql 2>&1 | tail -5 || echo "migration 1 done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-docs-accounting.sql 2>&1 | tail -5 || echo "migration 2 done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-ach.sql 2>&1 | tail -5 || echo "migration 3 (ACH) done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-as2.sql 2>&1 | tail -5 || echo "migration 4 (AS2) done or skipped"

            echo "=== Restart Passenger (Plesk Node.js) ==="
            mkdir -p "$HTTPDOCS/tmp"
            touch "$HTTPDOCS/tmp/restart.txt"
            echo "Passenger restart signaled"

            echo "=== Start Treasury Management ==="
            PORT=3005 pm2 start "$HTTPDOCS/server/server-3002.js" --name dlbtrust-treasury
            pm2 save --force
            sleep 8
            pm2 list

            echo "=== Verify Treasury Endpoints ==="
            echo "Dashboard:"
            curl -s http://localhost:3005/ | head -c 200
            echo ""
            echo "Bonds:"
            curl -s http://localhost:3005/api/bonds | head -c 200
            echo ""
            echo "ACH Pipeline:"
            curl -s http://localhost:3005/api/ach-pipeline/status | head -c 200
            echo ""
            echo "AS2 Server:"
            curl -s http://localhost:3005/api/as2/dashboard | head -c 200
            echo ""

      - name: Configure nginx + Apache to proxy to treasury
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 60s
          script: |
            CONF_DIR="/var/www/vhosts/dlbtrust.cloud/conf"

            cat > "$CONF_DIR/vhost.conf" << 'VHOSTEOF'
            ProxyRequests Off
            ProxyPreserveHost On
            ProxyPass / http://localhost:3005/
            ProxyPassReverse / http://localhost:3005/
            <Proxy *>
                Order deny,allow
                Allow from all
                Require all granted
            </Proxy>
            RewriteEngine On
            RewriteCond %{HTTP:Upgrade} websocket [NC]
            RewriteRule ^/?(.*) ws://localhost:3005/$1 [P,L]
            VHOSTEOF
            echo "Apache vhost.conf updated"

            cat > "$CONF_DIR/vhost_nginx.conf" << 'NGINXEOF'
            location / {
                proxy_pass http://127.0.0.1:3005;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache off;
                proxy_buffering off;
            }
            NGINXEOF
            echo "Nginx vhost_nginx.conf updated — ALL traffic proxied to Express:3005"

            rm -rf /var/cache/nginx/* 2>/dev/null || true
            rm -rf /tmp/nginx_cache/* 2>/dev/null || true
            echo "Nginx cache cleared"

      - name: Rebuild Apache + Nginx via Plesk
        run: |
          curl -sk --max-time 30 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1">
              <server><srv_man><restart><service>httpd</service></restart></srv_man></server>
            </packet>' | head -c 200
          echo ""
          curl -sk --max-time 30 \
            "https://$SERVER:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: $PLESK_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0"?><packet version="1.6.9.1">
              <server><srv_man><restart><service>nginx</service></restart></srv_man></server>
            </packet>' | head -c 200
          echo ""

      - name: Final verification
        run: |
          sleep 8
          S=$SERVER
          echo "=== Treasury System Verification ==="
          echo "Homepage:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/ -o /dev/null -w "HTTP %{http_code}\n"
          echo "Bonds API:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/bonds | head -c 100
          echo ""
          echo "Documents API:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/documents/templates | head -c 100
          echo ""
          echo "Accounting API:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/accounting/dashboard | head -c 100
          echo ""
          echo "ACH Pipeline API:"
          curl -sk --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/ach-pipeline/status | head -c 100
          echo ""
