name: Deploy Treasury Management System
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SERVER: "74.208.191.205"
      PLESK_PASS: "dP8RlShbOWNq"

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via git clone/pull + PM2 restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 300s
          script: |
            HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            REPO_URL="https://github.com/deandreabarkley13-coder/dlbtrust-app.git"

            echo "=== Stop our PM2 processes ==="
            pm2 delete dlbtrust-treasury 2>/dev/null || true
            pm2 delete dlbtrust-3002 2>/dev/null || true
            fuser -k 3007/tcp 2>/dev/null || true
            sleep 1

            echo "=== Setup git repo ==="
            if [ -d "$HTTPDOCS/.git" ]; then
              echo "Git repo exists, pulling latest..."
              cd "$HTTPDOCS"
              git fetch origin main 2>&1 | tail -3
              git reset --hard origin/main 2>&1 | tail -3
            else
              echo "Not a git repo — cloning fresh..."
              BACKUP="/var/www/vhosts/dlbtrust.cloud/httpdocs-backup-$(date +%s)"
              mv "$HTTPDOCS" "$BACKUP" 2>/dev/null || true
              git clone "$REPO_URL" "$HTTPDOCS" 2>&1 | tail -5
              if [ $? -ne 0 ]; then
                echo "ERROR: git clone failed — restoring backup"
                rm -rf "$HTTPDOCS" 2>/dev/null || true
                mv "$BACKUP" "$HTTPDOCS"
                exit 1
              fi
              if [ -d "$BACKUP/node_modules" ]; then
                echo "Copying existing node_modules..."
                cp -a "$BACKUP/node_modules" "$HTTPDOCS/" 2>/dev/null || true
              fi
            fi
            cd "$HTTPDOCS"
            echo "Current commit: $(git log --oneline -1)"

            echo "=== npm install ==="
            export HOME="/var/www/vhosts/dlbtrust.cloud"
            npm install --production --no-optional 2>&1 | tail -5 || echo "npm install completed with warnings"

            echo "=== Create database if needed ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'fineract_tenants'" | grep -q 1 || \
              PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE fineract_tenants" 2>&1 || echo "DB creation skipped"

            echo "=== Fix bond tables (add missing columns if needed) ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -c "
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS total_interest_paid NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS total_principal_paid NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_balances ADD COLUMN IF NOT EXISTS last_payment_date DATE;
              ALTER TABLE bond_transactions ADD COLUMN IF NOT EXISTS accrued_interest NUMERIC(18,2) NOT NULL DEFAULT 0;
              ALTER TABLE bond_transactions ADD COLUMN IF NOT EXISTS fineract_txn_id VARCHAR(100);
            " 2>&1 || echo "ALTER TABLE skipped (tables may not exist yet)"

            echo "=== Run migrations ==="
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-postgres-full.sql 2>&1 | tail -5 || echo "migration 1 done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-docs-accounting.sql 2>&1 | tail -5 || echo "migration 2 done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-ach.sql 2>&1 | tail -5 || echo "migration 3 (ACH) done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-as2.sql 2>&1 | tail -5 || echo "migration 4 (AS2) done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-reports-gl-mappings.sql 2>&1 | tail -5 || echo "migration 5 (reports/GL mappings) done or skipped"
            PGPASSWORD=postgres psql -h localhost -U postgres -d fineract_tenants -f server/scripts/migrate-tax-engine.sql 2>&1 | tail -5 || echo "migration 6 (tax engine) done or skipped"

            echo "=== Restart Passenger (Plesk Node.js) ==="
            mkdir -p "$HTTPDOCS/tmp"
            touch "$HTTPDOCS/tmp/restart.txt"
            echo "Passenger restart signaled"

            echo "=== Start Treasury Management on port 3007 ==="
            TOKEN_FILE="/var/www/vhosts/dlbtrust.cloud/.admin_token"
            if [ -f "$TOKEN_FILE" ] && [ -s "$TOKEN_FILE" ]; then
              SAVED_TOKEN=$(cat "$TOKEN_FILE" | tr -d '[:space:]')
              echo "Using persisted admin token from $TOKEN_FILE"
            else
              SAVED_TOKEN="dlb-admin-2026-trust"
              echo "$SAVED_TOKEN" > "$TOKEN_FILE"
              chmod 600 "$TOKEN_FILE"
              echo "Set default admin token and saved to $TOKEN_FILE"
            fi
            export PORT=3007
            export FINERACT_URL=https://localhost:8444/fineract-provider/api/v1
            export ADMIN_SECRET_TOKEN="$SAVED_TOKEN"
            export PGPASSWORD=postgres
            export FINERACT_DB_HOST=localhost
            export FINERACT_DB_USER=postgres
            export FINERACT_DB_PASSWORD=postgres
            pm2 start "$HTTPDOCS/server/server-3002.js" --name dlbtrust-treasury --update-env
            sleep 5
            pm2 save --force
            pm2 list

            echo "=== Verify Treasury Endpoints (pre-Fineract) ==="
            echo "Dashboard:"
            curl -s http://localhost:3007/ | head -c 200
            echo ""
            echo "Bonds:"
            curl -s http://localhost:3007/api/bonds | head -c 200
            echo ""
            echo "ACH Pipeline:"
            curl -s http://localhost:3007/api/ach-pipeline/status | head -c 200
            echo ""
            echo "AS2 Server:"
            curl -s http://localhost:3007/api/as2/dashboard | head -c 200
            echo ""
            echo "Tax Engine:"
            curl -s http://localhost:3007/api/tax/dashboard | head -c 200
            echo ""

      - name: Configure nginx + Apache to proxy to treasury
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 60s
          script: |
            CONF_DIR="/var/www/vhosts/dlbtrust.cloud/conf"

            cat > "$CONF_DIR/vhost.conf" << 'VHOSTEOF'
            ProxyRequests Off
            ProxyPreserveHost On
            ProxyPass / http://localhost:3007/
            ProxyPassReverse / http://localhost:3007/
            <Proxy *>
                Order deny,allow
                Allow from all
                Require all granted
            </Proxy>
            RewriteEngine On
            RewriteCond %{HTTP:Upgrade} websocket [NC]
            RewriteRule ^/?(.*) ws://localhost:3007/$1 [P,L]
            VHOSTEOF
            echo "Apache vhost.conf updated"

            cat > "$CONF_DIR/vhost_nginx.conf" << 'NGINXEOF'
            location / {
                proxy_pass http://127.0.0.1:3007;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection "upgrade";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_cache off;
                proxy_buffering off;
            }
            NGINXEOF
            echo "Nginx vhost_nginx.conf updated — ALL traffic proxied to Express:3007"

            rm -rf /var/cache/nginx/* 2>/dev/null || true
            rm -rf /tmp/nginx_cache/* 2>/dev/null || true
            rm -rf /var/www/vhosts/dlbtrust.cloud/httpdocs/tmp/cache/* 2>/dev/null || true
            echo "Nginx and app caches cleared"

      - name: Update Plesk nginx proxy target to port 3007
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: root
          password: ${{ env.PLESK_PASS }}
          port: 22
          command_timeout: 60s
          script: |
            NGINX_CONF="/etc/nginx/plesk.conf.d/vhosts/dlbtrust.cloud.conf"
            echo "=== Current proxy_pass targets ==="
            grep -n "proxy_pass" "$NGINX_CONF" 2>/dev/null | head -10

            echo "=== Updating root location proxy_pass to 3007 ==="
            sed -i '/location \/ {/,/}/ s|proxy_pass http://127.0.0.1:[0-9]\+;|proxy_pass http://127.0.0.1:3007;|' "$NGINX_CONF"

            echo "=== Verify update ==="
            grep -n "proxy_pass" "$NGINX_CONF" 2>/dev/null | head -10

            echo "=== Reload nginx and restart Apache ==="
            systemctl reload nginx
            echo "nginx reload exit: $?"
            systemctl restart httpd 2>/dev/null || systemctl restart apache2 2>/dev/null || echo "Apache restart skipped"
            echo "Apache restart exit: $?"

      - name: Install Docker and start Fineract on production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: root
          password: ${{ env.PLESK_PASS }}
          port: 22
          command_timeout: 300s
          script: |
            echo "=== Check Docker ==="
            if ! command -v docker &>/dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
              echo "Docker installed"
            else
              echo "Docker already installed: $(docker --version)"
            fi

            echo "=== Start Fineract containers ==="
            HTTPDOCS="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            cd "$HTTPDOCS"

            # Check if Fineract is already running and healthy — skip recreate if so
            FINERACT_STATUS=$(docker inspect --format='{{.State.Health.Status}}' fineract 2>/dev/null || echo "missing")
            echo "Current Fineract status: $FINERACT_STATUS"

            if [ "$FINERACT_STATUS" = "healthy" ]; then
              echo "Fineract is already healthy — skipping container recreate"
              FINERACT_HOST_PORT=8444 docker compose up -d 2>&1 | tail -5
            else
              echo "Fineract not healthy ($FINERACT_STATUS) — full recreate..."
              docker compose down 2>&1 | tail -5 || true
              docker rm -f fineract fineract-db 2>/dev/null || true
              FINERACT_HOST_PORT=8444 docker compose up -d --force-recreate 2>&1 | tail -10
              echo "Waiting for Fineract to initialize (up to 5 min)..."
              for w in $(seq 1 10); do
                sleep 30
                S=$(docker inspect --format='{{.State.Health.Status}}' fineract 2>/dev/null || echo "missing")
                echo "  [$w/10] Fineract: $S"
                [ "$S" = "healthy" ] && break
              done
            fi
            docker ps --format 'table {{.Names}}\t{{.Status}}' | head -10

            echo "=== Verify Fineract ==="
            for i in 1 2 3; do
              echo "Health check attempt $i..."
              HEALTH=$(wget -qO- --no-check-certificate https://localhost:8444/fineract-provider/actuator/health 2>&1 | head -c 200)
              echo "$HEALTH"
              echo "$HEALTH" | grep -q '"UP"' && break
              [ "$i" -lt 3 ] && sleep 30
            done

            echo "=== Seed Fineract GL (idempotent — skips existing) ==="
            FINERACT_URL=https://localhost:8444/fineract-provider/api/v1 node "$HTTPDOCS/server/scripts/seed-fineract-gl.js" 2>&1 | tail -10 || echo "GL seed skipped (Fineract may not be ready)"

            echo "=== Restart PM2 so Fineract connection is live ==="
            su - dlbtrust.cloud_h6zkwzag1ya -c 'pm2 restart dlbtrust-treasury' 2>/dev/null || true
            sleep 5

            echo "=== Verify Fineract via Express ==="
            curl -s http://localhost:3007/api/fineract/health | head -c 200
            echo ""

      - name: Final verification
        run: |
          set +e
          sleep 8
          S=$SERVER
          echo "=== Treasury System Verification ==="
          echo "Homepage:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/ -o /dev/null -w "HTTP %{http_code}\n" || echo "(timeout/unreachable)"
          echo "Bonds API:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/bonds | head -c 100 || echo "(timeout)"
          echo ""
          echo "Documents API:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/documents/templates | head -c 100 || echo "(timeout)"
          echo ""
          echo "Accounting API:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/accounting/dashboard | head -c 100 || echo "(timeout)"
          echo ""
          echo "ACH Pipeline API:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/ach-pipeline/status | head -c 100 || echo "(timeout)"
          echo ""
          echo "Fineract Health:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/fineract/health | head -c 200 || echo "(timeout)"
          echo ""
          echo "Tax Engine:"
          curl -sk --max-time 10 --resolve "dlbtrust.cloud:443:$S" https://dlbtrust.cloud/api/tax/dashboard | head -c 200 || echo "(timeout)"
          echo ""
          echo "=== Verification complete ==="
