              head -n $((LISTEN_LINE-1)) "$SERVER_CJS" > /tmp/server_new.cjs
              cat /tmp/ach-analytics-patch.js >> /tmp/server_new.cjs
              tail -n +$LISTEN_LINE "$SERVER_CJS" >> /tmp/server_new.cjs
              cp /tmp/server_new.cjs "$SERVER_CJS"
