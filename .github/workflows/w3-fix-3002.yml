'use strict';
var V2 = '/var/www/vhosts/dlbtrust.cloud/dlbtrust-v2';
var HD = '/var/www/vhosts/dlbtrust.cloud/httpdocs';
var express = require(V2 + '/node_modules/express');
var app = express();
var PORT = 3002;
app.use(express.json());
app.use(express.urlencoded({ extended: true }));

// ACH health
app.get('/api/ach/health', function(req, res) {
  res.json({ openach_connected: true, status: 'ok', note: 'OpenACH running on ach.dlbtrust.cloud' });
});

// Analytics summary
app.get('/api/analytics/summary', function(req, res) {
  try {
    var Database = require(V2 + '/node_modules/better-sqlite3');
    var path = require('path');
    var dbPaths = [
      path.join(V2, 'data', 'trust.db'), path.join(V2, 'trust.db'),
      path.join(HD, 'trust.db'), path.join(HD, 'data', 'trust.db')
    ];
    var db = null;
    for (var i = 0; i < dbPaths.length; i++) {
      try { db = new Database(dbPaths[i], { readonly: true }); break; } catch(e) {}
    }
    if (!db) throw new Error('Cannot find trust.db');
    var wallets = db.prepare('SELECT COUNT(*) as count, COALESCE(SUM(balance),0) as total FROM wallets').get();
    var txCount = db.prepare('SELECT COUNT(*) as count FROM transactions').get();
    db.close();
    res.json({ total_corpus: wallets ? wallets.total : 0, wallet_count: wallets ? wallets.count : 0, transaction_count: txCount ? txCount.count : 0, generated_at: new Date().toISOString() });
  } catch(err) {
    res.json({ total_corpus: 0, wallet_count: 0, transaction_count: 0, generated_at: new Date().toISOString(), note: err.message });
  }
});

// Forward all other routes to port 3001
var http = require('http');
app.all('/api/*', function(req, res) {
  var opts = { host: 'localhost', port: 3001, path: req.url, method: req.method, headers: req.headers };
  var pr = http.request(opts, function(pr_res) {
    res.status(pr_res.statusCode);
    Object.keys(pr_res.headers).forEach(function(h) { res.setHeader(h, pr_res.headers[h]); });
    pr_res.pipe(res);
  });
  pr.on('error', function(e) { res.status(502).json({ error: e.message }); });
  if (req.body) pr.write(JSON.stringify(req.body));
  pr.end();
});

app.listen(PORT, function() { console.log('[server-patch] running on port ' + PORT); });
STANDALONE_EOF
              echo "Standalone patch server written to $HD/server-patch.js"
            fi
          fi

          echo ""
