name: OpenACH API Credentials Insert v2
on: [workflow_dispatch, push]
jobs:
  insert:
    runs-on: ubuntu-latest
    env:
      SERVER: "74.208.191.205"
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Full diagnostic of OpenACH container
        run: |
          sshpass -p "dP8RlShbOWNq" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o PasswordAuthentication=yes root@$SERVER '
            CONT=$(docker ps --format "{{.Names}}" | grep -i openach | head -1)
            echo "Container: $CONT"
            echo ""

            echo "=== Docker inspect (mounts) ==="
            docker inspect "$CONT" --format="{{json .Mounts}}" 2>/dev/null | python3 -m json.tool 2>/dev/null || docker inspect "$CONT" --format="{{json .Mounts}}" 2>/dev/null
            echo ""

            echo "=== Find ALL .db and .sqlite files ==="
            docker exec "$CONT" find / -maxdepth 6 -name "*.db" -o -name "*.sqlite" -o -name "*.sqlite3" 2>/dev/null | head -20
            echo ""

            echo "=== Check OpenACH config ==="
            docker exec "$CONT" cat /var/www/html/protected/config/db.php 2>/dev/null || echo "No db.php"
            docker exec "$CONT" cat /var/www/html/protected/config/main.php 2>/dev/null | grep -A3 "db" | head -10 || echo "No main.php db config"
            echo ""

            echo "=== OpenACH runtime dir ==="
            docker exec "$CONT" ls -laR /var/www/html/protected/runtime/ 2>/dev/null | head -30 || echo "No runtime dir"
            echo ""

            echo "=== Check if OpenACH uses MySQL instead ==="
            docker exec "$CONT" cat /var/www/html/protected/config/db.php 2>/dev/null | head -20
            echo ""

            echo "=== Docker compose / env vars ==="
            docker inspect "$CONT" --format="{{json .Config.Env}}" 2>/dev/null | tr "," "\n"
            echo ""

            echo "=== Other containers ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
          ' 2>&1
          echo ""
          echo "=== Done ==="

      - name: Test API via HTTPS
        if: always()
        run: |
          curl -sk --max-time 15 \
            -X POST https://ach.dlbtrust.cloud/openach/api/connect \
            -d "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272" 2>&1 | head -c 500
          echo ""
