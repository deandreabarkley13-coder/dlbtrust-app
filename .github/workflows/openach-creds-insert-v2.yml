name: OpenACH API Credentials Insert v2
on: [workflow_dispatch, push]
jobs:
  insert:
    runs-on: ubuntu-latest
    env:
      SERVER: "74.208.191.205"
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Deep OpenACH investigation
        run: |
          sshpass -p "dP8RlShbOWNq" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o PasswordAuthentication=yes root@$SERVER '
            CONT=openach-web-1

            echo "=== Web root contents ==="
            docker exec "$CONT" ls -la /home/www/openach/ 2>/dev/null | head -20
            echo ""

            echo "=== Config dir (mounted) ==="
            docker exec "$CONT" ls -la /home/www/openach/protected/config/ 2>/dev/null | head -20
            echo ""

            echo "=== All config files ==="
            docker exec "$CONT" find /home/www/openach/protected/config -type f 2>/dev/null
            echo ""

            echo "=== db.php ==="
            docker exec "$CONT" cat /home/www/openach/protected/config/db.php 2>/dev/null || echo "Not found"
            echo ""

            echo "=== main.php (db section) ==="
            docker exec "$CONT" cat /home/www/openach/protected/config/main.php 2>/dev/null | head -50
            echo ""

            echo "=== Runtime dir ==="
            docker exec "$CONT" ls -laR /home/www/openach/protected/runtime/ 2>/dev/null | head -30
            echo ""

            echo "=== Host-side runtime dir ==="
            ls -laR /opt/psa/var/modules/docker/stacks/openach/runtime/ 2>/dev/null | head -30
            echo ""

            echo "=== Host-side config dir ==="
            ls -la /opt/psa/var/modules/docker/stacks/openach/config/ 2>/dev/null
            cat /opt/psa/var/modules/docker/stacks/openach/config/db.php 2>/dev/null || echo "No db.php on host"
            echo ""

            echo "=== Find ALL db-related files in container ==="
            docker exec "$CONT" find / -maxdepth 8 \( -name "*.db" -o -name "*.sqlite" -o -name "db.php" -o -name "database*" \) 2>/dev/null | grep -v proc | head -20
            echo ""

            echo "=== Check if MySQL is running in container ==="
            docker exec "$CONT" ps aux 2>/dev/null | head -20
            echo ""

            echo "=== Check MySQL/MariaDB containers ==="
            docker ps -a --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
          ' 2>&1
          echo "=== Investigation complete ==="

      - name: Test API
        if: always()
        run: |
          curl -sk --max-time 15 -X POST https://ach.dlbtrust.cloud/openach/api/connect \
            -d "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272" 2>&1 | head -c 500
          echo ""
