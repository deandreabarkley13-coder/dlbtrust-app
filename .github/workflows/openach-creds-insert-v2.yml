name: OpenACH API Credentials Insert v2
on: [workflow_dispatch, push]
jobs:
  insert:
    runs-on: ubuntu-latest
    env:
      SERVER: "74.208.191.205"
      PLESK_ADMIN_PASSWORD: ${{ secrets.PLESK_ADMIN_PASSWORD }}
      OPENACH_API_TOKEN: ${{ secrets.OPENACH_API_TOKEN }}
      OPENACH_API_KEY: ${{ secrets.OPENACH_API_KEY }}
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Insert API credentials into OpenACH
        run: |
          sshpass -p "$PLESK_ADMIN_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o PasswordAuthentication=yes root@$SERVER '
            CONT=openach-web-1
            DB=/home/www/openach/protected/runtime/db/openach.db

            echo "=== user_api table schema ==="
            docker exec "$CONT" sqlite3 "$DB" ".schema user_api" 2>&1

            echo "=== Current rows ==="
            docker exec "$CONT" sqlite3 "$DB" "SELECT * FROM user_api LIMIT 5;" 2>&1

            echo "=== Column info ==="
            docker exec "$CONT" sqlite3 "$DB" "PRAGMA table_info(user_api);" 2>&1

            echo "=== Inserting credentials ==="
            docker exec "$CONT" sqlite3 "$DB" "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('"'"'4fc86059-2e7b-4732-b94f-e7c3715ee8d7'"'"', datetime('"'"'now'"'"'), '"'"'0eb26e1d-5fcc-4978-a132-dd93c2655429'"'"', '"'"'$OPENACH_API_TOKEN'"'"', '"'"'$OPENACH_API_KEY'"'"', '"'"'enabled'"'"');" 2>&1
            echo "Insert exit code: $?"

            echo "=== Verify insertion ==="
            docker exec "$CONT" sqlite3 "$DB" "SELECT * FROM user_api WHERE user_api_token='"'"'$OPENACH_API_TOKEN'"'"';" 2>&1

            echo "=== All rows after insert ==="
            docker exec "$CONT" sqlite3 "$DB" "SELECT user_api_token, user_api_key, user_api_status FROM user_api;" 2>&1
          ' 2>&1
          echo "=== Done ==="

      - name: Test API via HTTPS
        if: always()
        run: |
          sleep 2
          echo "=== Testing OpenACH API ==="
          RESULT=$(curl -sk --max-time 15 \
            -X POST https://ach.dlbtrust.cloud/openach/api/connect \
            -d "user_api_token=$OPENACH_API_TOKEN&user_api_key=$OPENACH_API_KEY" 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -q '"success":true'; then
            echo "SUCCESS: API credentials working!"
          else
            echo "API credentials not yet working"
          fi
