name: OpenACH API Credentials Insert v2
on: [workflow_dispatch, push]
jobs:
  insert:
    runs-on: ubuntu-latest
    env:
      SERVER: "74.208.191.205"
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Insert credentials via root SSH
        run: |
          echo "=== Root SSH with Plesk password ==="
          sshpass -p "dP8RlShbOWNq" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o PasswordAuthentication=yes root@$SERVER 'CONT=$(docker ps --format "{{.Names}}" | grep -i openach | head -1); DB=/var/www/html/protected/runtime/db/openach.db; echo "Container: $CONT"; if [ -n "$CONT" ]; then echo "=== Schema check ==="; docker exec "$CONT" sqlite3 "$DB" ".schema user_api" 2>&1 | head -5; echo "=== Inserting with explicit columns ==="; docker exec "$CONT" sqlite3 "$DB" "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('"'"'4fc86059-2e7b-4732-b94f-e7c3715ee8d7'"'"', datetime('"'"'now'"'"'), '"'"'0eb26e1d-5fcc-4978-a132-dd93c2655429'"'"', '"'"'3caee1c2-c218-4959-b6d2-21d4b2a1b42e'"'"', '"'"'b74966cf-5276-4d8b-8650-5bd57dcee272'"'"', '"'"'enabled'"'"');" 2>&1; echo "=== Verify ==="; docker exec "$CONT" sqlite3 "$DB" "SELECT user_api_token, user_api_key, user_api_status FROM user_api;" 2>&1; else echo "No container found"; docker ps; fi' 2>&1
          echo ""
          echo "=== Insert step complete ==="

      - name: Test API via HTTPS
        if: always()
        run: |
          echo "=== Testing OpenACH API ==="
          RESULT=$(curl -sk --max-time 15 \
            -X POST https://ach.dlbtrust.cloud/openach/api/connect \
            -d "user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272" 2>&1)
          echo "$RESULT"
          if echo "$RESULT" | grep -q '"success":true'; then
            echo "=== API CREDENTIALS WORKING ==="
          else
            echo "=== API credentials not yet working ==="
          fi
