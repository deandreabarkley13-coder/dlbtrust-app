name: SSH System User — Final Deploy
on:
  push:
    branches: [main]
    paths: ['.github/workflows/ssh-system-user-deploy.yml']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Explore server as system user
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
            echo "=== CONNECTED: $(whoami) ==="
            echo "=== HOME: $HOME ==="
            echo "=== FIND APP.JS ==="
            find /var/www/vhosts/dlbtrust.cloud -name "app.js" \
              -not -path "*/node_modules/*" 2>/dev/null | head -5
            
            echo "=== HTTPDOCS ==="
            ls -la /var/www/vhosts/dlbtrust.cloud/httpdocs/ | head -20
            
            echo "=== LIVE APP.JS ==="
            cat /var/www/vhosts/dlbtrust.cloud/httpdocs/app.js 2>/dev/null || \
              cat /var/www/vhosts/dlbtrust.cloud/httpdocs/server.js 2>/dev/null
            
            echo "=== .ENV ==="
            cat /var/www/vhosts/dlbtrust.cloud/httpdocs/.env 2>/dev/null || echo "no .env"
            
            echo "=== PM2 STATUS ==="
            /home/dlbtrust.cloud_h6zkwzag1ya/.local/bin/pm2 list 2>/dev/null || \
              pm2 list 2>/dev/null || \
              /usr/local/bin/pm2 list 2>/dev/null || \
              echo "pm2 not found in PATH"
            
            echo "=== WHICH PM2 ==="
            which pm2 2>/dev/null; find /usr /home -name pm2 2>/dev/null | head -5
            
            echo "=== DOCKER ACCESSIBLE ==="
            docker ps 2>/dev/null | head -5 || echo "docker not accessible as this user"
            
            echo "=== NODE VERSION ==="
            node --version 2>/dev/null
            npm --version 2>/dev/null
            
            echo "=== GIT STATUS ==="
            cd /var/www/vhosts/dlbtrust.cloud/httpdocs && git log --oneline -3 && git status
          SSHEOF

      - name: Patch app.js and restart via system user
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
            APP_DIR="/var/www/vhosts/dlbtrust.cloud/httpdocs"
            cd "$APP_DIR"
            
            echo "=== GIT PULL ==="
            git pull origin main 2>&1 | tail -5
            
            echo "=== APP.JS BEFORE PATCH ==="
            grep -n "listen\|openach\|analytics" app.js | head -10
            
            echo "=== PATCH app.js ==="
            grep -q "openach-patch" app.js && echo "openach-patch already present" || {
              sed -i "s/app\.listen/require('.\/server\/openach-patch')(app, typeof db !== 'undefined' ? db : null);\napp.listen/" app.js
              echo "✅ openach-patch injected"
            }
            
            grep -q "analytics" app.js && echo "analytics already present" || {
              sed -i "s/app\.listen/app.use('\/api\/analytics', require('.\/server\/routes\/analytics'));\napp.listen/" app.js
              echo "✅ analytics injected"
            }
            
            echo "=== APP.JS AFTER PATCH ==="
            grep -n "listen\|openach\|analytics" app.js | head -10
            
            echo "=== UPDATE .ENV ==="
            grep -q "OPENACH_API_TOKEN" .env 2>/dev/null || cat >> .env << 'ENVEOF'
          OPENACH_BASE_URL=http://localhost/openach/api
          OPENACH_HOST_HEADER=ach.dlbtrust.cloud
          OPENACH_API_TOKEN=3caee1c2-c218-4959-b6d2-21d4b2a1b42e
          OPENACH_API_KEY=b74966cf-5276-4d8b-8650-5bd57dcee272
          PORT=3001
          ENVEOF
            echo "✅ .env updated"
            
            echo "=== RESTART NODE APP ==="
            # Find pm2 in various locations
            PM2=$(which pm2 2>/dev/null || \
              find /usr /home -name pm2 -type f 2>/dev/null | head -1 || \
              echo "")
            
            if [ -n "$PM2" ]; then
              echo "pm2 found at: $PM2"
              $PM2 restart dlbtrust 2>/dev/null || $PM2 start app.js --name dlbtrust
              $PM2 save 2>/dev/null
              sleep 3
              $PM2 list
            else
              echo "pm2 not found — trying direct node"
              pkill -f "node app.js" 2>/dev/null; pkill -f "node server.js" 2>/dev/null
              sleep 1
              nohup node app.js > /tmp/dlbtrust-app.log 2>&1 &
              echo "Started node PID: $!"
            fi
            
            echo "=== SELF TEST ==="
            sleep 3
            curl -s http://localhost:3001/api/ach/health 2>/dev/null || \
              curl -s http://localhost:3000/api/ach/health 2>/dev/null || \
              echo "ACH health test failed"
            echo ""
            curl -s http://localhost:3001/api/analytics/summary 2>/dev/null | head -c 100 || echo "Analytics test failed"
          SSHEOF

      - name: Insert OpenACH credentials via sudo/docker
        run: |
          sshpass -p "$SSH_PASS" ssh \
            -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PasswordAuthentication=yes \
            "$SSH_USER@$SERVER" << 'SSHEOF'
            
            echo "=== DOCKER ACCESS ==="
            CONTAINER=$(docker ps --format "{{.Names}}" 2>/dev/null | grep -i openach | head -1)
            echo "Container: $CONTAINER"
            
            if [ -n "$CONTAINER" ]; then
              docker exec "$CONTAINER" sqlite3 \
                /var/www/html/protected/runtime/db/openach.db \
                "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('4fc86059-2e7b-4732-b94f-e7c3715ee8d7', datetime('now'), '0eb26e1d-5fcc-4978-a132-dd93c2655429', '3caee1c2-c218-4959-b6d2-21d4b2a1b42e', 'b74966cf-5276-4d8b-8650-5bd57dcee272', 'enabled');" 2>/dev/null
              VERIFY=$(docker exec "$CONTAINER" sqlite3 \
                /var/www/html/protected/runtime/db/openach.db \
                "SELECT user_api_token, user_api_status FROM user_api;" 2>/dev/null)
              echo "✅ Credentials: $VERIFY"
            else
              echo "Docker not accessible — trying sudo"
              echo "Deploy2026!" | sudo -S docker ps 2>/dev/null | head -5
            fi
          SSHEOF

      - name: Final production test
        run: |
          S=$SERVER; P=0; F=0
          t() { r=$(eval "$2" 2>&1|head -c 200); echo "$r"|grep -q "$3" && { echo "✅ $1"; P=$((P+1)); } || { echo "❌ $1|${r:0:70}"; F=$((F+1)); }; }
          t "Wallets"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"              "wallet_id"
          t "ACH health" "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"          "openach_connected"
          t "Analytics"  "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"   "total_corpus"
          t "OA UI"      "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' https://ach.dlbtrust.cloud/openach/ -o/dev/null -w '%{http_code}'" "200"
          t "OA API"     "curl -sk --resolve 'ach.dlbtrust.cloud:443:$S' -X POST https://ach.dlbtrust.cloud/openach/api/connect --data 'user_api_token=3caee1c2-c218-4959-b6d2-21d4b2a1b42e&user_api_key=b74966cf-5276-4d8b-8650-5bd57dcee272'" '"success":true'
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "SCORE: $P/5"
          [ $F -eq 0 ] && echo "🎉 100% PRODUCTION READY" || echo "⚠️ $F failing"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
