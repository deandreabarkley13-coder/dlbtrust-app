name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy proxy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs
            CONF=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
            RAW=https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/server-proxy.js

            echo "=== Step 0: Diagnose ports ==="
            ss -tlnp 2>/dev/null | grep -E ':300[0-9] ' || echo "no 300x ports visible via ss"
            netstat -tlnp 2>/dev/null | grep -E ':300[0-9] ' || echo "no 300x ports visible via netstat"

            echo "=== Step 1: Kill ALL old pm2 processes ==="
            pm2 kill 2>/dev/null || true
            sleep 1
            fuser -k 3002/tcp 2>/dev/null || true
            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2

            echo "=== After cleanup ==="
            ss -tlnp 2>/dev/null | grep -E ':300[0-9] ' || echo "no 300x ports after cleanup"

            echo "=== Step 2: Download proxy JS from repo ==="
            curl -sL "$RAW" -o "$DEST/server-proxy.js"
            echo "Downloaded. First 5 lines:"
            head -5 "$DEST/server-proxy.js"
            echo "Port line:"
            grep "PORT" "$DEST/server-proxy.js" | head -2

            echo "=== Step 3: Start with pm2 ==="
            pm2 start "$DEST/server-proxy.js" --name server-proxy --no-autorestart
            sleep 3
            pm2 list
            pm2 logs server-proxy --lines 10 --nostream 2>/dev/null || true

            echo "=== Port check ==="
            ss -tlnp 2>/dev/null | grep ':3003 ' && echo "PORT 3003 UP" || echo "PORT 3003 not via ss"
            netstat -tlnp 2>/dev/null | grep ':3003 ' && echo "PORT 3003 UP (netstat)" || echo "PORT 3003 not via netstat"
            curl -s --max-time 3 http://localhost:3003/ > /dev/null 2>&1 && echo "PORT 3003 responds" || echo "PORT 3003 no response"

            echo "=== Step 4: Test locally ==="
            echo "--- ACH health ---"
            curl -s --max-time 5 http://localhost:3003/api/ach/health || echo "CURL FAILED"
            echo ""
            echo "--- Analytics summary ---"
            curl -s --max-time 5 http://localhost:3003/api/analytics/summary || echo "CURL FAILED"
            echo ""
            curl -s --max-time 5 http://localhost:3003/api/ach/health | grep -q openach_connected && echo "ACH FIELD: OK" || echo "ACH FIELD: MISSING"
            curl -s --max-time 5 http://localhost:3003/api/analytics/summary | grep -q total_corpus && echo "ANALYTICS FIELD: OK" || echo "ANALYTICS FIELD: MISSING"

            echo "=== Step 5: Update vhost.conf ==="
            printf '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>\n  Options -Indexes\n</Directory>\nProxyPass / http://localhost:3003/\nProxyPassReverse / http://localhost:3003/\n' > "$CONF"
            echo "vhost.conf:"
            cat "$CONF"

            echo "=== Step 6: Reload Apache via Plesk ==="
            curl -sk --max-time 30 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><prefs><www>true</www></prefs></values></set></webspace></packet>'
            echo ""
            echo "Apache reload triggered"
            sleep 5

            echo "=== Step 7: Public HTTPS test ==="
            curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
            echo ""
            curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
            echo ""
            echo "=== DONE ==="
