name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Read Plesk Apache config and fix routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 120s
          script: |
            echo "=== 1. Read Plesk system vhost config ==="
            cat /etc/apache2/plesk.conf.d/vhosts/dlbtrust.cloud.conf 2>/dev/null || echo "Cannot read main vhost conf"

            echo ""
            echo "=== 2. List system conf dir ==="
            ls -la /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || echo "Cannot list system conf"

            echo ""
            echo "=== 3. Read each conf file in system dir ==="
            for f in /var/www/vhosts/system/dlbtrust.cloud/conf/*.conf 2>/dev/null; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f" 2>/dev/null || echo "(permission denied)"
                echo ""
              fi
            done

            echo "=== 4. Read our vhost.conf ==="
            cat /var/www/vhosts/dlbtrust.cloud/conf/vhost.conf 2>/dev/null || echo "No vhost.conf"

            echo ""
            echo "=== 5. Check if Plesk generated config includes our vhost.conf ==="
            grep -r "vhost.conf\|Include.*dlbtrust" /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || echo "Cannot grep"
            grep -r "vhost.conf\|Include.*dlbtrust" /etc/apache2/plesk.conf.d/vhosts/ 2>/dev/null || echo "Cannot grep etc"

            echo ""
            echo "=== 6. Check ProxyPass in ALL readable configs ==="
            grep -rn "ProxyPass" /var/www/vhosts/system/dlbtrust.cloud/conf/ 2>/dev/null || echo "Cannot grep system conf"
            grep -rn "ProxyPass" /etc/apache2/plesk.conf.d/vhosts/dlbtrust.cloud.conf 2>/dev/null || echo "Cannot grep etc conf"
            grep -rn "ProxyPass" /var/www/vhosts/dlbtrust.cloud/conf/ 2>/dev/null || echo "Cannot grep user conf"

            echo ""
            echo "=== 7. Proxy still running? ==="
            curl -s --max-time 3 http://127.0.0.1:3003/api/ach/health 2>/dev/null | head -c 100
            echo ""

            echo "DONE"
