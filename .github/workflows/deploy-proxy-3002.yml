name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose port 3002 Express app and find fix path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -x
            BASEDIR="/var/www/vhosts/dlbtrust.cloud"

            echo "=== 1. Port 3002 ACH/analytics responses ==="
            curl -s http://127.0.0.1:3002/api/ach/health 2>&1 | head -c 300
            echo ""
            curl -s http://127.0.0.1:3002/api/analytics/summary 2>&1 | head -c 300
            echo ""

            echo "=== 2. Port 3003 ACH/analytics responses ==="
            curl -s http://127.0.0.1:3003/api/ach/health 2>&1 | head -c 300
            echo ""
            curl -s http://127.0.0.1:3003/api/analytics/summary 2>&1 | head -c 300
            echo ""

            echo "=== 3. payment-gateway.cjs require lines ==="
            grep -n "require" "$BASEDIR/dlbtrust-v2/payment-gateway.cjs" 2>/dev/null | head -40
            echo ""

            echo "=== 4. Full payment-gateway.cjs content ==="
            cat "$BASEDIR/dlbtrust-v2/payment-gateway.cjs" 2>/dev/null
            echo ""

            echo "=== 5. File permissions in dlbtrust-v2 ==="
            ls -la "$BASEDIR/dlbtrust-v2/" 2>/dev/null
            echo ""

            echo "=== 6. All api-routes files ==="
            find "$BASEDIR" -name "api-routes*" -type f 2>/dev/null -exec echo "FILE: {}" \; -exec ls -la {} \; -exec head -30 {} \;
            echo ""

            echo "=== 7. All .cjs files ==="
            find "$BASEDIR" -name "*.cjs" -type f 2>/dev/null -exec echo "FILE: {}" \; -exec ls -la {} \;
            echo ""

            echo "=== 8. Apache config files in conf/ ==="
            find "$BASEDIR/conf" -type f 2>/dev/null -exec echo "FILE: {}" \; -exec cat {} \;
            echo ""

            echo "=== 9. .htaccess in httpdocs ==="
            cat "$BASEDIR/httpdocs/.htaccess" 2>/dev/null || echo "No .htaccess"

            echo "=== 10. PM2 processes ==="
            pm2 list 2>/dev/null || true

            echo "=== 11. What ports are listening ==="
            ss -tlnp 2>/dev/null | grep -E "300[0-9]" || netstat -tlnp 2>/dev/null | grep -E "300[0-9]" || true

            echo "=== 12. External test ==="
            curl -sk https://dlbtrust.cloud/api/ach/health 2>&1 | head -c 300
            echo ""
            curl -sk https://dlbtrust.cloud/api/analytics/summary 2>&1 | head -c 300
            echo ""

            echo "=== 13. Check httpdocs/server directory ==="
            ls -la "$BASEDIR/httpdocs/server/" 2>/dev/null || echo "No server dir"
