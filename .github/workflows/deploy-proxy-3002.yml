name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure proxy on port 3003 and update Plesk hosting
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs

            echo "=== Ensure proxy on 3003 ==="
            if ! curl -s --max-time 3 http://localhost:3003/api/ach/health | grep -q openach_connected 2>/dev/null; then
              pm2 kill 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > "$DEST/server-proxy.js"
              pm2 start "$DEST/server-proxy.js" --name server-proxy --no-autorestart
              sleep 3
            fi
            curl -s http://localhost:3003/api/ach/health | head -c 80
            echo ""

            echo "=== Update additional-settings and reconfigure domain ==="
            XMLDATA='<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>additional-settings</name><value>ProxyPass /api/ach/ http://127.0.0.1:3003/api/ach/&#10;ProxyPassReverse /api/ach/ http://127.0.0.1:3003/api/ach/&#10;ProxyPass /api/analytics/ http://127.0.0.1:3003/api/analytics/&#10;ProxyPassReverse /api/analytics/ http://127.0.0.1:3003/api/analytics/&#10;ProxyPass /api/payment-gateway/ http://127.0.0.1:3002/api/payment-gateway/&#10;ProxyPassReverse /api/payment-gateway/ http://127.0.0.1:3002/api/payment-gateway/&#10;ProxyPass /api/ http://127.0.0.1:3002/api/&#10;ProxyPassReverse /api/ http://127.0.0.1:3002/api/</value></property></vrt_hst></hosting></values></set></webspace></packet>'
            curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d "$XMLDATA" 2>&1 | head -c 500
            echo ""

            echo "=== Force websrvmng reconfigure ==="
            /usr/local/psa/admin/sbin/httpdmng --reconfigure-domain dlbtrust.cloud 2>/dev/null && echo "httpdmng OK" || echo "httpdmng failed (expected for non-root)"

            echo "=== Try plesk sbin ==="
            /usr/local/psa/admin/sbin/websrvmng -a 2>/dev/null && echo "websrvmng OK" || echo "websrvmng failed"
            /usr/local/psa/admin/sbin/websrvmng --reconfigure-all 2>/dev/null && echo "websrvmng reconfigure-all OK" || echo "websrvmng reconfigure-all failed"

            echo "=== Read the actual Apache config generated by Plesk ==="
            find /var/www/vhosts/system/dlbtrust.cloud/conf/ -type f 2>/dev/null -exec ls -la {} \; || echo "Cannot list"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/httpd.conf 2>/dev/null | head -60 || echo "no httpd.conf"

            echo "=== Also check if /var/www/vhosts/system has conf ==="
            find /var/www/vhosts/system/ -name "*httpd*" -o -name "*apache*" 2>/dev/null | head -10 || echo "none found"

            echo "=== Check the 000-default.conf ==="
            cat /etc/apache2/sites-enabled/000-default.conf 2>/dev/null | head -30 || echo "Cannot read"
