name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify proxy and fix Apache
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs
            CONF=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf

            echo "=== Check proxy status ==="
            pm2 list 2>/dev/null || echo "pm2 not running"
            ss -tlnp 2>/dev/null | grep -E ':300[0-9] ' || echo "no 300x ports"

            echo "=== Ensure proxy is running on 3003 ==="
            if ! ss -tlnp 2>/dev/null | grep -q ':3003 '; then
              echo "Proxy not running, starting..."
              pm2 kill 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > "$DEST/server-proxy.js"
              pm2 start "$DEST/server-proxy.js" --name server-proxy --no-autorestart
              sleep 3
            fi
            echo "Local ACH test:"
            curl -s --max-time 5 http://localhost:3003/api/ach/health
            echo ""

            echo "=== Check current vhost.conf ==="
            cat "$CONF"
            echo ""

            echo "=== Write correct vhost.conf ==="
            printf '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>\n  Options -Indexes\n</Directory>\nProxyPass / http://localhost:3003/\nProxyPassReverse / http://localhost:3003/\n' > "$CONF"
            echo "New vhost.conf:"
            cat "$CONF"

            echo "=== Check what Apache config includes our vhost ==="
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/httpd.include 2>/dev/null | head -40 || echo "Cannot read httpd.include"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/vhost.conf 2>/dev/null | head -20 || echo "Cannot read system vhost.conf"
            ls -la /var/www/vhosts/dlbtrust.cloud/conf/ || echo "Cannot list conf dir"
            cat /var/www/vhosts/dlbtrust.cloud/conf/httpd.include 2>/dev/null | head -40 || echo "No httpd.include in domain conf"

            echo "=== Reload Apache - Method 1: Plesk XML API ==="
            curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" -H "Content-Type: text/xml" -d '<?xml version="1.0"?><packet version="1.6.9.1"><server><get><admin/></get></server>'
            echo ""

            echo "=== Reload Apache - Method 2: Plesk REST API ==="
            curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/server/tools/restart" -X POST -u "admin:dP8RlShbOWNq" -H "Content-Type: application/json" -d '{"service":"web"}' 2>&1 | head -c 500
            echo ""

            echo "=== Reload Apache - Method 3: Plesk CLI ==="
            plesk bin server_pref --restart-web 2>/dev/null || echo "Cannot run plesk cli"
            /usr/sbin/apachectl graceful 2>/dev/null || echo "Cannot run apachectl (expected)"
            sudo /usr/sbin/apachectl graceful 2>/dev/null || echo "Cannot sudo apachectl"
            httpd -k graceful 2>/dev/null || echo "Cannot run httpd graceful"

            echo "=== Reload Apache - Method 4: Plesk websrvmng ==="
            /usr/local/psa/admin/sbin/websrvmng -a -v 2>/dev/null || echo "Cannot run websrvmng"
            plesk sbin websrvmng -a -v 2>/dev/null || echo "Cannot run plesk websrvmng"

            echo "=== Reload Apache - Method 5: service restart ==="
            sudo systemctl reload apache2 2>/dev/null || echo "Cannot systemctl reload apache2"
            sudo systemctl reload httpd 2>/dev/null || echo "Cannot systemctl reload httpd"
            sudo service apache2 reload 2>/dev/null || echo "Cannot service apache2 reload"
            sudo service httpd reload 2>/dev/null || echo "Cannot service httpd reload"

            sleep 5

            echo "=== Final public test ==="
            curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
            echo ""
            curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
            echo ""

            echo "=== Test via IP directly ==="
            curl -s --max-time 5 -H "Host: dlbtrust.cloud" http://127.0.0.1:80/api/ach/health 2>&1 | head -c 300
            echo ""
            curl -s --max-time 5 -H "Host: dlbtrust.cloud" http://127.0.0.1:443/api/ach/health 2>&1 | head -c 300
            echo ""

            echo "=== Check if Nginx is involved ==="
            ss -tlnp 2>/dev/null | grep -E ':80 |:443 '
            ls /var/www/vhosts/system/dlbtrust.cloud/conf/nginx* 2>/dev/null || echo "No nginx conf files"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/vhost_nginx.conf 2>/dev/null | head -30 || echo "Cannot read nginx vhost"

            echo "=== DONE ==="
