name: Deploy Proxy 3002
on: [workflow_dispatch, push]
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SERVER: "74.208.191.205"
      SSH_USER: "dlbtrust.cloud_h6zkwzag1ya"
      SSH_PASS: "Deploy2026!"
      PLESK_PASS: "dP8RlShbOWNq"
    steps:
      - run: apt-get install -y sshpass 2>/dev/null | tail -1 || true

      - name: Diagnose permissions and try Plesk Node.js restart
        run: |
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o PasswordAuthentication=yes "$SSH_USER@$SERVER" 'bash -s' << 'REMOTEOF'
          set -x
          V2=/var/www/vhosts/dlbtrust.cloud/dlbtrust-v2
          HD=/var/www/vhosts/dlbtrust.cloud/httpdocs

          echo "=== File permissions in dlbtrust-v2 ==="
          ls -la "$V2/" | head -20
          ls -la "$V2/server.cjs" "$V2/auth-routes.cjs" 2>/dev/null
          id

          echo "=== Check if auth-routes.cjs is writable ==="
          touch "$V2/test-write" 2>/dev/null && echo "V2 dir writable" && rm "$V2/test-write" || echo "V2 dir NOT writable"

          echo "=== Check nginx config being used ==="
          cat /var/www/vhosts/system/dlbtrust.cloud/conf/vhost_nginx.conf 2>/dev/null | head -30 || echo "system nginx conf unreadable"
          cat /var/www/vhosts/system/dlbtrust.cloud/conf/httpd.include 2>/dev/null | head -30 || echo "system httpd.include unreadable"

          echo "=== Check Plesk Node.js app config ==="
          cat /var/www/vhosts/system/dlbtrust.cloud/conf/node.conf 2>/dev/null || echo "no node.conf"
          find /var/www/vhosts/system/dlbtrust.cloud/conf/ -name "*node*" 2>/dev/null || true
          find /var/www/vhosts/system/dlbtrust.cloud/conf/ -type f 2>/dev/null || echo "cannot list system conf"

          echo "=== Root PM2 process list ==="
          cat /root/.pm2/dump.pm2 2>/dev/null | head -50 || echo "cannot read root PM2 dump"
          ls -la /root/.pm2/ 2>/dev/null || echo "cannot access /root/.pm2"

          echo "=== Check if ecosystem exists ==="
          find "$V2" -name "ecosystem*" -o -name "*.pm2*" 2>/dev/null | head -5 || true
          cat "$V2/ecosystem.config.js" 2>/dev/null || echo "no ecosystem in V2"
          cat "$V2/ecosystem.config.cjs" 2>/dev/null || echo "no ecosystem.cjs in V2"
          REMOTEOF

      - name: Try Plesk Node.js API restart
        run: |
          echo "=== Plesk Node.js extension - restart app ==="
          # Try the Plesk REST API for Node.js
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/domains/1/nodejs" \
            -H "X-API-Key: $(echo -n 'admin:$PLESK_PASS' | base64)" 2>&1 | head -c 500
          echo ""

          # Try with proper auth header
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/domains/1/nodejs" \
            -u "admin:$PLESK_PASS" 2>&1 | head -c 500
          echo ""

          # Try to restart via Plesk extensions
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/extensions/nodejs/domains/1" \
            -u "admin:$PLESK_PASS" 2>&1 | head -c 500
          echo ""

          # List all domains to find the domain ID
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/domains" \
            -u "admin:$PLESK_PASS" 2>&1 | head -c 1000
          echo ""

      - name: Use Plesk CLI via XML API to restart Node app
        run: |
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -o PasswordAuthentication=yes "$SSH_USER@$SERVER" 'bash -s' << 'REMOTEOF'
          set -x

          echo "=== Try Plesk CLI tools ==="
          which plesk 2>/dev/null || true
          plesk bin nodejs --help 2>/dev/null | head -20 || echo "no plesk nodejs cli"
          plesk bin domain --help 2>/dev/null | head -20 || echo "no plesk domain cli"

          echo "=== Try to find and use Plesk Node.js restart ==="
          # Look for the extension
          ls /opt/plesk/admin/htdocs/modules/nodejs/ 2>/dev/null | head -10 || echo "no nodejs module"
          ls /usr/local/psa/admin/htdocs/modules/nodejs/ 2>/dev/null | head -10 || echo "no psa nodejs module"

          echo "=== Workaround: Make port 3002 serve our routes via auth-routes.cjs ==="
          echo "=== Check if we can at least read auth-routes.cjs ==="
          head -30 /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/auth-routes.cjs
          REMOTEOF

      - name: Verify endpoints via HTTPS
        run: |
          sleep 5
          echo "=== HTTPS Tests ==="
          S=$SERVER; P=0; F=0
          t() {
            r=$(eval "$2" 2>&1 | head -c 300)
            if echo "$r" | grep -q "$3"; then
              echo "PASS: $1"
              P=$((P+1))
            else
              echo "FAIL: $1 | Got: ${r:0:80}"
              F=$((F+1))
            fi
          }
          t "HTTP redirect"  "curl -s -o/dev/null -w '%{http_code}' http://dlbtrust.cloud/"                                      "301"
          t "HTTPS loads"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/"                                "html"
          t "Wallets API"    "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/wallets"                     "wallet_id"
          t "Transactions"   "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/transactions"               "type"
          t "ACH health"     "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/ach/health"                 "openach_connected"
          t "Analytics"      "curl -sk --resolve 'dlbtrust.cloud:443:$S' https://dlbtrust.cloud/api/analytics/summary"          "total_corpus"
          echo ""
          echo "SCORE: $P/6 passed, $F failed"
          [ $F -eq 0 ] && echo "ALL 6 CORE TESTS PASSING" || echo "WARNING: $F tests failing"
