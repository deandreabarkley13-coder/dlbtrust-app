name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fix ACH and Analytics via vhost.conf ProxyPass
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 120s
          script: |
            set -e
            BASEDIR="/var/www/vhosts/dlbtrust.cloud"
            HTDOCS="$BASEDIR/httpdocs"

            echo "=== Step 1: Ensure proxy on port 3003 ==="
            if curl -s --max-time 3 http://127.0.0.1:3003/api/ach/health 2>/dev/null | grep -q openach_connected; then
              echo "Proxy on 3003 already healthy"
            else
              echo "Starting proxy on 3003..."
              cd "$HTDOCS"
              pm2 delete server-proxy 2>/dev/null || true
              pm2 kill 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > "$HTDOCS/server-proxy.js"
              pm2 start "$HTDOCS/server-proxy.js" --name server-proxy
              sleep 3
            fi
            curl -s http://127.0.0.1:3003/api/ach/health | head -c 100
            echo ""

            echo "=== Step 2: Update vhost.conf with specific ProxyPass rules ==="
            printf 'ProxyPreserveHost On\n# Specific routes to port 3003 (MUST come before generic /api/ rule)\nProxyPass /api/ach/health http://127.0.0.1:3003/api/ach/health\nProxyPassReverse /api/ach/health http://127.0.0.1:3003/api/ach/health\nProxyPass /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary\nProxyPassReverse /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary\n# Generic API to payment-gateway\nProxyPass /api/ http://127.0.0.1:3002/api/\nProxyPassReverse /api/ http://127.0.0.1:3002/api/\n# Everything else to SPA server\nProxyPass / http://127.0.0.1:3001/\nProxyPassReverse / http://127.0.0.1:3001/\n' > "$BASEDIR/conf/vhost.conf"

            echo "vhost.conf:"
            cat "$BASEDIR/conf/vhost.conf"

            echo "=== Step 3: Also update .htaccess ==="
            printf 'RewriteEngine On\n\n# Route ACH health and Analytics summary to proxy on port 3003\nRewriteRule ^api/ach/health$ http://127.0.0.1:3003/api/ach/health [P,L]\nRewriteRule ^api/analytics/summary$ http://127.0.0.1:3003/api/analytics/summary [P,L]\n\n# All other API requests go to payment-gateway on port 3002\nRewriteRule ^api/(.*)$ http://127.0.0.1:3002/api/$1 [P,L]\n\n# Handle SPA routing\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^(.*)$ /index.html [L]\n' > "$HTDOCS/.htaccess"

            echo ".htaccess:"
            cat "$HTDOCS/.htaccess"

            echo "=== Step 4: Check if there is a Plesk system vhost config we can read ==="
            find /etc/apache2 -name "*dlbtrust*" 2>/dev/null | head -5
            find /etc/httpd -name "*dlbtrust*" 2>/dev/null | head -5

            echo "=== Step 5: Check Plesk include order ==="
            grep -r "Include.*dlbtrust" /etc/apache2/ 2>/dev/null | head -10 || true
            grep -r "Include.*dlbtrust" /etc/httpd/ 2>/dev/null | head -10 || true

            echo "=== Step 6: Find actual Apache vhost config ==="
            find /etc -path "*/apache*/*dlbtrust*" -o -path "*/httpd*/*dlbtrust*" 2>/dev/null | head -10

            echo "=== Step 7: Try to read Plesk-generated vhost config ==="
            for dir in /var/www/vhosts/system/dlbtrust.cloud/conf /etc/apache2/plesk.conf.d/vhosts/dlbtrust.cloud; do
              if [ -d "$dir" ]; then
                echo "DIR: $dir"
                ls -la "$dir/" 2>/dev/null
                for f in "$dir"/*.conf "$dir"/*include; do
                  if [ -f "$f" ]; then
                    echo "--- $f ---"
                    cat "$f" 2>/dev/null | head -50
                  fi
                done
              fi
            done

      - name: Plesk XML API - update additional-settings with correct port routing
        run: |
          echo "=== Update Plesk additional-settings to route to port 3003 ==="

          # The key insight: additional-settings needs SPECIFIC routes to port 3003
          # BEFORE the generic /api/ route to port 3002
          SETTINGS="ProxyPreserveHost On
          ProxyPass /api/ach/health http://127.0.0.1:3003/api/ach/health
          ProxyPassReverse /api/ach/health http://127.0.0.1:3003/api/ach/health
          ProxyPass /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary
          ProxyPassReverse /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary
          ProxyPass /api/ http://127.0.0.1:3002/api/
          ProxyPassReverse /api/ http://127.0.0.1:3002/api/
          ProxyPass / http://127.0.0.1:3001/
          ProxyPassReverse / http://127.0.0.1:3001/"

          # XML-encode
          ENCODED=$(python3 -c "
          import html
          s = '''$SETTINGS'''
          # Remove leading whitespace from each line
          lines = [l.strip() for l in s.strip().split('\n')]
          clean = '\n'.join(lines)
          print(html.escape(clean).replace('\n', '&#10;'))
          ")

          echo "Encoded: $ENCODED"

          RESPONSE=$(curl -sk "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?><packet version=\"1.6.9.1\"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>additional-settings</name><value>${ENCODED}</value></property></vrt_hst></hosting></values></set></webspace></packet>")

          echo "Set response: $RESPONSE" | head -c 500
          echo ""

          # Toggle a hosting setting to force Plesk to regenerate Apache config
          echo "=== Toggle PHP to force Apache regeneration ==="
          # Enable SSI
          curl -sk "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>ssi</name><value>true</value></property></vrt_hst></hosting></values></set></webspace></packet>' | head -c 300
          echo ""
          sleep 3

          # Disable SSI
          curl -sk "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>ssi</name><value>false</value></property></vrt_hst></hosting></values></set></webspace></packet>' | head -c 300
          echo ""

          # Try Plesk REST API v2 to trigger domain reconfiguration
          echo "=== Plesk REST API v2 ==="
          # Get domain ID
          DOMAINS=$(curl -sk "https://dlbtrust.cloud:8443/api/v2/domains" \
            -u "admin:dP8RlShbOWNq" 2>&1)
          echo "Domains: $DOMAINS" | head -c 500
          echo ""

          # Try CLI API to run websrvmng
          echo "=== Try CLI extension ==="
          curl -sk -X POST "https://dlbtrust.cloud:8443/api/v2/cli/commands/execute" \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"command":"websrvmng","params":["--reconfigure-domain","dlbtrust.cloud"]}' 2>&1 | head -c 500
          echo ""

          sleep 5

          echo "=== Final external test ==="
          echo "ACH health:"
          curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
          echo ""
          echo "Analytics:"
          curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
          echo ""
