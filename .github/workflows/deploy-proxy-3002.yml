name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Find and patch the server on port 3002
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud

            echo "=== What is running on port 3002? ==="
            ss -tlnp 2>/dev/null | grep ':3002'
            echo ""

            echo "=== Find the server file for port 3002 ==="
            grep -rl "3002" /var/www/vhosts/dlbtrust.cloud/httpdocs/*.js 2>/dev/null | head -5 || echo "Not in httpdocs"
            grep -rl "3002" /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/*.cjs 2>/dev/null | head -5 || echo "Not in dlbtrust-v2 cjs"
            grep -rl "3002" /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/*.js 2>/dev/null | head -5 || echo "Not in dlbtrust-v2 js"

            echo "=== Check pm2 for root processes ==="
            cat /root/.pm2/dump.pm2 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'{p[\"name\"]} pid={p[\"pid\"]} script={p.get(\"pm2_env\",{}).get(\"pm_exec_path\",\"\")}') for p in d]" 2>/dev/null || echo "Cannot read root pm2 dump"

            echo "=== Check for node processes ==="
            ps aux 2>/dev/null | grep "node " | grep -v grep | head -10

            echo "=== Find what file runs the 3002 server ==="
            ls -la /var/www/vhosts/dlbtrust.cloud/httpdocs/server*.js 2>/dev/null || echo "No server*.js in httpdocs"
            ls -la /var/www/vhosts/dlbtrust.cloud/dlbtrust-v2/server*.* 2>/dev/null || echo "No server*.* in dlbtrust-v2"

            echo "=== Can we write to httpdocs? ==="
            touch /var/www/vhosts/dlbtrust.cloud/httpdocs/test-write-check && rm /var/www/vhosts/dlbtrust.cloud/httpdocs/test-write-check && echo "httpdocs is WRITABLE" || echo "httpdocs NOT writable"

            echo "=== Read the server file for 3002 ==="
            for f in /var/www/vhosts/dlbtrust.cloud/httpdocs/server*.js; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                cat "$f" | head -50
                echo "..."
              fi
            done

            echo "=== Check if httpdocs has app.js or index.js ==="
            ls -la /var/www/vhosts/dlbtrust.cloud/httpdocs/*.js 2>/dev/null | head -10
            for f in /var/www/vhosts/dlbtrust.cloud/httpdocs/app.js /var/www/vhosts/dlbtrust.cloud/httpdocs/server.js; do
              if [ -f "$f" ]; then
                echo "--- $f ---"
                head -20 "$f"
              fi
            done
