name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Investigate 3002 server and deploy fix
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            HD=/var/www/vhosts/dlbtrust.cloud/httpdocs
            V2=/var/www/vhosts/dlbtrust.cloud/dlbtrust-v2

            echo "=== What process is on port 3002? ==="
            cat /proc/$(ss -tlnp 2>/dev/null | grep ':3002 ' | grep -oP 'pid=\K[0-9]+' || echo "0")/cmdline 2>/dev/null | tr '\0' ' ' || echo "Cannot identify 3002 process"

            echo "=== Read payment-gateway.cjs ==="
            head -60 "$V2/payment-gateway.cjs" 2>/dev/null || echo "Cannot read payment-gateway.cjs"

            echo "=== Check openach-patch module ==="
            cat "$HD/server/openach-patch.js" 2>/dev/null | head -30 || echo "Cannot read openach-patch.js"
            ls -la "$HD/server/openach-patch.js" 2>/dev/null || echo "No openach-patch.js"
            ls -la "$HD/server/openach-patch/index.js" 2>/dev/null || echo "No openach-patch/index.js"

            echo "=== Check analytics routes module ==="
            cat "$HD/server/routes/analytics.js" 2>/dev/null | head -30 || echo "Cannot read analytics.js"
            ls -la "$HD/server/routes/analytics.js" 2>/dev/null || echo "No analytics.js"
            ls -la "$HD/server/routes/analytics/index.js" 2>/dev/null || echo "No analytics/index.js"

            echo "=== Check what the payment-gateway actually serves ==="
            curl -s http://127.0.0.1:3002/api/ach/health 2>&1 | head -c 200
            echo ""
            curl -s http://127.0.0.1:3002/api/analytics/summary 2>&1 | head -c 200
            echo ""
            curl -s http://127.0.0.1:3002/api/wallets 2>&1 | head -c 200
            echo ""

            echo "=== Check server.cjs on 3001 ==="
            cat "$V2/server.cjs" 2>/dev/null || echo "Cannot read server.cjs"

            echo "=== Check if server.cjs tries to load ACH/analytics routes ==="
            grep -i "ach\|analytics\|openach" "$V2/server.cjs" 2>/dev/null || echo "No ACH/analytics in server.cjs"
            grep -i "ach\|analytics\|openach" "$V2/payment-gateway.cjs" 2>/dev/null || echo "No ACH/analytics in payment-gateway.cjs"
