name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure proxy and fix routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 120s
          script: |
            echo "=== Ensure proxy on 3003 ==="
            if ! curl -s --max-time 3 http://127.0.0.1:3003/api/ach/health 2>/dev/null | grep -q openach_connected; then
              cd /var/www/vhosts/dlbtrust.cloud/httpdocs
              pm2 delete server-proxy 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > server-proxy.js
              pm2 start server-proxy.js --name server-proxy
              sleep 3
            fi
            echo "Proxy check:"
            curl -s http://127.0.0.1:3003/api/ach/health | head -c 80
            echo ""

      - name: Update Plesk additional-settings and force reconfigure
        run: |
          PLESK="https://dlbtrust.cloud:8443"
          AUTH_USER="admin"
          AUTH_PASS="dP8RlShbOWNq"

          echo "=== 1. Read current additional-settings ==="
          RESPONSE=$(curl -sk "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: $AUTH_USER" \
            -H "HTTP_AUTH_PASSWD: $AUTH_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><get><filter><name>dlbtrust.cloud</name></filter><dataset><hosting/></dataset></get></webspace></packet>')

          echo "Current additional-settings:"
          python3 -c "
          import re
          data = '''$RESPONSE'''
          m = re.search(r'additional-settings</name><value>(.*?)</value>', data, re.DOTALL)
          if m:
              val = m.group(1).replace('&#10;', '\n').replace('&amp;', '&').replace('&lt;', '<').replace('&gt;', '>')
              print(val)
          else:
              print('NOT FOUND')
              print('Excerpt:', data[:500])
          " 2>/dev/null || echo "Parse failed"

          echo ""
          echo "=== 2. Set additional-settings with specific port 3003 routes ==="
          # The settings need specific /api/ach/health and /api/analytics/summary ProxyPass
          # BEFORE the generic /api/ ProxyPass to port 3002
          SETTINGS_ENCODED="ProxyPreserveHost On&#10;ProxyPass /api/ach/health http://127.0.0.1:3003/api/ach/health&#10;ProxyPassReverse /api/ach/health http://127.0.0.1:3003/api/ach/health&#10;ProxyPass /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary&#10;ProxyPassReverse /api/analytics/summary http://127.0.0.1:3003/api/analytics/summary&#10;ProxyPass /api/ http://127.0.0.1:3002/api/&#10;ProxyPassReverse /api/ http://127.0.0.1:3002/api/&#10;ProxyPass / http://127.0.0.1:3001/&#10;ProxyPassReverse / http://127.0.0.1:3001/"

          SET_RESPONSE=$(curl -sk "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: $AUTH_USER" \
            -H "HTTP_AUTH_PASSWD: $AUTH_PASS" \
            -H "Content-Type: text/xml" \
            -d "<?xml version=\"1.0\" encoding=\"UTF-8\"?><packet version=\"1.6.9.1\"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>additional-settings</name><value>${SETTINGS_ENCODED}</value></property></vrt_hst></hosting></values></set></webspace></packet>")

          echo "Set response:"
          echo "$SET_RESPONSE" | head -c 300
          echo ""

          echo ""
          echo "=== 3. Verify it was saved ==="
          VERIFY=$(curl -sk "$PLESK/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: $AUTH_USER" \
            -H "HTTP_AUTH_PASSWD: $AUTH_PASS" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><get><filter><name>dlbtrust.cloud</name></filter><dataset><hosting/></dataset></get></webspace></packet>')

          echo "Verified additional-settings:"
          python3 -c "
          import re
          data = '''$(echo "$VERIFY" | sed "s/'/\\\\'/g")'''
          m = re.search(r'additional-settings</name><value>(.*?)</value>', data, re.DOTALL)
          if m:
              val = m.group(1).replace('&#10;', '\n').replace('&amp;', '&')
              print(val)
          else:
              print('NOT FOUND')
          " 2>/dev/null || echo "Parse failed"

          echo ""
          echo "=== 4. Force Plesk to reconfigure webserver ==="

          # Method 1: REST API v2 - reconfigure domain
          echo "Method 1: REST API domain update..."
          curl -sk -X PUT "$PLESK/api/v2/domains/1" \
            -u "$AUTH_USER:$AUTH_PASS" \
            -H "Content-Type: application/json" \
            -d '{"hosting_type":"virtual"}' 2>&1 | head -c 300
          echo ""

          # Method 2: REST API CLI - websrvmng
          echo "Method 2: CLI API websrvmng..."
          curl -sk -X POST "$PLESK/api/v2/cli/commands/execute" \
            -u "$AUTH_USER:$AUTH_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"websrvmng","params":["--reconfigure-domain","dlbtrust.cloud"]}' 2>&1 | head -c 500
          echo ""

          # Method 3: REST API CLI - httpdmng
          echo "Method 3: CLI API httpdmng..."
          curl -sk -X POST "$PLESK/api/v2/cli/commands/execute" \
            -u "$AUTH_USER:$AUTH_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"httpdmng","params":["--reconfigure-domain","dlbtrust.cloud"]}' 2>&1 | head -c 500
          echo ""

          # Method 4: REST API CLI - service apache reload
          echo "Method 4: CLI API apache reload..."
          curl -sk -X POST "$PLESK/api/v2/cli/commands/execute" \
            -u "$AUTH_USER:$AUTH_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"service","params":["apache2","reload"]}' 2>&1 | head -c 500
          echo ""

          # Method 5: REST API CLI - plesk bin domain
          echo "Method 5: CLI API plesk bin domain..."
          curl -sk -X POST "$PLESK/api/v2/cli/commands/execute" \
            -u "$AUTH_USER:$AUTH_PASS" \
            -H "Content-Type: application/json" \
            -d '{"command":"/usr/local/psa/admin/sbin/websrvmng","params":["-a","-v"]}' 2>&1 | head -c 500
          echo ""

          sleep 5

          echo ""
          echo "=== 5. Final external test ==="
          echo "ACH:"
          curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
          echo ""
          echo "Analytics:"
          curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
          echo ""
          echo "Wallets:"
          curl -sk https://dlbtrust.cloud/api/wallets | head -c 100
          echo ""
