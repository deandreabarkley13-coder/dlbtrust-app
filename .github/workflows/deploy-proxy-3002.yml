name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Force Apache reconfiguration via Plesk APIs
        run: |
          echo "=== Try Plesk REST API v2 - update domain hosting to trigger Apache regen ==="

          echo "--- Get current hosting config ---"
          curl -sk --max-time 15 "https://dlbtrust.cloud:8443/api/v2/domains/1/hosting" \
            -u "admin:dP8RlShbOWNq" \
            -H "Accept: application/json" 2>&1 | python3 -m json.tool 2>/dev/null || true
          echo ""

          echo "--- Update hosting to trigger reconfiguration ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/domains/1/hosting" \
            -X PUT \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"www_root":"/httpdocs"}' 2>&1 | head -c 1000
          echo ""

          echo "--- Try Plesk XML to set proxy_mode ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>proxy_mode</name><value>false</value></property></vrt_hst></hosting></values></set></webspace></packet>'
          echo ""
          sleep 3

          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>proxy_mode</name><value>true</value></property></vrt_hst></hosting></values></set></webspace></packet>'
          echo ""
          sleep 5

          echo "--- Try to trigger web server reconfiguration ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/cli/server_pref/handler" \
            -X POST \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params":["--update-web-server-settings"]}' 2>&1 | head -c 500
          echo ""

          echo "--- Try Plesk CLI API for domain update ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/cli/domain/handler" \
            -X POST \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params":["--update","dlbtrust.cloud","-www","true"]}' 2>&1 | head -c 500
          echo ""

          echo "--- Try Plesk CLI for httpdmng reconfigure ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/cli/httpdmng/handler" \
            -X POST \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params":["--reconfigure-domain","dlbtrust.cloud"]}' 2>&1 | head -c 500
          echo ""

          echo "--- Try Plesk CLI for web server restart ---"
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/cli/service/handler" \
            -X POST \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params":["--restart","apache"]}' 2>&1 | head -c 500
          echo ""

          sleep 10

          echo "=== Final public test ==="
          curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
          echo ""
          curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
          echo ""
