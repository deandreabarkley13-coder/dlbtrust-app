name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose web stack and fix routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud

            echo "=== Read vhost_nginx.conf ==="
            cat /var/www/vhosts/dlbtrust.cloud/conf/vhost_nginx.conf 2>/dev/null || echo "Cannot read"

            echo "=== Read system nginx conf ==="
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/vhost_nginx.conf 2>/dev/null || echo "Cannot read system nginx"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/nginx.conf 2>/dev/null || echo "Cannot read system nginx.conf"

            echo "=== Check which web server handles 443 ==="
            curl -svk --resolve 'dlbtrust.cloud:443:127.0.0.1' https://dlbtrust.cloud/api/ach/health 2>&1 | grep -E "< Server:|< server:|< X-Powered|< x-powered|HTTP/" | head -5

            echo "=== Check process on port 80/443 ==="
            ps aux 2>/dev/null | grep -E "nginx|apache|httpd" | head -10 || echo "Cannot ps"

            echo "=== Check httpd.include (Plesk-generated Apache config) ==="
            find /var/www/vhosts/system/dlbtrust.cloud/conf/ -type f 2>/dev/null || echo "Cannot list"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/httpd.include 2>/dev/null || echo "Cannot read httpd.include"

            echo "=== Plesk REST API - proper auth ==="
            curl -sk --max-time 15 "https://dlbtrust.cloud:8443/api/v2/domains" -u "admin:dP8RlShbOWNq" -H "Accept: application/json" 2>&1 | head -c 1000
            echo ""

            echo "=== Plesk REST API - reconfigure web ==="
            curl -sk --max-time 15 "https://dlbtrust.cloud:8443/api/v2/cli/server/handler" -X POST -u "admin:dP8RlShbOWNq" -H "Content-Type: application/json" -d '{"params":["--reread"]}' 2>&1 | head -c 500
            echo ""

            echo "=== Plesk XML API - reconfigure webserver ==="
            curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" -H "Content-Type: text/xml" -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>proxy_mode</name><value>true</value></property></vrt_hst></hosting></values></set></webspace></packet>'
            echo ""

            echo "=== Try Plesk CLI commands ==="
            plesk bin subscription --read dlbtrust.cloud 2>/dev/null | head -20 || echo "Cannot read subscription"
            plesk bin domain --read dlbtrust.cloud 2>/dev/null | head -20 || echo "Cannot read domain"

            echo "=== DONE ==="

      - name: Try Plesk API to restart Apache from runner
        run: |
          echo "=== Plesk REST API v2 - list domains ==="
          curl -sk --max-time 15 "https://dlbtrust.cloud:8443/api/v2/domains" \
            -u "admin:dP8RlShbOWNq" \
            -H "Accept: application/json" 2>&1 | head -c 2000
          echo ""

          echo "=== Plesk REST API v2 - server tools ==="
          curl -sk --max-time 15 "https://dlbtrust.cloud:8443/api/v2/server" \
            -u "admin:dP8RlShbOWNq" \
            -H "Accept: application/json" 2>&1 | head -c 2000
          echo ""

          echo "=== Plesk CLI via API - reread configs ==="
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/api/v2/cli/domain/handler" \
            -X POST \
            -u "admin:dP8RlShbOWNq" \
            -H "Content-Type: application/json" \
            -d '{"params":["--update","dlbtrust.cloud","-www","true"]}' 2>&1 | head -c 1000
          echo ""

          echo "=== Plesk XML - update domain to trigger Apache reconfigure ==="
          curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
            -H "HTTP_AUTH_LOGIN: admin" \
            -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
            -H "Content-Type: text/xml" \
            -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><hosting><vrt_hst><property><name>www_root</name><value>/httpdocs</value></property></vrt_hst></hosting></values></set></webspace></packet>'
          echo ""

          sleep 10

          echo "=== Final public test ==="
          curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
          echo ""
          curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
          echo ""
