name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy proxy server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs
            CONF=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf
            RAW=https://raw.githubusercontent.com/deandreabarkley13-coder/dlbtrust-app/main/server/server-proxy.js

            echo "=== Step 1: Stop old proxy ==="
            pm2 delete server-proxy 2>/dev/null || true
            sleep 1
            fuser -k 3002/tcp 2>/dev/null || true
            sleep 2

            echo "=== Step 2: Download proxy JS from repo ==="
            curl -sL "$RAW" -o "$DEST/server-proxy.js"
            echo "Downloaded, first 5 lines:"
            head -5 "$DEST/server-proxy.js"

            echo "=== Step 3: Start with pm2 ==="
            pm2 start "$DEST/server-proxy.js" --name server-proxy
            sleep 4
            pm2 list

            if ss -tlnp 2>/dev/null | grep -q ':3002 '; then
              echo "PORT 3002 UP"
            elif netstat -tlnp 2>/dev/null | grep -q ':3002 '; then
              echo "PORT 3002 UP (netstat)"
            else
              echo "Port 3002 not detected via ss/netstat, trying nohup fallback..."
              pm2 logs server-proxy --lines 20 --nostream || true
              nohup node "$DEST/server-proxy.js" > /tmp/proxy.log 2>&1 &
              sleep 3
              tail -5 /tmp/proxy.log || true
            fi

            echo "=== Step 4: Test locally ==="
            echo "--- ACH health ---"
            curl -s http://localhost:3002/api/ach/health || echo "CURL FAILED"
            echo ""
            echo "--- Analytics summary ---"
            curl -s http://localhost:3002/api/analytics/summary || echo "CURL FAILED"
            echo ""
            curl -s http://localhost:3002/api/ach/health | grep -q openach_connected && echo "ACH FIELD: OK" || echo "ACH FIELD: MISSING"
            curl -s http://localhost:3002/api/analytics/summary | grep -q total_corpus && echo "ANALYTICS FIELD: OK" || echo "ANALYTICS FIELD: MISSING"

            echo "=== Step 5: Update vhost.conf ==="
            printf '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>\n  Options -Indexes\n</Directory>\nProxyPass / http://localhost:3002/\nProxyPassReverse / http://localhost:3002/\n' > "$CONF"
            echo "vhost.conf contents:"
            cat "$CONF"

            echo "=== Step 6: Reload Apache via Plesk ==="
            curl -sk --max-time 30 \
              "https://dlbtrust.cloud:8443/enterprise/control/agent.php" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" \
              -H "Content-Type: text/xml" \
              -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><prefs><www>true</www></prefs></values></set></webspace></packet>'
            echo ""
            echo "Apache reload triggered"
            sleep 5

            echo "=== Step 7: Public HTTPS test ==="
            curl -sk https://dlbtrust.cloud/api/ach/health | head -c 200
            echo ""
            curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 200
            echo ""
            echo "=== DONE ==="
