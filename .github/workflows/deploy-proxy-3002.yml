name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure proxy on 3003 and update Apache via Plesk
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs

            echo "=== Ensure proxy on 3003 ==="
            if ! curl -s --max-time 3 http://localhost:3003/api/ach/health | grep -q openach_connected; then
              pm2 kill 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > "$DEST/server-proxy.js"
              pm2 start "$DEST/server-proxy.js" --name server-proxy --no-autorestart
              sleep 3
            fi
            echo "Proxy 3003 ACH:" && curl -s http://localhost:3003/api/ach/health | head -c 80
            echo ""

            echo "=== Read Plesk-generated Apache config ==="
            cat /etc/apache2/plesk.conf.d/vhosts/*.conf 2>/dev/null | head -80 || echo "Not at plesk.conf.d"
            find /etc/apache2 -name "*.conf" -exec grep -l "dlbtrust\|3002\|3001" {} \; 2>/dev/null | head -5 || echo "No match in apache2"
            find /etc/apache2/sites-enabled/ -type f 2>/dev/null | head -5 || echo "No sites-enabled"
            find /etc/apache2/sites-enabled/ -type l 2>/dev/null | head -5 || echo "No symlinks in sites-enabled"
            ls -la /etc/apache2/sites-enabled/ 2>/dev/null | head -10 || echo "Cannot list sites-enabled"

            echo "=== Read Plesk vhost includes ==="
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/last_nginx.conf 2>/dev/null | head -30 || echo "no last_nginx.conf"
            cat /var/www/vhosts/system/dlbtrust.cloud/conf/last_httpd.conf 2>/dev/null | head -30 || echo "no last_httpd.conf"

            echo "=== Try reading actual Apache config for this domain ==="
            grep -r "ProxyPass" /etc/apache2/ 2>/dev/null | grep -i "3002\|3003\|3001\|dlbtrust" | head -10 || echo "no ProxyPass matches"
            apache2ctl -t -D DUMP_VHOSTS 2>/dev/null | head -20 || echo "cannot dump vhosts"
