name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy proxy server on port 3003
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 180s
          script: |
            set -e
            export HOME=/var/www/vhosts/dlbtrust.cloud
            DEST=/var/www/vhosts/dlbtrust.cloud/httpdocs
            CONF=/var/www/vhosts/dlbtrust.cloud/conf/vhost.conf

            echo "=== Step 1: Kill old processes ==="
            pm2 kill 2>/dev/null || true
            sleep 1
            fuser -k 3003/tcp 2>/dev/null || true
            sleep 2
            echo "Ports after cleanup:"
            ss -tlnp 2>/dev/null | grep -E ':300[0-9] ' || echo "none visible"

            echo "=== Step 2: Write proxy JS via base64 ==="
            echo "" | base64 -d > "$DEST/server-proxy.js"
            echo "Written. Port check:"
            grep "PORT" "$DEST/server-proxy.js" | head -2

            echo "=== Step 3: Start with pm2 ==="
            pm2 start "$DEST/server-proxy.js" --name server-proxy --no-autorestart
            sleep 3
            pm2 list
            pm2 logs server-proxy --lines 5 --nostream 2>/dev/null || true

            echo "=== Port check ==="
            ss -tlnp 2>/dev/null | grep ':3003 ' && echo "PORT 3003 UP" || true
            curl -s --max-time 3 http://localhost:3003/ > /dev/null 2>&1 && echo "Port 3003 responds" || echo "Port 3003 no response"

            echo "=== Step 4: Local test ==="
            curl -s --max-time 5 http://localhost:3003/api/ach/health || echo "ACH CURL FAILED"
            echo ""
            curl -s --max-time 5 http://localhost:3003/api/analytics/summary || echo "ANALYTICS CURL FAILED"
            echo ""
            curl -s --max-time 5 http://localhost:3003/api/ach/health | grep -q openach_connected && echo "ACH FIELD: OK" || echo "ACH FIELD: MISSING"
            curl -s --max-time 5 http://localhost:3003/api/analytics/summary | grep -q total_corpus && echo "ANALYTICS FIELD: OK" || echo "ANALYTICS FIELD: MISSING"

            echo "=== Step 5: Update vhost.conf ==="
            printf '<Directory /var/www/vhosts/dlbtrust.cloud/httpdocs>\n  Options -Indexes\n</Directory>\nProxyPass / http://localhost:3003/\nProxyPassReverse / http://localhost:3003/\n' > "$CONF"
            cat "$CONF"

            echo "=== Step 6: Reload Apache ==="
            curl -sk --max-time 30 "https://dlbtrust.cloud:8443/enterprise/control/agent.php" -H "HTTP_AUTH_LOGIN: admin" -H "HTTP_AUTH_PASSWD: dP8RlShbOWNq" -H "Content-Type: text/xml" -d '<?xml version="1.0"?><packet version="1.6.9.1"><webspace><set><filter><name>dlbtrust.cloud</name></filter><values><prefs><www>true</www></prefs></values></set></webspace></packet>'
            echo ""
            sleep 5

            echo "=== Step 7: Public test ==="
            curl -sk https://dlbtrust.cloud/api/ach/health | head -c 300
            echo ""
            curl -sk https://dlbtrust.cloud/api/analytics/summary | head -c 300
            echo ""
            echo "=== DONE ==="
