name: Deploy Proxy 3002
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fix ACH and Analytics routes via htaccess + proxy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.208.191.205
          username: dlbtrust.cloud_h6zkwzag1ya
          password: Deploy2026!
          port: 22
          command_timeout: 120s
          script: |
            set -e
            BASEDIR="/var/www/vhosts/dlbtrust.cloud"
            HTDOCS="$BASEDIR/httpdocs"

            echo "=== Step 1: Ensure proxy on port 3003 ==="
            if curl -s --max-time 3 http://127.0.0.1:3003/api/ach/health 2>/dev/null | grep -q openach_connected; then
              echo "Proxy on 3003 already healthy"
            else
              echo "Starting proxy on 3003..."
              cd "$HTDOCS"
              pm2 delete server-proxy 2>/dev/null || true
              pm2 kill 2>/dev/null || true
              fuser -k 3003/tcp 2>/dev/null || true
              sleep 1
              echo "" | base64 -d > "$HTDOCS/server-proxy.js"
              pm2 start "$HTDOCS/server-proxy.js" --name server-proxy
              sleep 3
              pm2 list
            fi

            echo "=== Step 2: Verify proxy locally ==="
            curl -s http://127.0.0.1:3003/api/ach/health
            echo ""
            curl -s http://127.0.0.1:3003/api/analytics/summary
            echo ""

            echo "=== Step 3: Update .htaccess ==="
            printf 'RewriteEngine On\n\n# Route ACH health and Analytics summary to proxy on port 3003\nRewriteRule ^api/ach/health$ http://127.0.0.1:3003/api/ach/health [P,L]\nRewriteRule ^api/analytics/summary$ http://127.0.0.1:3003/api/analytics/summary [P,L]\n\n# All other API requests go to payment-gateway on port 3002\nRewriteRule ^api/(.*)$ http://127.0.0.1:3002/api/$1 [P,L]\n\n# Handle SPA routing - serve files if they exist, otherwise serve index.html\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^(.*)$ /index.html [L]\n' > "$HTDOCS/.htaccess"

            echo "New .htaccess:"
            cat "$HTDOCS/.htaccess"

            echo "=== Step 4: Test externally ==="
            sleep 2
            echo "ACH health:"
            curl -sk https://dlbtrust.cloud/api/ach/health
            echo ""
            echo "Analytics summary:"
            curl -sk https://dlbtrust.cloud/api/analytics/summary
            echo ""
            echo "Wallets (should still work via 3002):"
            curl -sk https://dlbtrust.cloud/api/wallets | head -c 200
            echo ""
