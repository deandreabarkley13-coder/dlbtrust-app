name: Deploy OpenACH v4 - Multi-method

on:
  workflow_dispatch:

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check all available access methods
        run: |
          set -x
          
          echo "=== Check open ports on server ==="
          for PORT in 21 22 80 443 2222 3306 8080 8443 8880; do
            if timeout 5 bash -c ">/dev/tcp/74.208.191.205/$PORT" 2>/dev/null; then
              echo "Port $PORT: OPEN"
            else
              echo "Port $PORT: CLOSED"
            fi
          done
          
          echo ""
          echo "=== Try SSH on various ports ==="
          for PORT in 22 2222; do
            ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o BatchMode=yes -p $PORT \
              root@74.208.191.205 exit 2>&1 | grep -E "banner|port|version" | head -3
          done
          
          echo ""
          echo "=== Try FTP ==="
          echo "QUIT" | timeout 5 nc -w 3 74.208.191.205 21 2>&1 | head -3 || echo "FTP not available"
          
          echo ""
          echo "=== Try Plesk File Manager API ==="
          # Plesk has a web-based file manager accessible via the panel
          curl -s -k "https://74.208.191.205:8443/modules/filemng/index.php" \
            --connect-timeout 10 -o /dev/null -w "HTTP: %{http_code}\n" 2>&1
          
          echo ""
          echo "=== Try MySQL/PostgreSQL ==="
          timeout 5 bash -c ">/dev/tcp/74.208.191.205/3306" 2>/dev/null && echo "MySQL: OPEN" || echo "MySQL: CLOSED"
          
          echo ""
          echo "=== Check if app has /api/admin endpoints ==="
          for PATH in "/api/admin" "/admin" "/api/setup" "/api/debug" "/api/exec"; do
            RESULT=$(curl -s -k "https://dlbtrust.cloud$PATH" -w "HTTP:%{http_code}" --max-time 5 2>&1)
            echo "$PATH: $RESULT" | head -c 100
          done

      - name: Try to SSH with keyboard-interactive and IONOS password
        run: |
          # Detailed SSH attempt with verbose output
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PreferredAuthentications=password,keyboard-interactive \
            -o NumberOfPasswordPrompts=3 \
            root@74.208.191.205 "echo 'SSH_SUCCESS'; whoami; docker ps; find /var/www -name app.js | head -3" 2>&1 || true
          
          echo ""
          echo "=== Try as pleskuser ==="
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PreferredAuthentications=password \
            dlbtrust@74.208.191.205 "echo 'SSH_SUCCESS'" 2>&1 | tail -5 || true

      - name: Alternative deployment via PHP endpoint
        run: |
          echo "=== Try Plesk PHP deployment endpoint ==="
          # Plesk can execute PHP scripts; try to inject commands via file upload or existing endpoints
          
          # Try the Plesk panel login form to get a CSRF token
          CSRF=$(curl -s -k "https://74.208.191.205:8443/login" \
            -c /tmp/plesk_cookies.txt \
            --connect-timeout 10 | \
            grep -oP 'csrf[_-]token["\s:]*["\s]*([a-zA-Z0-9_-]+)' | head -1)
          echo "CSRF: $CSRF"
          
          # Try to log in with form
          LOGIN_RESULT=$(curl -s -k -X POST "https://74.208.191.205:8443/login" \
            -b /tmp/plesk_cookies.txt \
            -c /tmp/plesk_cookies.txt \
            -d "login_name=admin&passwd=Skunklemon78tut%24jupiter&csrf_token=$CSRF" \
            --connect-timeout 10 -L -w "\nHTTP:%{http_code}" 2>&1)
          echo "Login: ${LOGIN_RESULT: -100}"
