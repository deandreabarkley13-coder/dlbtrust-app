name: Deploy OpenACH - Playwright IONOS

on:
  workflow_dispatch:

jobs:
  get-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright --quiet
          playwright install chromium --with-deps 2>&1 | tail -5
      
      - name: Login to IONOS and get server password
        run: |
          cat > /tmp/ionos_login.py << 'PYEOF'
import asyncio
from playwright.async_api import async_playwright
import json, os

async def main():
    async with async_playwright() as p:
        browser = await p.chromium.launch(
            headless=True,
            args=['--no-sandbox', '--disable-dev-shm-usage']
        )
        
        context = await browser.new_context()
        page = await context.new_page()
        
        print("=== Step 1: Load IONOS login page ===")
        await page.goto('https://login.ionos.com', timeout=30000)
        await page.wait_for_timeout(2000)
        print(f"Title: {await page.title()}")
        
        print("\n=== Step 2: Enter email ===")
        try:
            # Find the email/username input
            await page.fill('input[name="username"], input[type="email"], input[autocomplete="username"]',
                          'deandreabarkley13@gmail.com', timeout=10000)
            print("Email entered")
            
            # Click Next
            await page.click('button[type="submit"], input[type="submit"], button:has-text("Next"), button:has-text("Continue")',
                            timeout=10000)
            print("Clicked Next")
            await page.wait_for_timeout(3000)
            print(f"URL after Next: {page.url}")
            
        except Exception as e:
            print(f"Step 2 error: {e}")
            content = await page.content()
            print(f"Page content: {content[:500]}")
        
        print("\n=== Step 3: Enter password ===")
        try:
            await page.fill('input[type="password"], input[name="password"]',
                          'Skunklemon78tut$jupiter', timeout=10000)
            print("Password entered")
            
            await page.click('button[type="submit"], input[type="submit"], button:has-text("Login"), button:has-text("Sign in")',
                            timeout=10000)
            print("Clicked Login")
            await page.wait_for_timeout(5000)
            print(f"URL after login: {page.url}")
            
        except Exception as e:
            print(f"Step 3 error: {e}")
        
        print("\n=== Step 4: Navigate to server management ===")
        try:
            # Go to server management
            await page.goto('https://my.ionos.com/server-cloud-infrastructure', timeout=30000)
            await page.wait_for_timeout(3000)
            print(f"Server page URL: {page.url}")
            content = await page.content()
            print(f"Server page content: {content[:1000]}")
            
        except Exception as e:
            print(f"Step 4 error: {e}")
        
        # Take screenshot for debugging
        await page.screenshot(path='/tmp/ionos_screen.png')
        print("\nScreenshot saved")
        
        print("\n=== Current cookies ===")
        cookies = await context.cookies()
        for c in cookies:
            if 'ionos' in c.get('domain', ''):
                print(f"  {c['name']}={c['value'][:30]}...")
        
        await browser.close()

asyncio.run(main())
PYEOF
          python3 /tmp/ionos_login.py

      - name: Use cookies to access IONOS API
        run: |
          echo "=== Try IONOS APIs with Playwright session ==="
          # Check if we got authenticated cookies from Playwright
          ls -la /tmp/*.png 2>/dev/null || echo "No screenshots"
