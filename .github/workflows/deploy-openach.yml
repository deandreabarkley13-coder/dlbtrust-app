name: Deploy OpenACH v5 - IONOS Access

on:
  workflow_dispatch:

jobs:
  ionos-access:
    runs-on: ubuntu-latest
    steps:
      - name: Access IONOS portal and get server credentials
        run: |
          set -x
          pip install requests selenium playwright 2>/dev/null | tail -3
          
          python3 << 'PYEOF'
          import requests
          import json
          
          session = requests.Session()
          session.verify = False
          import urllib3
          urllib3.disable_warnings()
          
          print("=== IONOS Authentication ===")
          
          # Step 1: Get initial cookies from login page
          r = session.get('https://login.ionos.com')
          print(f"Login page: {r.status_code}")
          
          # Step 2: Try to find the actual form action
          # The page uses JavaScript to post to an endpoint
          # Let's look at the form HTML
          import re
          forms = re.findall(r'<form[^>]*action=["\']([^"\']+)["\']', r.text)
          print(f"Form actions: {forms}")
          
          # Step 3: Try to POST login
          data = {
              'username': 'deandreabarkley13@gmail.com',
              'password': 'Skunklemon78tut$jupiter'
          }
          r2 = session.post('https://login.ionos.com', data=data, allow_redirects=True)
          print(f"POST result: {r2.status_code}, URL: {r2.url[:100]}")
          print(f"Response: {r2.text[:300]}")
          
          # Step 4: Try to access server list
          r3 = session.get('https://my.ionos.com/server-cloud-infrastructure')
          print(f"\nServer list: {r3.status_code}")
          print(f"Response: {r3.text[:300]}")
          
          PYEOF

      - name: Try direct Plesk reset via IONOS API
        run: |
          python3 << 'PYEOF'
          import requests, json, urllib3
          urllib3.disable_warnings()
          
          session = requests.Session()
          session.verify = False
          
          print("=== IONOS API Access ===")
          
          # Try IONOS Cloud API v6 with various auth methods
          import base64
          creds = base64.b64encode(b'deandreabarkley13@gmail.com:Skunklemon78tut$jupiter').decode()
          
          headers = {'Authorization': f'Basic {creds}'}
          
          # Try different endpoints
          for url in [
              'https://api.ionos.com/cloudapi/v6/datacenters',
              'https://api.ionos.com/servers/v1',
              'https://api.ionos.com/managed-hosting/v1',
          ]:
              r = session.get(url, headers=headers)
              print(f"{url}: {r.status_code} - {r.text[:100]}")
          
          print("\n=== Try IONOS Token API ===")
          r = session.post('https://api.ionos.com/auth/v1/tokens/generate',
                          headers=headers)
          print(f"Token: {r.status_code} - {r.text[:200]}")
          
          PYEOF

      - name: Try to use Plesk XML API with proper auth
        run: |
          python3 << 'PYEOF'
          import requests, json, urllib3
          urllib3.disable_warnings()
          
          session = requests.Session()
          session.verify = False
          
          PLESK_URL = 'https://74.208.191.205:8443'
          
          print("=== Plesk XML API Tests ===")
          
          passwords = [
              'Skunklemon78tut$jupiter',
              'admin',
              'Admin123',
              'DLBtrust1',
              'pass',
              'Plesk12345',
              'ionos123',
          ]
          
          for pwd in passwords:
              headers = {
                  'Content-Type': 'text/xml',
                  'HTTP_AUTH_LOGIN': 'admin',
                  'HTTP_AUTH_PASSWD': pwd,
              }
              body = '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><server><get_protos/></server></packet>'
              
              try:
                  r = session.post(f'{PLESK_URL}/enterprise/control/agent.php',
                                  headers=headers, data=body, timeout=10)
                  print(f"Password '{pwd[:10]}': HTTP {r.status_code} - {r.text[:100]}")
                  if '"ok"' in r.text or 'success' in r.text.lower():
                      print(f"SUCCESS with password: {pwd}")
                      break
              except Exception as e:
                  print(f"Error with '{pwd[:10]}': {e}")
          
          print("\n=== Try Plesk REST API ===")\n          for pwd in passwords:
              try:
                  r = session.post(f'{PLESK_URL}/api/v2/auth/keys',
                                  json={'login': 'admin', 'password': pwd},
                                  timeout=10)
                  print(f"REST password '{pwd[:10]}': HTTP {r.status_code} - {r.text[:100]}")
                  if '"key"' in r.text:
                      print(f"REST SUCCESS with password: {pwd}")
                      break
              except Exception as e:
                  print(f"REST Error: {e}")
          
          PYEOF
