name: Deploy OpenACH v3 - Plesk API

on:
  workflow_dispatch:

jobs:
  deploy-via-plesk:
    runs-on: ubuntu-latest
    steps:
      - name: Try Plesk XML API
        run: |
          set -x
          
          echo "=== Testing Plesk API connectivity ==="
          
          PASSWORDS=(
            "Skunklemon78tut\$jupiter"
            "admin"
            "Admin123"
            "DLBtrust1"
            "password"
          )
          
          PLESK_URL="https://74.208.191.205:8443"
          
          # Try Plesk REST API v2
          for PWD in "${PASSWORDS[@]}"; do
            echo "Trying REST API with password: ${PWD:0:10}..."
            RESULT=$(curl -s -k -X POST "$PLESK_URL/api/v2/auth/keys" \
              -H "Content-Type: application/json" \
              -d "{\"login\":\"admin\",\"password\":\"$PWD\"}" \
              --connect-timeout 10 --max-time 15 2>&1)
            echo "Result: $RESULT"
            
            if echo "$RESULT" | grep -q '"key"'; then
              echo "PLESK_KEY found!"
              export PLESK_KEY=$(echo "$RESULT" | python3 -c "import json,sys; print(json.load(sys.stdin)['key'])" 2>/dev/null)
              echo "Key: $PLESK_KEY"
              break
            fi
          done
          
          # Try XML API
          echo ""
          echo "=== Testing Plesk XML API ==="
          for PWD in "${PASSWORDS[@]}"; do
            RESULT=$(curl -s -k -X POST "$PLESK_URL/enterprise/control/agent.php" \
              -H "Content-Type: text/xml" \
              -H "HTTP_AUTH_LOGIN: admin" \
              -H "HTTP_AUTH_PASSWD: $PWD" \
              -d '<?xml version="1.0" encoding="UTF-8"?><packet version="1.6.9.1"><server><get_protos/></server></packet>' \
              --connect-timeout 10 --max-time 15 2>&1)
            echo "XML API with ${PWD:0:10}: $RESULT"
            
            if echo "$RESULT" | grep -q '"ok"'; then
              echo "XML API SUCCESS!"
              break
            fi
          done

      - name: Try SSH with all methods
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: 74.208.191.205
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          timeout: 30s
          script: |
            echo "Connected as: $(whoami)"
            echo "=== Server info ==="
            uname -a
            
            echo "=== Docker containers ==="
            docker ps 2>&1 || echo "docker not available"
            
            echo "=== App directory ==="
            find /var/www -name "app.js" -not -path "*/node_modules/*" 2>/dev/null | head -5

      - name: Try SSH debug - find supported methods
        run: |
          echo "=== SSH verbose debug ==="
          ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o BatchMode=yes \
            root@74.208.191.205 exit 2>&1 | grep -E "method|auth|Trying|offer" | head -20
          
          echo ""
          echo "=== SSH with keyboard-interactive ==="
          sshpass -p '${{ secrets.SERVER_PASSWORD }}' \
            ssh -v -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            -o PreferredAuthentications=keyboard-interactive,password \
            root@74.208.191.205 "echo SUCCESS" 2>&1 | tail -20

