name: Deploy OpenACH v2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Try multiple SSH methods
        run: |
          sudo apt-get install -y sshpass 2>/dev/null || true
          
          echo "=== Testing SSH connectivity ==="
          
          # Test multiple users and passwords
          PASSWORDS=(
            "Skunklemon78tut\$jupiter"
            "admin"
            "Admin123"
            "DLBtrust1"
            "changeme"
          )
          
          USERS=("root" "admin" "dlbtrust" "plesk")
          
          for USER in "${USERS[@]}"; do
            for PWD in "${PASSWORDS[@]}"; do
              echo -n "Testing $USER / ${PWD:0:10}... "
              result=$(sshpass -p "$PWD" ssh \
                -o StrictHostKeyChecking=no \
                -o ConnectTimeout=8 \
                -o PasswordAuthentication=yes \
                -o PubkeyAuthentication=no \
                -o BatchMode=no \
                "$USER@74.208.191.205" \
                "echo SUCCESS_$USER" 2>&1)
              if echo "$result" | grep -q "SUCCESS_"; then
                echo "FOUND! $USER / $PWD"
                export SSH_USER="$USER"
                export SSH_PASS="$PWD"
                break 2
              else
                echo "Failed: $result" | head -c 80
              fi
            done
          done

      - name: Deploy via SSH if credentials found
        uses: appleboy/ssh-action@v1.0.3
        continue-on-error: true
        with:
          host: 74.208.191.205
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          timeout: 60s
          script_stop: false
          command_timeout: 120s
          script: |
            set -x
            echo "=== Connected as: $(whoami) ==="
            
            # Insert OpenACH credentials
            CONTAINER=$(docker ps --format "{{.Names}}" | grep -i openach | head -1)
            echo "Container: $CONTAINER"
            
            if [ -n "$CONTAINER" ]; then
              DB=$(docker exec "$CONTAINER" find /var/www/html -name "openach.db" 2>/dev/null | head -1)
              DB=${DB:-"/var/www/html/protected/runtime/db/openach.db"}
              echo "DB: $DB"
              
              docker exec "$CONTAINER" sqlite3 "$DB" \
                "INSERT OR IGNORE INTO user_api (user_api_user_id, user_api_datetime, user_api_originator_info_id, user_api_token, user_api_key, user_api_status) VALUES ('4fc86059-2e7b-4732-b94f-e7c3715ee8d7', datetime('now'), '0eb26e1d-5fcc-4978-a132-dd93c2655429', '3caee1c2-c218-4959-b6d2-21d4b2a1b42e', 'b74966cf-5276-4d8b-8650-5bd57dcee272', 'enabled');" && \
                echo "CREDENTIALS INSERTED" || echo "INSERT FAILED"
            fi
            
            # Find app and deploy
            for DIR in /var/www/vhosts/dlbtrust.cloud/httpdocs /var/www/html /home/dlbtrust; do
              if [ -d "$DIR" ]; then
                echo "Found dir: $DIR"
                ls "$DIR" | head -10
              fi
            done

      - name: Alternative - use curl to deploy via app endpoint
        run: |
          echo "=== Testing setup-credentials endpoint ==="
          curl -v -X POST "https://dlbtrust.cloud/api/ach/setup-credentials" \
            -H "Content-Type: application/json" \
            --max-time 30 2>&1 | tail -20
