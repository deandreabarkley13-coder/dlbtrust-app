name: Fly Deploy

# Auto-deploy dlbtrust-app to Fly.io on every push to main.
# Requires the repo secret FLY_API_TOKEN (a Fly deploy token).

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app dlbtrust-app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
